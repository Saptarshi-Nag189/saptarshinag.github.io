<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE SIGNAL — Saptarshi Nag</title>
<meta name="description" content="A playable biography. Eight acts, one operator: you. The career of Saptarshi Nag, experienced instead of read.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<script src="../demos/_shared/sfx.js"></script>
<style>
  :root{
    --sig:#8de3ff;            /* the signal cyan */
    --sig-dim:#3a7f9e;
    --warm:#ffd27f;
    --danger:#ff5c6a;
    --ok:#7dffb2;
    --ink:#eaf4fb; --dim:#8398ad; --mut:#5a6b7d;
    --line:rgba(141,227,255,.2);
    --mono:'JetBrains Mono',ui-monospace,monospace;
    --sans:'Inter',system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden;background:#01050c;color:var(--ink);
    font-family:var(--sans);-webkit-font-smoothing:antialiased}
  button{font-family:inherit}

  /* ================= shell ================= */
  #stars{position:fixed;inset:0;z-index:0;pointer-events:none}
  #stage{position:fixed;inset:0;z-index:1}
  .act{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
    justify-content:center;padding:64px 18px 96px;opacity:0;transform:translateY(26px);
    transition:opacity .7s ease,transform .7s cubic-bezier(.2,.8,.25,1);pointer-events:none}
  .act.live{opacity:1;transform:none;pointer-events:auto}
  .act.bye{opacity:0;transform:translateY(-26px)}

  /* act header */
  .a-head{text-align:center;margin-bottom:18px;max-width:760px}
  .a-act{font-family:var(--mono);font-size:10px;letter-spacing:.5em;text-transform:uppercase;
    color:var(--sig);opacity:.9}
  .a-title{font-size:clamp(24px,4.4vw,44px);font-weight:800;letter-spacing:-.02em;color:#fff;
    margin:8px 0 6px;text-shadow:0 0 40px rgba(141,227,255,.25)}
  .a-story{font-size:clamp(13px,1.7vw,15.5px);color:var(--dim);line-height:1.6;max-width:62ch;margin:0 auto}
  .a-story b{color:var(--ink);font-weight:600}

  /* instrument container */
  .rig{position:relative;width:min(880px,94vw);background:linear-gradient(172deg,rgba(10,20,32,.72),rgba(4,10,18,.85));
    border:1px solid var(--line);border-radius:18px;
    box-shadow:0 30px 90px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.06);
    padding:clamp(14px,2.6vw,26px)}
  .rig-cap{display:flex;justify-content:space-between;align-items:center;
    font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;
    color:var(--mut);margin-bottom:12px}
  .rig-cap .st{color:var(--sig)}
  .rig canvas{display:block;width:100%;border-radius:10px}

  /* controls */
  .ctl{display:flex;align-items:center;gap:14px;justify-content:center;margin-top:16px;flex-wrap:wrap}
  .btn{font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:.12em;
    text-transform:uppercase;color:#03121c;background:var(--sig);border:none;border-radius:10px;
    padding:13px 24px;cursor:pointer;transition:transform .15s,box-shadow .15s;
    box-shadow:0 0 26px -6px var(--sig)}
  .btn:hover{transform:translateY(-2px)}
  .btn:disabled{opacity:.35;cursor:default;transform:none;box-shadow:none}
  .btn.ghost{background:transparent;color:var(--sig);border:1px solid var(--line);box-shadow:none}
  .btn.warn{background:var(--danger);color:#1c0508;box-shadow:0 0 26px -6px var(--danger)}
  .slider{-webkit-appearance:none;appearance:none;width:min(430px,72vw);height:8px;border-radius:6px;
    background:linear-gradient(90deg,rgba(141,227,255,.12),rgba(141,227,255,.3));outline:none;cursor:ew-resize}
  .slider::-webkit-slider-thumb{-webkit-appearance:none;width:26px;height:26px;border-radius:50%;
    background:radial-gradient(circle at 34% 30%,#fff,var(--sig) 60%,#1b5e78);
    box-shadow:0 0 18px rgba(141,227,255,.8);cursor:ew-resize}
  .slider::-moz-range-thumb{width:26px;height:26px;border-radius:50%;border:none;
    background:radial-gradient(circle at 34% 30%,#fff,var(--sig) 60%,#1b5e78);
    box-shadow:0 0 18px rgba(141,227,255,.8);cursor:ew-resize}
  .readout{font-family:var(--mono);font-size:12px;color:var(--dim);min-width:120px;text-align:center}
  .readout b{color:var(--sig);font-size:15px}

  /* stamps — in-world annotations, earned not popped */
  .stamps{display:flex;flex-wrap:wrap;gap:9px;justify-content:center;margin-top:16px;max-width:820px}
  .stamp{font-family:var(--mono);font-size:10.5px;letter-spacing:.05em;color:var(--warm);
    border:1px dashed rgba(255,210,127,.5);border-radius:8px;padding:6px 11px;
    background:rgba(255,210,127,.05);opacity:0;transform:scale(.8) rotate(-2deg);
    transition:opacity .4s,transform .45s cubic-bezier(.2,.9,.3,1.4)}
  .stamp.on{opacity:1;transform:none}
  .stamp i{margin-right:6px}

  /* progress rail */
  #rail{position:fixed;left:16px;top:50%;transform:translateY(-50%);z-index:40;
    display:flex;flex-direction:column;align-items:center;gap:13px}
  #rail::before{content:"";position:absolute;top:8px;bottom:26px;width:1px;background:rgba(141,227,255,.15)}
  .rnode{position:relative;width:11px;height:11px;border-radius:50%;background:#0c1a26;
    border:2px solid rgba(141,227,255,.3);z-index:1;transition:.3s}
  .rnode.done{background:var(--sig);border-color:var(--sig);box-shadow:0 0 12px rgba(141,227,255,.7)}
  .rnode.now{border-color:var(--warm);box-shadow:0 0 12px rgba(255,210,127,.7)}
  #railPct{font-family:var(--mono);font-size:9.5px;color:var(--sig);letter-spacing:.1em;z-index:1}

  /* top chrome */
  #topbar{position:fixed;top:0;left:0;right:0;z-index:40;display:flex;justify-content:space-between;
    align-items:center;padding:14px 18px;pointer-events:none}
  #topbar>*{pointer-events:auto}
  #brand{font-family:var(--mono);font-size:11px;letter-spacing:.3em;color:var(--dim);text-transform:uppercase}
  #brand b{color:var(--sig)}
  #skip{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--mut);background:none;border:1px solid rgba(255,255,255,.14);border-radius:8px;
    padding:7px 13px;cursor:pointer;transition:.2s}
  #skip:hover{color:var(--sig);border-color:var(--line)}
  #back{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--mut);text-decoration:none;border:1px solid rgba(255,255,255,.14);border-radius:8px;
    padding:7px 13px;margin-right:8px;transition:.2s}
  #back:hover{color:var(--sig);border-color:var(--line)}

  /* mission log toast */
  #logToast{position:fixed;right:16px;bottom:16px;z-index:40;display:flex;flex-direction:column;
    gap:8px;align-items:flex-end;pointer-events:none}
  .logline{font-family:var(--mono);font-size:10.5px;color:var(--ok);
    background:rgba(4,16,12,.8);border:1px solid rgba(125,255,178,.3);border-radius:8px;
    padding:7px 12px;opacity:0;transform:translateX(20px);transition:.45s}
  .logline.on{opacity:1;transform:none}

  /* mission report (act 7) */
  .report{width:min(680px,94vw);text-align:left;font-family:var(--mono)}
  .report .rline{font-size:clamp(11px,1.6vw,13.5px);color:var(--dim);padding:7px 0;
    border-bottom:1px solid rgba(141,227,255,.08);opacity:0;transform:translateX(-14px);transition:.4s}
  .report .rline.on{opacity:1;transform:none}
  .report .rline b{color:var(--ink)} .report .rline .y{color:var(--warm)} .report .rline .c{color:var(--sig)}
  .tx-links{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin-top:22px}
  .tx-links a{display:inline-flex;align-items:center;gap:9px;font-family:var(--mono);font-size:12px;
    color:var(--sig);text-decoration:none;border:1px solid var(--line);border-radius:10px;
    padding:11px 18px;transition:.2s}
  .tx-links a:hover{background:rgba(141,227,255,.1);box-shadow:0 0 18px -4px var(--sig)}

  @media (max-width:640px){
    #rail{left:8px} .act{padding:58px 10px 80px}
    .rig{padding:12px}
  }
  @media (prefers-reduced-motion: reduce){
    .act{transition:opacity .3s;transform:none}
    .stamp{transition:opacity .3s;transform:none}
  }
</style>
</head>
<body>

<canvas id="stars"></canvas>

<div id="topbar">
  <span id="brand">the <b>signal</b> · a playable biography</span>
  <span>
    <a id="back" href="../demos/index.html"><i class="fa-solid fa-arrow-left"></i> exit</a>
    <button id="skip"><i class="fa-solid fa-forward"></i> skip act</button>
  </span>
</div>

<div id="rail" aria-hidden="true"></div>
<div id="stage"></div>
<div id="logToast"></div>

<script src="acts.js"></script>
<script src="app.js"></script>
</body>
</html>
