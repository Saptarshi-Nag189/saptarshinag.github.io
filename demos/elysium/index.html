/* ================= SCENE ================= */
var cv=document.getElementById('ely'), ctx=cv.getContext('2d');
var W=0,H=0,DPR=Math.min(devicePixelRatio||1,2),HOR=0;
var frames=[];
function resize(){
  W=innerWidth; H=innerHeight;
  cv.width=W*DPR; cv.height=H*DPR; cv.style.width=W+'px'; cv.style.height=H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
  HOR=H*0.62;
  layoutFrames();
}
function layoutFrames(){
  frames=[];
  /* two arcs of four glass frames floating in the sky */
  for(var i=0;i<FRAMES.length;i++){
    var row=Math.floor(i/4), col=i%4;
    var fx=W*(0.17+col*0.22), fy=H*(0.30+row*0.20);
    frames.push({ i:i, x:fx, y:fy, w:Math.min(120,W*0.11), h:Math.min(88,W*0.082), ph:Math.random()*7 });
  }
}
resize(); addEventListener('resize',resize);

var hoverFrame=-1, floorScroll=0;
var t0=performance.now();

function draw(now){
  var t=(now-t0)/1000;
  ctx.clearRect(0,0,W,H);

  /* sunset sky */
  var sky=ctx.createLinearGradient(0,0,0,HOR);
  sky.addColorStop(0,'#1c0433'); sky.addColorStop(0.45,'#4a0f63');
  sky.addColorStop(0.78,'#a52a7d'); sky.addColorStop(1,'#ff5e78');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,HOR+1);

  /* the vaporwave sun with scanline slits */
  var sx=W/2, sy=HOR-8, sr=Math.min(W,H)*0.21;
  var sg=ctx.createLinearGradient(0,sy-sr,0,sy+sr*0.2);
  sg.addColorStop(0,'#ffe36b'); sg.addColorStop(0.55,'#ff9a3d'); sg.addColorStop(1,'#ff2a6d');
  ctx.save();
  ctx.beginPath(); ctx.arc(sx,sy,sr,Math.PI,0); ctx.closePath(); ctx.clip();
  ctx.fillStyle=sg; ctx.fillRect(sx-sr,sy-sr,sr*2,sr*2);
  /* slits widen toward the bottom */
  ctx.fillStyle='rgba(28,4,51,.96)';
  for(var sl=0;sl<7;sl++){
    var ly=sy-sr*0.52+sl*(sr*0.105);
    ctx.fillRect(sx-sr,ly,sr*2,2+sl*1.7);
  }
  ctx.restore();
  var halo=ctx.createRadialGradient(sx,sy-sr*0.3,sr*0.4,sx,sy-sr*0.3,sr*2.1);
  halo.addColorStop(0,'rgba(255,120,90,.30)'); halo.addColorStop(1,'rgba(255,120,90,0)');
  ctx.fillStyle=halo; ctx.fillRect(0,0,W,HOR);

  /* distant chrome mountains */
  ctx.fillStyle='rgba(30,6,54,.9)';
  ctx.beginPath(); ctx.moveTo(0,HOR);
  for(var mx=0;mx<=W;mx+=W/14){
    ctx.lineTo(mx, HOR - (16+((mx*2654435761)%97)) * 0.7);
  }
  ctx.lineTo(W,HOR); ctx.closePath(); ctx.fill();

  /* checkerboard infinity floor */
  if(!REDUCED) floorScroll+=0.35;
  var rows=26;
  for(var r=0;r<rows;r++){
    var t1=r/rows, t2=(r+1)/rows;
    /* perspective: near rows tall, far rows squashed */
    var y1=HOR+(H-HOR)*(1-Math.pow(1-t1,2.1));
    var y2=HOR+(H-HOR)*(1-Math.pow(1-t2,2.1));
    var depth=1-t1;                      /* 1 far … 0 near */
    var cols=18;
    var rowOff=Math.floor(floorScroll/22);
    for(var q=0;q<cols;q++){
      var even=((q+((r+rowOff)%2))%2===0);
      var scale=(1-depth*0.86);
      var cw=(W*1.7/cols)*scale===0?1:(W*1.7/cols);
      var x1=W/2+(q-cols/2)*cw*(1-depth*0.82);
      var x2=W/2+(q+1-cols/2)*cw*(1-depth*0.82);
      ctx.fillStyle=even
        ? 'rgba(24,5,44,'+(0.94)+')'
        : 'rgba('+(180-100*depth)+','+(30+20*depth)+','+(160-40*depth)+','+(0.5+0.28*(1-depth))+')';
      ctx.fillRect(x1,y1,x2-x1+0.7,y2-y1+0.7);
    }
  }
  /* neon grid lines over the floor */
  ctx.strokeStyle='rgba(1,205,254,.34)'; ctx.lineWidth=1;
  for(var g2=0;g2<=14;g2++){
    var gx=W/2+(g2-7)*(W*0.115);
    ctx.beginPath(); ctx.moveTo(W/2+(g2-7)*W*0.02, HOR); ctx.lineTo(gx,H); ctx.stroke();
  }
  /* floor glow at horizon */
  var fgl=ctx.createLinearGradient(0,HOR,0,HOR+90);
  fgl.addColorStop(0,'rgba(255,94,120,.5)'); fgl.addColorStop(1,'rgba(255,94,120,0)');
  ctx.fillStyle=fgl; ctx.fillRect(0,HOR,W,90);

  /* marble columns (left + right) */
  drawColumn(W*0.075, HOR, Math.min(150,H*0.24), t);
  drawColumn(W*0.925, HOR, Math.min(190,H*0.30), t);
  /* a floating bust silhouette */
  drawBust(W*0.86, H*0.24, t);

  /* drifting glass frames */
  for(var f=0;f<frames.length;f++){
    var fr=frames[f];
    var driftX=REDUCED?0:Math.sin(t*0.5+fr.ph)*10;
    var driftY=REDUCED?0:Math.cos(t*0.42+fr.ph*1.3)*8;
    var x=fr.x+driftX, y=fr.y+driftY;
    fr._x=x; fr._y=y;
    var hov=hoverFrame===f;
    ctx.save();
    ctx.translate(x,y); ctx.rotate(REDUCED?0:Math.sin(t*0.4+fr.ph)*0.04);
    /* glow */
    var gg=ctx.createRadialGradient(0,0,4,0,0,fr.w*1.15);
    gg.addColorStop(0,'rgba(255,113,206,'+(hov?0.4:0.18)+')'); gg.addColorStop(1,'rgba(255,113,206,0)');
    ctx.fillStyle=gg; ctx.beginPath(); ctx.arc(0,0,fr.w*1.15,0,7); ctx.fill();
    /* glass */
    ctx.fillStyle='rgba(255,255,255,'+(hov?0.16:0.09)+')';
    ctx.strokeStyle=hov?'rgba(255,183,240,.95)':'rgba(255,183,240,.5)';
    ctx.lineWidth=1.4;
    ctx.beginPath(); ctx.roundRect(-fr.w/2,-fr.h/2,fr.w,fr.h,10); ctx.fill(); ctx.stroke();
    /* shine */
    ctx.strokeStyle='rgba(255,255,255,.35)';
    ctx.beginPath(); ctx.moveTo(-fr.w/2+8,-fr.h/2+14); ctx.lineTo(-fr.w/2+26,-fr.h/2+5); ctx.stroke();
    /* label */
    ctx.fillStyle=hov?'#fff':'rgba(253,239,250,.92)';
    ctx.font='600 '+Math.max(10,fr.w*0.115)+'px "JetBrains Mono",monospace';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(FRAMES[f].label.toUpperCase(),0,fr.h*0.12);
    ctx.fillStyle=hov?'#ffd9f2':'rgba(195,154,192,.9)';
    ctx.font='500 '+Math.max(8,fr.w*0.08)+'px "JetBrains Mono",monospace';
    ctx.fillText('0'+(f+1),0,-fr.h*0.24);
    ctx.restore();
  }

  /* floating sparkles */
  ctx.fillStyle='rgba(255,220,250,.7)';
  for(var sp=0;sp<26;sp++){
    var spx=((sp*467)%100)/100*W;
    var spy=(((sp*911)%100)/100*H*0.55)+(REDUCED?0:Math.sin(t*0.8+sp)*6);
    ctx.globalAlpha=0.2+0.4*Math.abs(Math.sin(t*0.7+sp*2.4));
    ctx.fillRect(spx,spy,1.6,1.6);
  }
  ctx.globalAlpha=1;

  /* vignette */
  var vg=ctx.createRadialGradient(W/2,H*0.5,H*0.3,W/2,H*0.5,H);
  vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(10,0,20,.5)');
  ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);
}
function drawColumn(cx,baseY,h,t){
  var w=h*0.23;
  var m=ctx.createLinearGradient(cx-w/2,0,cx+w/2,0);
  m.addColorStop(0,'#efe6f2'); m.addColorStop(0.5,'#cbb8d8'); m.addColorStop(1,'#8f7aa6');
  ctx.fillStyle=m;
  ctx.fillRect(cx-w/2,baseY-h,w,h);
  /* flutes */
  ctx.strokeStyle='rgba(90,60,120,.35)'; ctx.lineWidth=1;
  for(var f2=1;f2<4;f2++){ ctx.beginPath();
    ctx.moveTo(cx-w/2+f2*(w/4),baseY-h+6); ctx.lineTo(cx-w/2+f2*(w/4),baseY-4); ctx.stroke(); }
  /* capital + base */
  ctx.fillStyle='#f4ecf7';
  ctx.fillRect(cx-w*0.7,baseY-h-8,w*1.4,8);
  ctx.fillRect(cx-w*0.7,baseY-2,w*1.4,6);
  /* pink rim light */
  ctx.fillStyle='rgba(255,113,206,.35)';
  ctx.fillRect(cx+w/2-2,baseY-h,2,h);
}
function drawBust(cx,cy,t){
  var s=Math.min(46,W*0.04);
  var bob=REDUCED?0:Math.sin(t*0.6)*6;
  ctx.save(); ctx.translate(cx,cy+bob);
  var m=ctx.createLinearGradient(-s,0,s,0);
  m.addColorStop(0,'#f2eaf6'); m.addColorStop(1,'#a08ab8');
  ctx.fillStyle=m;
  /* head */
  ctx.beginPath(); ctx.arc(0,-s*0.55,s*0.42,0,7); ctx.fill();
  /* neck + shoulders */
  ctx.fillRect(-s*0.14,-s*0.25,s*0.28,s*0.3);
  ctx.beginPath(); ctx.moveTo(-s*0.75,s*0.55); ctx.quadraticCurveTo(0,-s*0.12,s*0.75,s*0.55);
  ctx.closePath(); ctx.fill();
  /* cyan rim */
  ctx.strokeStyle='rgba(1,205,254,.55)'; ctx.lineWidth=1.4;
  ctx.beginPath(); ctx.arc(0,-s*0.55,s*0.42,-0.6,1.4); ctx.stroke();
  ctx.restore();
}

/* ================= INTERACTION ================= */
function frameAt(mx,my){
  for(var i=0;i<frames.length;i++){ var fr=frames[i];
    if(fr._x==null) continue;
    if(Math.abs(mx-fr._x)<fr.w*0.62 && Math.abs(my-fr._y)<fr.h*0.72) return i;
  }
  return -1;
}
cv.addEventListener('pointermove',function(e){
  var i=frameAt(e.clientX,e.clientY);
  if(i!==hoverFrame){ hoverFrame=i; cv.style.cursor=i>=0?'pointer':'default'; if(i>=0) sfx('hover'); }
});
cv.addEventListener('click',function(e){
  var i=frameAt(e.clientX,e.clientY);
  if(i>=0) openFrame(i);
});
addEventListener('keydown',function(e){
  var n=parseInt(e.key,10);
  if(n>=1&&n<=8) openFrame(n-1);
  if(e.key==='Escape') closeFrame();
});

var wrapEl=document.getElementById('gWrap'), epiEl=document.getElementById('epigraph'), whisperEl=document.getElementById('whisper');
function openFrame(i){
  var f=FRAMES[i];
  document.getElementById('gKick').innerHTML='<i class="fa-solid '+f.icon+'"></i> '+f.kick;
  document.getElementById('gTitle').textContent=f.title;
  document.getElementById('gBody').innerHTML=f.body;
  document.getElementById('glass').scrollTop=0;
  wrapEl.classList.add('open');
  epiEl.classList.add('gone'); whisperEl.classList.add('gone');
  sfx('chime');
}
function closeFrame(){
  if(!wrapEl.classList.contains('open')) return;
  wrapEl.classList.remove('open'); epiEl.classList.remove('gone');
  sfx('click'); sfx('back');
}
document.getElementById('gClose').addEventListener('click',closeFrame);
wrapEl.addEventListener('click',function(e){ if(e.target===wrapEl) closeFrame(); });

/* ================= LOOP ================= */
var raf=null;
function loop(now){ raf=requestAnimationFrame(loop); if(document.hidden) return; draw(now); }
if(REDUCED){ draw(performance.now());
  addEventListener('resize',function(){ draw(performance.now()); });
} else { raf=requestAnimationFrame(loop); }
window.__elysium=function(){ return { frames:FRAMES.length, hover:hoverFrame }; };
})();
</script>
