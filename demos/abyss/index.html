  #meter{position:fixed;left:18px;top:50%;transform:translateY(-50%);z-index:6;
    font-family:var(--mono);pointer-events:none}

    text-shadow:0 0 22px rgba(127,251,233,.5);line-height:1}

  #hint{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);z-index:6;
    font-family:var(--mono);font-size:11px;letter-spacing:.12em;color:var(--dim);
    pointer-events:none;transition:opacity .8s;white-space:nowrap}
  #hint b{color:var(--teal);font-weight:500}
  #hint.gone{opacity:0}

  /* depth rail (right) */
  #rail{position:fixed;right:20px;top:50%;transform:translateY(-50%);z-index:6;
    display:flex;flex-direction:column;align-items:center;gap:14px}
  #rail::before{content:"";position:absolute;top:6px;bottom:6px;width:1px;background:rgba(127,251,233,.18)}
  .rdot{position:relative;width:12px;height:12px;border-radius:50%;cursor:pointer;
    background:#0a2b30;border:2px solid rgba(127,251,233,.35);transition:.25s;z-index:1}
  .rdot:hover{border-color:var(--glow);transform:scale(1.25)}

    color:var(--dim);white-space:nowrap;opacity:0;transition:.2s;pointer-events:none}
  .rdot:hover .lbl{opacity:1}

  .tag{font-family:var(--mono);font-size:10.5px;color:#c8fff5;background:rgba(55,224,200,.09);

  .mtile{background:rgba(55,224,200,.06);border:1px solid var(--line);border-radius:12px;padding:12px}

    cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:.18s}

  @media (max-width:640px){ #panel{padding:22px 18px} #meter{left:12px} #rail{right:12px} }

function lerp(a,b,t){ return a+(b-a)*t; }
function zoneColor(d){
  /* surface → twilight → midnight → abyss */
  var stops=[[0,[8,66,84]],[600,[6,44,64]],[1600,[4,24,44]],[3000,[2,12,28]],[4400,[1,5,16]],[5200,[0,3,10]]];
  for(var i=0;i<stops.length-1;i++){
    if(d<=stops[i+1][0]){
      var t=(d-stops[i][0])/(stops[i+1][0]-stops[i][0]);
      return [Math.round(lerp(stops[i][1][0],stops[i+1][1][0],t)),
              Math.round(lerp(stops[i][1][1],stops[i+1][1][1],t)),
              Math.round(lerp(stops[i][1][2],stops[i+1][1][2],t))];
    }
  }
  return stops[stops.length-1][1];
}
function zoneName(d){
  return d<400?'sunlight zone':d<1200?'twilight zone':d<3000?'midnight zone':d<4600?'the abyss':'hadal floor';

/* ---- creature painters (all take cx, y, t, glowRGB) ---- */
function glow(cx,y,r,rgb,a){
  var g=ctx.createRadialGradient(cx,y,0,cx,y,r);
  g.addColorStop(0,'rgba('+rgb+','+a+')'); g.addColorStop(1,'rgba('+rgb+',0)');
  ctx.fillStyle=g; ctx.beginPath(); ctx.arc(cx,y,r,0,7); ctx.fill();
}
function drawJelly(cx,y,t){
  glow(cx,y,90,'127,251,233',0.20);
  var sway=Math.sin(t*1.2)*8;
  ctx.beginPath(); ctx.arc(cx+sway*0.3,y,34,Math.PI,0);
  ctx.closePath();
  var g=ctx.createLinearGradient(cx,y-34,cx,y+6);
  g.addColorStop(0,'rgba(180,255,244,.85)'); g.addColorStop(1,'rgba(55,224,200,.25)');
  ctx.fillStyle=g; ctx.fill();
  ctx.strokeStyle='rgba(200,255,248,.5)'; ctx.lineWidth=1.4;
  for(var k=0;k<6;k++){
    ctx.beginPath(); var bx=cx-25+k*10+sway*0.3;
    ctx.moveTo(bx,y+2);
    for(var yy=0;yy<56;yy+=7) ctx.lineTo(bx+Math.sin(t*2+k+yy*0.09)*6, y+2+yy);
    ctx.stroke();
  }
}
function drawSchool(cx,y,t){
  glow(cx,y,100,'140,220,255',0.14);

    ctx.beginPath(); ctx.ellipse(fx,fy,6,2.4,Math.cos(a)>0?0.3:-0.3,0,7); ctx.fill();
  }
}

  ctx.quadraticCurveTo(cx-22,y-4+bob,cx,y-42+bob); ctx.fill();
  ctx.strokeStyle='rgba(255,190,230,.55)'; ctx.lineWidth=2;
  for(var k=-2;k<=2;k++){
    ctx.beginPath(); ctx.moveTo(cx+k*6,y+8+bob);

  ctx.strokeStyle='rgba(55,224,200,.35)'; ctx.lineWidth=1; ctx.stroke();
  ctx.fillStyle='rgba(230,255,250,.9)'; ctx.beginPath(); ctx.arc(cx-6,y-7+bob,3.4,0,7); ctx.fill();
  ctx.strokeStyle='rgba(230,255,250,.75)'; ctx.lineWidth=1.6;
  ctx.beginPath(); ctx.moveTo(cx-24,y+8+bob); ctx.quadraticCurveTo(cx-10,y+15+bob,cx+8,y+9+bob); ctx.stroke();
}
function drawEggs(cx,y,t){
  glow(cx,y,110,'255,171,84',0.15);
  var names=['F1','RAG','ARO','LLM'];
  for(var k=0;k<4;k++){
    var a=t*0.5+k*(Math.PI/2);
    var ex=cx+Math.cos(a)*44, ey=y+Math.sin(a)*30;
    glow(ex,ey,26,'255,171,84',0.35);
    ctx.fillStyle='rgba(255,205,140,.92)';
    ctx.beginPath(); ctx.arc(ex,ey,10,0,7); ctx.fill();
    ctx.fillStyle='rgba(20,14,6,.85)';
    ctx.font='700 8px "JetBrains Mono",monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(names[k],ex,ey);
  }
}
function drawCoral(cx,y,t){
  glow(cx,y+8,105,'178,140,255',0.16);
  ctx.strokeStyle='rgba(198,168,255,.7)'; ctx.lineWidth=2;
  for(var k=-3;k<=3;k++){
    ctx.beginPath(); ctx.moveTo(cx+k*11,y+38);
    var hgt=44+Math.abs(k)*-6+((k*7919)%13);
    var lean=Math.sin(t*1.1+k)*4;
    ctx.quadraticCurveTo(cx+k*11+lean,y+38-hgt*0.6, cx+k*14+lean,y+38-hgt);
    ctx.stroke();
    ctx.fillStyle='rgba(220,200,255,.9)';
    ctx.beginPath(); ctx.arc(cx+k*14+lean,y+38-hgt,3.2,0,7); ctx.fill();
  }
}
function drawVent(cx,y,t){
  glow(cx,y+22,120,'255,140,90',0.18);
  ctx.fillStyle='rgba(30,16,10,.95)';
  ctx.beginPath(); ctx.moveTo(cx-46,y+44); ctx.lineTo(cx-12,y-8); ctx.lineTo(cx+12,y-8); ctx.lineTo(cx+46,y+44); ctx.closePath(); ctx.fill();
  for(var k=0;k<10;k++){
    var ph=(t*0.6+k*0.37)%1;
    var px2=cx+Math.sin(k*7+t)*7*ph, py=y-8-ph*80;
    ctx.fillStyle='rgba(255,170,120,'+(0.5*(1-ph))+')';
    ctx.beginPath(); ctx.arc(px2,py,2.4+ph*3,0,7); ctx.fill();
  }
}
var PAINTERS={jelly:drawJelly,school:drawSchool,squid:drawSquid,medusa:drawMedusa,angler:drawAngler,eggs:drawEggs,coral:drawCoral,vent:drawVent};

/* ================= DRAW ================= */
var t0=performance.now();
function draw(now){
  var t=(now-t0)/1000;
  var c=zoneColor(depth), c2=zoneColor(depth+H/PPM*0.5);
  var g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'rgb('+c[0]+','+c[1]+','+c[2]+')');
  g.addColorStop(1,'rgb('+c2[0]+','+c2[1]+','+c2[2]+')');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  /* light rays near the surface */
  var rayA=Math.max(0,1-depth/900);
  if(rayA>0.01){
    ctx.save(); ctx.globalAlpha=rayA*0.28;
    for(var r=0;r<5;r++){
      var rx=W*(0.12+r*0.2)+Math.sin(t*0.3+r)*30;
      var grd=ctx.createLinearGradient(rx,-50,rx+140,H*0.8);
      grd.addColorStop(0,'rgba(190,255,240,.5)'); grd.addColorStop(1,'rgba(190,255,240,0)');
      ctx.fillStyle=grd;
      ctx.beginPath(); ctx.moveTo(rx,-40); ctx.lineTo(rx+90,-40);
      ctx.lineTo(rx+240,H*0.85); ctx.lineTo(rx+60,H*0.85); ctx.closePath(); ctx.fill();
    }
    ctx.restore();
  }

  /* marine snow (parallax with depth motion) */
  ctx.fillStyle='rgba(210,240,235,.5)';
  for(var i2=0;i2<snow.length;i2++){ var sp=snow[i2];
    var sy=((sp.y*H)+(depth*PPM*sp.v*0.4))%H; if(sy<0) sy+=H;
    ctx.globalAlpha=0.14+0.3*sp.r/2;
    ctx.beginPath(); ctx.arc(sp.x*W+Math.sin(t*0.6+sp.ph)*6, H-sy, sp.r,0,7); ctx.fill();
  }
  ctx.globalAlpha=1;

  /* whale event (crosses in the midnight band) */
  var wy=stY({depth:2450});
  if(wy>-160 && wy<H+160 && !REDUCED){
    whale.x+=0.00045;
    if(whale.x>1.45) whale.x=-0.45;
    var wx=whale.x*W;
    if(!whale.called && wx>0 && wx<W){ whale.called=true; sfx('whale'); }
    ctx.fillStyle='rgba(4,10,20,.85)';
    ctx.beginPath();
    ctx.ellipse(wx,wy+Math.sin(t*0.4)*8,150,44,-0.05,0,7); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(wx-146,wy); ctx.quadraticCurveTo(wx-196,wy-30,wx-176,wy+4);
    ctx.quadraticCurveTo(wx-196,wy+34,wx-146,wy+6); ctx.closePath(); ctx.fill();
    ctx.fillStyle='rgba(127,251,233,.5)';
    ctx.beginPath(); ctx.arc(wx+94,wy-12,2.6,0,7); ctx.fill();
  }

  /* stations */
  for(var s=0;s<ST.length;s++){
    var y=stY(ST[s]); if(y<-180||y>H+180) continue;
    var cx=W*(s%2===0?0.42:0.58);
    ST[s]._x=cx; ST[s]._y=y;
    PAINTERS[ST[s].kind](cx,y,t+s*2.4);
    /* label when near mid-screen */
    var prox=1-Math.min(1,Math.abs(y-H*0.5)/(H*0.4));
    if(prox>0.25){
      ctx.globalAlpha=prox;
      ctx.fillStyle='rgba(232,246,244,.95)';
      ctx.font='600 13px "JetBrains Mono",monospace'; ctx.textAlign='center';
      ctx.fillText(ST[s].label.toUpperCase(), cx, y+86);
      ctx.font='500 9.5px "JetBrains Mono",monospace';
      ctx.fillStyle='rgba(143,181,176,.95)';
      ctx.fillText(ST[s].depth+' m · click to open', cx, y+102);
      ctx.globalAlpha=1;
      if(prox>0.75 && !pinged[s]){ pinged[s]=true; sfx('sonar'); }
    }
  }

  /* rising bubbles */
  if(!REDUCED && Math.random()<0.06) bubbles.push({x:Math.random()*W,y:H+8,r:1.4+Math.random()*2.6,v:0.5+Math.random()*0.8});
  ctx.strokeStyle='rgba(200,240,235,.35)';
  for(var b2=bubbles.length-1;b2>=0;b2--){ var bb=bubbles[b2];
    ctx.beginPath(); ctx.arc(bb.x+Math.sin(bb.y*0.03)*4,bb.y,bb.r,0,7); ctx.stroke();
    bb.y-=bb.v; if(bb.y<-10) bubbles.splice(b2,1);
  }

  /* vignette */
  var vg=ctx.createRadialGradient(W/2,H*0.5,H*0.3,W/2,H*0.5,H*0.95);
  vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(0,0,0,'+(0.32+0.3*Math.min(1,depth/4000))+')');
  ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);
}

/* ================= NAV ================= */
var mD=document.getElementById('mD'), mZ=document.getElementById('mZ'), hintEl=document.getElementById('hint');
addEventListener('wheel',function(e){
  targetDepth=Math.min(MAXD,Math.max(0,targetDepth+e.deltaY*1.6));
  hintEl.classList.add('gone');
},{passive:true});
var dragY=null;
addEventListener('pointerdown',function(e){ dragY=e.clientY; });
addEventListener('pointermove',function(e){
  if(dragY==null) return;
  targetDepth=Math.min(MAXD,Math.max(0,targetDepth+(dragY-e.clientY)*2.4));
  dragY=e.clientY; hintEl.classList.add('gone');
});
addEventListener('pointerup',function(){ dragY=null; });
addEventListener('keydown',function(e){
  if(e.key==='ArrowDown'||e.key==='s') targetDepth=Math.min(MAXD,targetDepth+240);
  if(e.key==='ArrowUp'||e.key==='w') targetDepth=Math.max(0,targetDepth-240);
  if(e.key==='Escape') closeP();
});

/* rail */
var rail=document.getElementById('rail');
rail.innerHTML=ST.map(function(s,i){
  return '<div class="rdot" data-i="'+i+'" role="button" tabindex="0" aria-label="'+s.label+'"><span class="lbl">'+s.label+' · '+s.depth+'m</span></div>';
}).join('');
var rdots=[].slice.call(rail.children);
rdots.forEach(function(d){
  d.addEventListener('click',function(){ sfx('select'); targetDepth=ST[+d.dataset.i].depth; hintEl.classList.add('gone'); });
  d.addEventListener('mouseenter',function(){ sfx('hover'); });
  d.addEventListener('keydown',function(e){ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); targetDepth=ST[+d.dataset.i].depth; } });
});

/* click a creature */
cv=document.getElementById('deep');
cv.addEventListener('click',function(e){
  for(var s=0;s<ST.length;s++){
    if(ST[s]._y==null) continue;
    var dx=e.clientX-ST[s]._x, dy=e.clientY-ST[s]._y;
    if(dx*dx+dy*dy<95*95){ openP(s); return; }
  }
});
cv.addEventListener('pointermove',function(e){
  var over=false;
  for(var s=0;s<ST.length;s++){
    if(ST[s]._y==null) continue;
    var dx=e.clientX-ST[s]._x, dy=e.clientY-ST[s]._y;
    if(dx*dx+dy*dy<95*95){ over=true; break; }
  }
  cv.style.cursor=over?'pointer':'default';
});

/* panel */
var wrapEl=document.getElementById('pWrap');
function openP(i){
  var s=ST[i];
  document.getElementById('pDepth').textContent='— '+s.depth+' m · '+zoneName(s.depth)+' —';
  document.getElementById('pKick').innerHTML='<i class="fa-solid '+s.icon+'"></i> '+s.kick;
  document.getElementById('pTitle').textContent=s.title;
  document.getElementById('pBody').innerHTML=s.body;
  document.getElementById('panel').scrollTop=0;
  wrapEl.classList.add('open');
  sfx('splash');
}
function closeP(){ if(!wrapEl.classList.contains('open'))return; wrapEl.classList.remove('open'); sfx('back'); }
document.getElementById('pClose').addEventListener('click',closeP);
wrapEl.addEventListener('click',function(e){ if(e.target===wrapEl) closeP(); });

/* ================= LOOP ================= */
function hud(){
  mD.textContent=Math.round(depth)+' m';
  mZ.textContent=zoneName(depth);
  var nearest=0,best=1e9;
  for(var i=0;i<ST.length;i++){ var d2=Math.abs(ST[i].depth-depth); if(d2<best){best=d2;nearest=i;} }
  rdots.forEach(function(d,i){ d.classList.toggle('here',i===nearest&&best<420); });
}
var raf=null;
function loop(now){
  raf=requestAnimationFrame(loop);
  if(document.hidden) return;
  depth+=(targetDepth-depth)*(REDUCED?1:0.06);
  draw(now); hud();
}
if(REDUCED){
  hintEl.innerHTML='use the <b>dots on the right</b> to dive to each station';
  (function rloop(now){ raf=requestAnimationFrame(rloop); if(!document.hidden){ depth+=(targetDepth-depth); draw(now||performance.now()); hud(); } })();
} else {
  raf=requestAnimationFrame(loop);
}
window.__abyss=function(){ return { depth:Math.round(depth), target:targetDepth, stations:ST.length }; };
})();
</script>
</body>
