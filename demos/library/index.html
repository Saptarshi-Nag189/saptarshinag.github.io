<style>
  :root{
    --candle:#e8b06a; --flame:#ffd9a0; --ink:#efe6d2; --dim:#a89878;
    --line:rgba(232,176,106,.24);
    --mono:'JetBrains Mono',ui-monospace,monospace;
    --sans:'Inter',system-ui,sans-serif;
    --serif:'Cormorant Garamond',Georgia,serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden;background:#0d0804;color:var(--ink);
    font-family:var(--sans);-webkit-font-smoothing:antialiased}
  #hall{position:fixed;inset:0;display:block;touch-action:none}

  #plaque{position:fixed;left:50%;top:8%;transform:translateX(-50%);z-index:5;text-align:center;
    pointer-events:none;transition:opacity 1s}
  #plaque .k{font-family:var(--mono);font-size:10px;letter-spacing:.5em;text-transform:uppercase;
    color:rgba(232,176,106,.75);margin-bottom:10px}
  #plaque h1{font-family:var(--serif);font-weight:600;font-style:italic;
    font-size:clamp(26px,4.4vw,50px);color:#f6ecd8;
    text-shadow:0 0 40px rgba(232,176,106,.3)}
  #plaque .s{margin-top:8px;font-family:var(--mono);font-size:10.5px;letter-spacing:.26em;
    text-transform:uppercase;color:var(--dim)}
  #plaque.gone{opacity:0}
  #whisper{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);z-index:5;
    font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;color:var(--dim);
    pointer-events:none;transition:opacity .8s;white-space:nowrap}
  #whisper b{color:var(--candle);font-weight:500}
  #whisper.gone{opacity:0}

  /* the open book — parchment (the one light panel in the whole set) */
  #bWrap{position:fixed;inset:0;z-index:20;display:none;align-items:center;justify-content:center;
    background:rgba(8,5,2,.6);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
  #bWrap.open{display:flex;animation:bf .4s ease}
  @keyframes bf{from{opacity:0}to{opacity:1}}
  #book{position:relative;width:min(640px,93vw);max-height:82vh;overflow-y:auto;
    background:linear-gradient(100deg,#f4e8ce 0%,#eeddbc 48%,#e6d2a8 52%,#f0e2c4 100%);
    border-radius:8px 14px 14px 8px;
    border-left:14px solid #4a2f18;
    box-shadow:0 40px 100px rgba(0,0,0,.85), inset 0 0 60px rgba(120,80,30,.18);
    padding:34px 40px 34px 36px;color:#2c1e10;
    animation:br .5s cubic-bezier(.2,.85,.25,1)}
  @keyframes br{from{opacity:0;transform:translateY(30px) rotate(.6deg)}to{opacity:1;transform:none}}
  #book::-webkit-scrollbar{width:8px}
  #book::-webkit-scrollbar-thumb{background:rgba(74,47,24,.4);border-radius:6px}
  #book::before{content:"";position:absolute;top:0;bottom:0;left:48%;width:2px;
    background:linear-gradient(180deg,transparent,rgba(90,60,25,.16),transparent);pointer-events:none}
  #bChap{font-family:var(--mono);font-size:10px;letter-spacing:.3em;text-transform:uppercase;
    color:#8a6534;margin-bottom:8px}
  #bKick{font-family:var(--serif);font-style:italic;font-size:16px;color:#6a4b22;margin-bottom:4px}
  #bTitle{font-family:var(--serif);font-weight:700;font-size:clamp(26px,3.6vw,34px);
    color:#241708;line-height:1.08;margin-bottom:6px}
  #bTitle::after{content:"";display:block;width:74px;height:2px;background:#8a6534;margin-top:10px;opacity:.5}
  #bBody{margin-top:14px;font-size:14.5px;line-height:1.66;color:#3a2917;
    font-family:var(--sans)}
  #bBody p{margin-bottom:13px}
  #bBody .item{border-left:2px solid rgba(138,101,52,.4);padding:3px 0 3px 15px;margin-bottom:16px}
  #bBody .item h3{font-family:var(--serif);font-size:19px;font-weight:700;color:#241708;margin-bottom:1px}
  #bBody .item .meta{font-family:var(--mono);font-size:10.5px;color:#7c5c2e;margin-bottom:6px}
  #bBody ul{list-style:none;margin:4px 0 8px}
  #bBody ul li{position:relative;padding:4px 0 4px 20px;font-size:13.5px;line-height:1.55}
  #bBody ul li::before{content:"\f02d";font-family:"Font Awesome 6 Free";font-weight:900;
    position:absolute;left:0;top:6px;color:#8a6534;font-size:9px}
  #bBody b{color:#1d1206;font-weight:700}
  .tags{display:flex;flex-wrap:wrap;gap:6px;margin:6px 0 12px}
  .tag{font-family:var(--mono);font-size:10.5px;color:#5c3f1a;background:rgba(138,101,52,.12);
    border:1px solid rgba(138,101,52,.3);border-radius:5px;padding:3px 9px}
  .mgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(112px,1fr));gap:10px;margin:8px 0 4px}
  .mtile{background:rgba(138,101,52,.1);border:1px solid rgba(138,101,52,.28);border-radius:9px;padding:11px}

    font-size:14px;margin:5px 20px 5px 0;border-bottom:1px solid rgba(138,101,52,.4);transition:.18s}
  .links a:hover{color:#3a2003;border-bottom-color:#3a2003}
  .links a i{width:18px;text-align:center}
  #bClose{position:absolute;top:14px;right:14px;width:33px;height:33px;border-radius:9px;
    border:1px solid rgba(74,47,24,.4);background:rgba(74,47,24,.08);color:#4a2f18;
    cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:.18s}

  @media (max-width:640px){ #book{padding:26px 22px 26px 20px;border-left-width:10px} }

];

/* ================= SCENE ================= */
var cv=document.getElementById('hall'), ctx=cv.getContext('2d');
var W=0,H=0,DPR=Math.min(devicePixelRatio||1,2);
var books=[], candles=[], motes=[];
function resize(){
  W=innerWidth; H=innerHeight;
  cv.width=W*DPR; cv.height=H*DPR; cv.style.width=W+'px'; cv.style.height=H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
  layoutBooks(); seedAtmos();
}
function layoutBooks(){
  books=[];
  /* two shelf rows of four glowing volumes */
  var rows=[H*0.47, H*0.68];
  var usable=Math.min(W*0.72, 900), x0=(W-usable)/2;
  for(var i=0;i<VOLS.length;i++){
    var row=Math.floor(i/4), col=i%4;
    var bw=Math.min(58, usable*0.06+34);
    var x=x0+ (col+0.5)*(usable/4);
    books.push({ i:i, x:x, y:rows[row], w:bw, h:bw*1.5, ph:Math.random()*7 });
  }
}
function seedAtmos(){
  candles=[]; motes=[];
  for(var i=0;i<9;i++) candles.push({x:0.06+Math.random()*0.88, y:0.12+Math.random()*0.5, ph:Math.random()*7, drift:Math.random()*0.5+0.2});
  for(var i2=0;i2<70;i2++) motes.push({x:Math.random(),y:Math.random(),r:0.5+Math.random()*1.3,v:0.06+Math.random()*0.2,ph:Math.random()*7});
}
resize(); addEventListener('resize',resize);

var hoverBook=-1;
var t0=performance.now();

function drawShelves(t){
  /* receding hall: vanishing point center */
  var vx=W/2, vy=H*0.42;
  /* floor */
  var floor=ctx.createLinearGradient(0,vy,0,H);
  floor.addColorStop(0,'#170f07'); floor.addColorStop(1,'#0a0603');
  ctx.fillStyle=floor; ctx.fillRect(0,vy,W,H-vy);
  /* floor boards toward vanishing point */
  ctx.strokeStyle='rgba(232,176,106,.05)'; ctx.lineWidth=1;
  for(var k=-8;k<=8;k++){
    ctx.beginPath(); ctx.moveTo(vx+k*W*0.09,H); ctx.lineTo(vx+k*W*0.014,vy+8); ctx.stroke();
  }
  /* ceiling */
  var ceil=ctx.createLinearGradient(0,0,0,vy);
  ceil.addColorStop(0,'#0b0703'); ceil.addColorStop(1,'#140c05');
  ctx.fillStyle=ceil; ctx.fillRect(0,0,W,vy);
  /* receding shelf walls: nested trapezoids */
  for(var d=7;d>=1;d--){
    var s=d/7;                        /* 1 near … small far */
    var half=W*0.5*s, top=vy-(vy-H*0.06)*s, bot=vy+(H-vy)*s*0.96;
    var shade=0.05+0.13*s;
    /* left wall */
    ctx.fillStyle='rgba(46,28,12,'+shade+')';
    ctx.fillRect(vx-half,top,half*0.16,bot-top);
    /* right wall */
    ctx.fillRect(vx+half-half*0.16,top,half*0.16,bot-top);
    /* shelf lines on walls */
    ctx.fillStyle='rgba(232,176,106,'+(0.05+0.09*s)+')';
    for(var sh=1;sh<5;sh++){
      var sy=top+(bot-top)*sh/5;
      ctx.fillRect(vx-half,sy,half*0.16,1.2);
      ctx.fillRect(vx+half-half*0.16,sy,half*0.16,1.2);
    }
    /* tiny book spines flickering on far shelves */
    if(d<6){
      for(var bk=0;bk<9;bk++){
        var lx=vx-half+4+bk*(half*0.16-8)/9;
        var rx2=vx+half-half*0.16+4+bk*(half*0.16-8)/9;
        var hgt=5+((bk*31+d*17)%7);
        var warm=0.10+0.18*s*(0.7+0.3*Math.sin(t+bk*2+d));
        ctx.fillStyle='rgba(232,176,106,'+warm+')';
        ctx.fillRect(lx,top+(bot-top)*0.22-hgt,2.2,hgt);
        ctx.fillRect(rx2,top+(bot-top)*0.62-hgt,2.2,hgt);
      }
    }
  }
  /* glow at the vanishing point — the library goes on forever */
  var g=ctx.createRadialGradient(vx,vy,4,vx,vy,W*0.2);
  g.addColorStop(0,'rgba(255,217,160,.22)'); g.addColorStop(1,'rgba(255,217,160,0)');
  ctx.fillStyle=g; ctx.beginPath(); ctx.arc(vx,vy,W*0.2,0,7); ctx.fill();
}
function drawCandles(t){
  for(var i=0;i<candles.length;i++){ var c=candles[i];
    var cx=c.x*W, cy=(c.y+(REDUCED?0:Math.sin(t*c.drift+c.ph)*0.012))*H;
    var fl=REDUCED?1:(0.8+0.2*Math.sin(t*9+c.ph)+0.06*Math.sin(t*23+c.ph*3));
    var g=ctx.createRadialGradient(cx,cy,0,cx,cy,40*fl);
    g.addColorStop(0,'rgba(255,220,160,'+(0.5*fl)+')'); g.addColorStop(1,'rgba(255,220,160,0)');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(cx,cy,40*fl,0,7); ctx.fill();
    ctx.fillStyle='rgba(255,240,200,.95)';
    ctx.beginPath(); ctx.ellipse(cx,cy,1.8,4.2*fl,0,0,7); ctx.fill();
    ctx.fillStyle='rgba(240,230,210,.8)';
    ctx.fillRect(cx-1.6,cy+4,3.2,7);
  }
}
function drawMotes(t){
  ctx.fillStyle='rgba(240,220,180,.5)';
  for(var i=0;i<motes.length;i++){ var m=motes[i];
    var my=(m.y+(REDUCED?0:t*0.004*m.v))%1;
    ctx.globalAlpha=0.1+0.25*Math.abs(Math.sin(t*0.4+m.ph));
    ctx.beginPath(); ctx.arc(m.x*W+Math.sin(t*0.5+m.ph)*8, my*H, m.r,0,7); ctx.fill();
  }
  ctx.globalAlpha=1;
}
function drawBooks(t){
  for(var i=0;i<books.length;i++){ var b=books[i];
    var hov=hoverBook===i;
    var lift=REDUCED?0:Math.sin(t*1.1+b.ph)*5-(hov?9:0);
    var y=b.y+lift;
    var glowA=hov?0.55:0.3+0.1*Math.sin(t*1.6+b.ph);
    var g=ctx.createRadialGradient(b.x,y,4,b.x,y,b.w*1.9);
    g.addColorStop(0,'rgba(255,217,160,'+glowA+')'); g.addColorStop(1,'rgba(255,217,160,0)');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(b.x,y,b.w*1.9,0,7); ctx.fill();
    /* the book */
    ctx.save();
    ctx.translate(b.x,y); ctx.rotate(REDUCED?0:Math.sin(t*0.9+b.ph)*0.05+(hov?0.06:0));
    ctx.fillStyle=VOLS[i].spine;
    ctx.beginPath(); ctx.roundRect(-b.w/2,-b.h/2,b.w,b.h,4); ctx.fill();
    ctx.strokeStyle='rgba(255,230,190,.55)'; ctx.lineWidth=1.4; ctx.stroke();
    /* gold bands + numeral */
    ctx.fillStyle='rgba(255,220,160,.75)';
    ctx.fillRect(-b.w/2+4,-b.h/2+7,b.w-8,2);
    ctx.fillRect(-b.w/2+4,b.h/2-11,b.w-8,2);
    ctx.font='700 '+Math.round(b.w*0.34)+'px "Cormorant Garamond",serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle='rgba(255,236,200,.95)';
    var numerals=['I','II','III','IV','V','VI','VII','∞'];
    ctx.fillText(numerals[i],0,1);
    ctx.restore();
    /* label under */
    var titles=['About','Education','GMRT','NCRA','C-DAC','Projects','Skills','Contact'];
    ctx.globalAlpha=hov?1:0.65;
    ctx.fillStyle='#e8d9b8';
    ctx.font='600 11px "JetBrains Mono",monospace'; ctx.textAlign='center';
    ctx.fillText(titles[i].toUpperCase(), b.x, b.y+b.h/2+22);
    ctx.globalAlpha=1;
  }
}
function draw(now){
  var t=(now-t0)/1000;
  ctx.clearRect(0,0,W,H);
  drawShelves(t);
  drawMotes(t);
  drawCandles(t);
  drawBooks(t);
  /* vignette */
  var vg=ctx.createRadialGradient(W/2,H*0.5,H*0.25,W/2,H*0.5,H*0.95);
  vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(0,0,0,.55)');
  ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);
}

/* ================= INTERACTION ================= */
function bookAt(mx,my){
  for(var i=0;i<books.length;i++){ var b=books[i];
    if(Math.abs(mx-b.x)<b.w*1.1 && Math.abs(my-b.y)<b.h*0.85) return i;
  }
  return -1;
}
cv.addEventListener('pointermove',function(e){
  var i=bookAt(e.clientX,e.clientY);
  if(i!==hoverBook){ hoverBook=i; cv.style.cursor=i>=0?'pointer':'default'; if(i>=0) sfx('hover'); }
});
cv.addEventListener('click',function(e){
  var i=bookAt(e.clientX,e.clientY);
  if(i>=0) openBook(i);
});
addEventListener('keydown',function(e){
  var n=parseInt(e.key,10);
  if(n>=1&&n<=8) openBook(n-1);
  if(e.key==='Escape') closeBook();
});

var wrapEl=document.getElementById('bWrap'), plaqueEl=document.getElementById('plaque'), whisperEl=document.getElementById('whisper');
function openBook(i){
  var v=VOLS[i];
  document.getElementById('bChap').textContent=v.chap;
  document.getElementById('bKick').textContent=v.kick;
  document.getElementById('bTitle').textContent=v.title;
  document.getElementById('bBody').innerHTML=v.body;
  document.getElementById('book').scrollTop=0;
  wrapEl.classList.add('open');
  plaqueEl.classList.add('gone'); whisperEl.classList.add('gone');
  sfx('page');
}
function closeBook(){
  if(!wrapEl.classList.contains('open')) return;
  wrapEl.classList.remove('open'); plaqueEl.classList.remove('gone');
  sfx('page'); sfx('back');
}
document.getElementById('bClose').addEventListener('click',closeBook);
wrapEl.addEventListener('click',function(e){ if(e.target===wrapEl) closeBook(); });

/* ================= LOOP ================= */
var raf=null;
function loop(now){ raf=requestAnimationFrame(loop); if(document.hidden) return; draw(now); }
if(REDUCED){ draw(performance.now());
  addEventListener('resize',function(){ draw(performance.now()); });
} else { raf=requestAnimationFrame(loop); }
window.__library=function(){ return { vols:VOLS.length, hover:hoverBook }; };
})();
</script>
