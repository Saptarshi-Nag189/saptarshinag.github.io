<style>
  :root{
    --bg:#01030a;
    --accent:#7cc8ff;
    --accent-dim:#3a6f9e;
    --gold:#ffcd72;
    --green:#67ffb0;
    --panel:rgba(8,15,30,0.86);
    --line:rgba(124,200,255,0.22);
    --line-soft:rgba(124,200,255,0.10);
    --txt:#e3effc;
    --txt-dim:#8aa0bd;
    --mono:'JetBrains Mono',ui-monospace,monospace;
    --sans:'Inter',system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--bg);
    color:var(--txt);
    font-family:var(--sans);
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }
  #scene-canvas{position:fixed;inset:0;z-index:1;display:block;touch-action:none}

  #bg-fade{
    position:fixed;inset:0;z-index:0;pointer-events:none;
    background:radial-gradient(ellipse 90% 80% at 50% 45%, #07122a 0%, #020611 55%, #01030a 100%);
  }
  #vignette{
    position:fixed;inset:0;z-index:40;pointer-events:none;
    background:radial-gradient(ellipse 75% 70% at 50% 50%, transparent 52%, rgba(0,0,0,0.6) 100%);
  }

  /* ---------- chrome ---------- */
  .back-link{
    position:fixed;top:14px;left:16px;z-index:60;
    font-family:var(--mono);font-size:12px;letter-spacing:.06em;
    color:var(--accent);text-decoration:none;border:1px solid var(--line);
    padding:6px 12px;border-radius:4px;background:rgba(3,8,18,.62);backdrop-filter:blur(6px);
    transition:.2s;
  }
  .back-link:hover{background:rgba(124,200,255,.14);box-shadow:0 0 14px rgba(124,200,255,.3)}
  .concept-tag{
    position:fixed;top:18px;right:18px;z-index:60;
    font-family:var(--mono);font-size:9.5px;letter-spacing:.22em;
    color:var(--txt-dim);text-transform:uppercase;opacity:.72;pointer-events:none;
  }
  .hint{
    position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:60;
    font-family:var(--mono);font-size:11px;letter-spacing:.04em;color:var(--txt-dim);
    background:rgba(3,8,18,.55);border:1px solid var(--line-soft);border-radius:20px;
    padding:7px 16px;backdrop-filter:blur(6px);white-space:nowrap;
    transition:opacity .6s;text-align:center;
  }
  .hint b{color:var(--accent);font-weight:600}
  @media (max-width:560px){ .hint{font-size:10px;padding:6px 11px} }

  /* hovering label that follows the pointer/object */
  #hover-label{
    position:fixed;z-index:55;pointer-events:none;opacity:0;transform:translate(-50%,-140%);
    font-family:var(--mono);font-size:12px;letter-spacing:.05em;
    color:var(--txt);background:rgba(4,10,22,.9);border:1px solid var(--line);
    padding:6px 12px;border-radius:5px;white-space:nowrap;transition:opacity .15s;
    box-shadow:0 4px 18px rgba(0,0,0,.5);
  }
  #hover-label i{color:var(--accent);margin-right:7px}

  /* ---------- overlay panel ---------- */
  #overlay{
    position:fixed;inset:0;z-index:80;display:none;
    align-items:center;justify-content:center;
    background:radial-gradient(ellipse at 50% 50%, rgba(2,5,14,.4) 0%, rgba(1,3,10,.78) 100%);
    backdrop-filter:blur(3px);
  }
  #overlay.open{display:flex;animation:fade .25s ease}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .card{
    position:relative;width:min(680px,92vw);max-height:84vh;overflow-y:auto;
    background:var(--panel);border:1px solid var(--line);border-radius:14px;
    box-shadow:0 0 60px rgba(124,200,255,.12),0 24px 70px rgba(0,0,0,.6);
    padding:30px 34px 34px;animation:rise .3s cubic-bezier(.2,.8,.2,1);
  }
  @keyframes rise{from{opacity:0;transform:translateY(22px) scale(.98)}to{opacity:1;transform:none}}
  .card::-webkit-scrollbar{width:9px}
  .card::-webkit-scrollbar-thumb{background:var(--accent-dim);border-radius:6px}
  .card-icon{
    width:46px;height:46px;border-radius:11px;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(140deg,rgba(124,200,255,.22),rgba(124,200,255,.05));
    border:1px solid var(--line);color:var(--accent);font-size:20px;margin-bottom:14px;
  }
  .card h2{font-size:23px;font-weight:700;letter-spacing:-.01em;margin-bottom:4px}
  .card .sub{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:18px}
  .card p{font-size:14.5px;line-height:1.62;color:#cfdcec;margin-bottom:14px}
  .card .close{
    position:absolute;top:16px;right:16px;width:34px;height:34px;border-radius:8px;
    border:1px solid var(--line);background:rgba(124,200,255,.06);color:var(--accent);
    cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:.18s;
  }
  .card .close:hover{background:rgba(124,200,255,.18)}

  .item{border-left:2px solid var(--line);padding:2px 0 2px 16px;margin-bottom:18px}
  .item h3{font-size:15.5px;font-weight:600;margin-bottom:3px}
  .item .meta{font-family:var(--mono);font-size:11px;color:var(--txt-dim);margin-bottom:7px;letter-spacing:.03em}
  .item p{font-size:13.5px;margin-bottom:0;color:#bccbdd}
  .tags{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0 2px}
  .tag{font-family:var(--mono);font-size:10.5px;color:var(--accent);background:rgba(124,200,255,.08);
    border:1px solid var(--line-soft);border-radius:4px;padding:3px 8px}
  .metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-top:6px}
  .metric{background:rgba(124,200,255,.05);border:1px solid var(--line-soft);border-radius:10px;padding:14px}
  .metric .v{font-family:var(--mono);font-size:21px;font-weight:700;color:var(--accent);line-height:1}
  .metric .l{font-size:11.5px;color:var(--txt-dim);margin-top:6px;line-height:1.35}
  .skillgrp{margin-bottom:14px}
  .skillgrp h4{font-family:var(--mono);font-size:11.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-bottom:7px}
  .links a{display:inline-flex;align-items:center;gap:8px;color:var(--accent);text-decoration:none;
    font-size:14px;margin:5px 18px 5px 0;border-bottom:1px solid transparent;transition:.18s}
  .links a:hover{border-bottom-color:var(--accent)}
  .links a i{width:18px;text-align:center}

  /* ---------- fallback (no webgl / no three) ---------- */
  #fallback{
    position:fixed;inset:0;z-index:90;display:none;overflow-y:auto;
    background:radial-gradient(ellipse 90% 80% at 50% 30%, #07122a 0%, #01030a 70%);
    padding:70px 20px 60px;
  }
  #fallback.show{display:block}
  .fb-wrap{max-width:760px;margin:0 auto}
  .fb-head{text-align:center;margin-bottom:30px}
  .fb-head .core{
    width:78px;height:78px;border-radius:50%;margin:0 auto 18px;
    background:radial-gradient(circle at 40% 35%,#bfe2ff,#2f7fc4 55%,#0b2a48);
    box-shadow:0 0 50px rgba(124,200,255,.55);display:flex;align-items:center;justify-content:center;
    font-size:30px;color:#04121f;
  }
  .fb-head h1{font-size:26px;font-weight:700}
  .fb-head .tl{color:var(--accent);font-family:var(--mono);font-size:13px;margin-top:6px}
  .fb-note{font-size:12px;color:var(--txt-dim);margin-top:12px;font-family:var(--mono)}
  .fb-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}
  .fb-sec{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px 20px}
  .fb-sec h3{font-size:16px;margin-bottom:10px;display:flex;align-items:center;gap:9px}
  .fb-sec h3 i{color:var(--accent)}
  .fb-sec .body{font-size:13px;line-height:1.6;color:#c4d3e4}
  .fb-sec .body strong{color:#e3effc}
</style>
</head>

<!-- =================== overlay content builder (shared, non-module) =================== -->
<script>
window.buildCard = function(key){
  var P = window.PORTFOLIO, N = window.NODES.filter(function(n){return n.key===key;})[0] || {};
  var esc = function(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); };
  var head = '<button class="close" id="card-close" aria-label="Close"><i class="fa-solid fa-xmark"></i></button>'+
             '<div class="card-icon"><i class="fa-solid '+(N.icon||'fa-circle')+'"></i></div>';
  var body = '';

  if (key === 'stats') {
    head += '<h2>Mission Stats</h2><div class="sub">Headline Metrics</div>';
    body += '<div class="metrics">';
    P.metrics.forEach(function(m){ body += '<div class="metric"><div class="v">'+esc(m.v)+'</div><div class="l">'+esc(m.l)+'</div></div>'; });
    body += '</div>';
  } else if (key === 'about') {
    head += '<h2>'+esc(P.name)+' — '+esc(P.role)+'</h2><div class="sub">'+esc(P.tagline)+'</div>';
    body += '<p>'+esc(P.bio)+'</p>';
  } else if (key === 'experience') {
    head += '<h2>Experience</h2><div class="sub">Roles &amp; Research</div>';
    P.experience.forEach(function(e){
      body += '<div class="item"><h3>'+esc(e.role)+' · '+esc(e.org)+'</h3>'+
              '<div class="meta">'+esc(e.when)+' &middot; '+esc(e.where)+'</div>'+
              '<p>'+esc(e.desc)+'</p></div>';
    });
  } else if (key === 'projects') {
    head += '<h2>Projects</h2><div class="sub">Selected Work</div>';
    P.projects.forEach(function(pr){
      var t = pr.tags.map(function(x){return '<span class="tag">'+esc(x)+'</span>';}).join('');
      body += '<div class="item"><h3>'+esc(pr.name)+'</h3><div class="tags">'+t+'</div><p>'+esc(pr.desc)+'</p></div>';
    });
  } else if (key === 'skills') {
    head += '<h2>Skills</h2><div class="sub">Technical Stack</div>';
    P.skills.forEach(function(s){
      body += '<div class="skillgrp"><h4>'+esc(s.g)+'</h4><p style="margin:0;color:#bccbdd;font-size:13.5px">'+esc(s.items)+'</p></div>';
    });
  } else if (key === 'publications') {
    head += '<h2>Publications</h2><div class="sub">Peer-Reviewed</div>';
    P.publications.forEach(function(pb){
      body += '<div class="item"><h3>'+esc(pb.title)+'</h3><div class="meta">'+esc(pb.venue)+'</div></div>';
    });
  } else if (key === 'education') {
    head += '<h2>Education</h2><div class="sub">Academic Record</div>';
    P.education.forEach(function(ed){
      body += '<div class="item"><h3>'+esc(ed.deg)+'</h3><div class="meta">'+esc(ed.school)+' &middot; '+esc(ed.when)+' &middot; '+esc(ed.extra)+'</div></div>';
    });
  } else if (key === 'contact') {
    head += '<h2>Contact</h2><div class="sub">Get In Touch</div>';
    body += '<div class="links">'+
      '<a href="mailto:'+esc(P.contact.email)+'"><i class="fa-solid fa-envelope"></i>'+esc(P.contact.email)+'</a><br>'+
      '<a href="'+esc(P.contact.linkedin)+'" target="_blank" rel="noopener"><i class="fa-brands fa-linkedin"></i>LinkedIn</a>'+
      '<a href="'+esc(P.contact.github)+'" target="_blank" rel="noopener"><i class="fa-brands fa-github"></i>GitHub</a><br>'+
      '<a href="'+esc(P.contact.cv)+'" target="_blank" rel="noopener"><i class="fa-solid fa-file-pdf"></i>Download CV</a>'+
    '</div>';
  }
  return head + body;
};

/* ---- build the plain-HTML fallback (also used as final safety net) ---- */

  var H = '<div class="fb-wrap"><div class="fb-head">'+

    '<div class="tl">'+P.tagline+'</div>'+
    (reason ? '<div class="fb-note"><i class="fa-solid fa-circle-info"></i> 3D view unavailable — '+reason+'. Showing portfolio below.</div>' : '')+
    '</div><div class="fb-grid">';

  H += '<div class="fb-sec"><h3><i class="fa-solid fa-user-astronaut"></i> About</h3><div class="body">'+P.bio+'</div></div>';

  var mh = P.metrics.map(function(m){return '<strong>'+m.v+'</strong> '+m.l;}).join('<br>');
  H += '<div class="fb-sec"><h3><i class="fa-solid fa-gauge-high"></i> Stats</h3><div class="body">'+mh+'</div></div>';

  var eh = P.experience.map(function(e){return '<strong>'+e.role+' · '+e.org+'</strong><br>'+e.when+' · '+e.where+'<br>'+e.desc;}).join('<br><br>');
  H += '<div class="fb-sec"><h3><i class="fa-solid fa-briefcase"></i> Experience</h3><div class="body">'+eh+'</div></div>';

  var ph = P.projects.map(function(p){return '<strong>'+p.name+'</strong> ['+p.tags.join(', ')+']<br>'+p.desc;}).join('<br><br>');
  H += '<div class="fb-sec"><h3><i class="fa-solid fa-cubes"></i> Projects</h3><div class="body">'+ph+'</div></div>';

  var sh = P.skills.map(function(s){return '<strong>'+s.g+':</strong> '+s.items;}).join('<br>');
  H += '<div class="fb-sec"><h3><i class="fa-solid fa-microchip"></i> Skills</h3><div class="body">'+sh+'</div></div>';

  var pbh = P.publications.map(function(b){return '<strong>'+b.title+'</strong><br>'+b.venue;}).join('<br><br>');
  H += '<div class="fb-sec"><h3><i class="fa-solid fa-book-open"></i> Publications</h3><div class="body">'+pbh+'</div></div>';

  var edh = P.education.map(function(d){return '<strong>'+d.deg+'</strong> — '+d.school+' · '+d.when+' · '+d.extra;}).join('<br><br>');
  H += '<div class="fb-sec"><h3><i class="fa-solid fa-graduation-cap"></i> Education</h3><div class="body">'+edh+'</div></div>';

  H += '<div class="fb-sec"><h3><i class="fa-solid fa-paper-plane"></i> Contact</h3><div class="body">'+
    '<a style="color:var(--accent)" href="mailto:'+P.contact.email+'">'+P.contact.email+'</a><br>'+
    '<a style="color:var(--accent)" href="'+P.contact.linkedin+'" target="_blank" rel="noopener">LinkedIn</a><br>'+
    '<a style="color:var(--accent)" href="'+P.contact.github+'" target="_blank" rel="noopener">GitHub</a><br>'+
    '<a style="color:var(--accent)" href="'+P.contact.cv+'" target="_blank" rel="noopener">Download CV</a>'+
    '</div></div>';

  H += '</div></div>';
  el.innerHTML = H;
  el.classList.add('show');
};

window.showFallback = function(reason){
  try {
    var c = document.getElementById('scene-canvas'); if (c) c.style.display='none';
    var hint = document.getElementById('hint'); if (hint) hint.style.display='none';
    window.buildFallback(reason);
  } catch(e){ /* last resort: leave page as-is */ }
};

/* Safety net: if the ES module never runs (blocked CDN / parse fail),
   show fallback after a short grace period. The module sets window.__SPACE_OK__. */
window.addEventListener('load', function(){
  setTimeout(function(){
    if (!window.__SPACE_OK__ && !document.getElementById('fallback').classList.contains('show')) {
      window.showFallback('library could not load');
    }
  }, 4000);
});
</script>

<script>

try {
  /* ---- webgl probe before importing anything heavy ---- */
  (function(){
    const tc = document.createElement('canvas');
    const gl = tc.getContext('webgl2') || tc.getContext('webgl') || tc.getContext('experimental-webgl');
    if (!gl) throw new Error('no-webgl');
  })();

  const THREE = await import('three');
  const { OrbitControls } = await import('three/addons/controls/OrbitControls.js');

  let bloomPass = null, composer = null, RenderPass = null, UnrealBloomPass = null, EffectComposer = null;
  try {
    ({ EffectComposer } = await import('three/addons/postprocessing/EffectComposer.js'));
    ({ RenderPass }     = await import('three/addons/postprocessing/RenderPass.js'));
    ({ UnrealBloomPass } = await import('three/addons/postprocessing/UnrealBloomPass.js'));
  } catch(e){ /* bloom optional — additive sprites still glow */ }

  window.__SPACE_OK__ = true;
  const reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  window.SFX && SFX.init({ accent:'#7cc8ff', ambient:true, ambientFreq:70 });

  /* ====================== scene setup ====================== */
  const canvas = document.getElementById('scene-canvas');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias:true, alpha:true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.05;

  const scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x020611, 0.011);

  const camera = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.1, 600);
  const HOME = new THREE.Vector3(0, 7, 30);
  camera.position.copy(HOME);

  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.06;
  controls.minDistance = 8;
  controls.maxDistance = 70;
  controls.autoRotate = !reduceMotion;
  controls.autoRotateSpeed = 0.45;
  controls.target.set(0, 0, 0);

  /* ---- lighting ---- */
  scene.add(new THREE.AmbientLight(0x4a6da0, 0.55));
  const key = new THREE.PointLight(0x7cc8ff, 2.2, 120, 1.6); key.position.set(0,0,0); scene.add(key);
  const rim = new THREE.DirectionalLight(0x88aaff, 0.5); rim.position.set(10,18,12); scene.add(rim);

  /* ====================== central core (Saptarshi) ====================== */
  const coreGroup = new THREE.Group(); scene.add(coreGroup);
  const coreGeo = new THREE.IcosahedronGeometry(2.1, 4);
  const coreMat = new THREE.MeshStandardMaterial({
    color:0x9fd4ff, emissive:0x3f8fd6, emissiveIntensity:1.6, roughness:0.25, metalness:0.4
  });
  const core = new THREE.Mesh(coreGeo, coreMat); coreGroup.add(core);

  const coreWire = new THREE.Mesh(
    new THREE.IcosahedronGeometry(2.55, 1),
    new THREE.MeshBasicMaterial({ color:0x7cc8ff, wireframe:true, transparent:true, opacity:0.22 })
  );
  coreGroup.add(coreWire);

  // additive glow sprite around the core for bloom-like halo
  function radialTexture(){
    const s = 128, cv = document.createElement('canvas'); cv.width = cv.height = s;
    const g = cv.getContext('2d');
    const grad = g.createRadialGradient(s/2,s/2,0,s/2,s/2,s/2);
    grad.addColorStop(0,'rgba(180,225,255,1)');
    grad.addColorStop(0.25,'rgba(120,200,255,0.55)');
    grad.addColorStop(1,'rgba(120,200,255,0)');
    g.fillStyle = grad; g.fillRect(0,0,s,s);
    const t = new THREE.CanvasTexture(cv); t.needsUpdate = true; return t;
  }
  const glowTex = radialTexture();
  const coreHalo = new THREE.Sprite(new THREE.SpriteMaterial({
    map: glowTex, color:0x7cc8ff, blending:THREE.AdditiveBlending, transparent:true, opacity:0.9, depthWrite:false
  }));
  coreHalo.scale.set(10,10,1); coreGroup.add(coreHalo);

  /* ====================== section nodes (orbiting) ====================== */
  const NODES = window.NODES;
  const sectionNodes = NODES.filter(n => n.kind !== 'core');
  const pickables = [];               // meshes hit by raycaster
  const labelSprites = [];            // text-label sprites
  const ringRadius = 12;

  function makeLabelSprite(text){
    const pad = 24, fs = 44, font = '600 '+fs+'px Inter, sans-serif';
    const mcv = document.createElement('canvas'); const mg = mcv.getContext('2d');
    mg.font = font; const w = Math.ceil(mg.measureText(text).width) + pad*2;
    const h = fs + pad*1.2;
    mcv.width = w; mcv.height = h;
    const g = mcv.getContext('2d');
    g.font = font; g.textBaseline = 'middle'; g.textAlign = 'center';
    g.fillStyle = 'rgba(4,10,22,0.0)'; g.fillRect(0,0,w,h);
    g.fillStyle = '#e3effc';
    g.shadowColor = 'rgba(124,200,255,0.9)'; g.shadowBlur = 16;
    g.fillText(text, w/2, h/2);
    const tex = new THREE.CanvasTexture(mcv); tex.minFilter = THREE.LinearFilter;
    const spr = new THREE.Sprite(new THREE.SpriteMaterial({ map:tex, transparent:true, depthWrite:false, opacity:0 }));
    spr.scale.set(w/h * 2.2, 2.2, 1);
    spr.userData.baseW = w/h * 2.2;
    return spr;
  }

  // build the Stats core node closer in, plus the ring sections
  const allLayout = [];
  // stats sits just above the core
  allLayout.push({ def: NODES[0], pos: new THREE.Vector3(0, 5.2, 0), shape:'stats' });

  sectionNodes.forEach((def, i) => {
    const a = (i / sectionNodes.length) * Math.PI * 2;
    const y = Math.sin(i * 1.7) * 2.4;
    const pos = new THREE.Vector3(Math.cos(a)*ringRadius, y, Math.sin(a)*ringRadius);
    allLayout.push({ def, pos, shape:'panel', angle:a });
  });

  const shapeFor = (i) => {
    const opts = [
      () => new THREE.BoxGeometry(2.3, 3.0, 0.4),       // monolith panel
      () => new THREE.OctahedronGeometry(1.7, 0),
      () => new THREE.TorusGeometry(1.4, 0.42, 16, 40),
      () => new THREE.IcosahedronGeometry(1.6, 0),
      () => new THREE.BoxGeometry(2.8, 2.0, 0.4),
      () => new THREE.TetrahedronGeometry(1.9, 0)
    ];
    return opts[i % opts.length]();
  };

  allLayout.forEach((L, idx) => {
    const group = new THREE.Group();
    group.position.copy(L.pos);

    let geo;
    if (L.shape === 'stats') {
      geo = new THREE.TorusKnotGeometry(1.0, 0.32, 80, 12);
    } else {
      geo = shapeFor(idx-1);
    }
    const col = L.def.color;
    const mat = new THREE.MeshStandardMaterial({
      color: col, emissive: col, emissiveIntensity: 0.55,
      roughness: 0.35, metalness: 0.5, transparent:true, opacity:0.96
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.userData = {
      key: L.def.key, label: L.def.label, icon: L.def.icon,
      baseScale: 1, baseEmissive: 0.55, group, hovered:false
    };
    group.add(mesh);

    // little additive glow behind each node
    const halo = new THREE.Sprite(new THREE.SpriteMaterial({
      map: glowTex, color: col, blending: THREE.AdditiveBlending, transparent:true, opacity:0.5, depthWrite:false
    }));
    halo.scale.set(5,5,1); group.add(halo);
    mesh.userData.halo = halo;

    // label
    const lab = makeLabelSprite(L.def.label);
    lab.position.set(0, L.shape==='stats' ? 2.2 : 2.6, 0);
    group.add(lab);
    mesh.userData.labelSprite = lab;
    labelSprites.push(lab);

    // connecting line core -> node
    const lineGeo = new THREE.BufferGeometry().setFromPoints([ new THREE.Vector3(0,0,0), L.pos.clone() ]);
    const line = new THREE.Line(lineGeo, new THREE.LineBasicMaterial({ color: col, transparent:true, opacity:0.14 }));
    scene.add(line);

    mesh.userData.spin = new THREE.Vector3(
      (Math.random()-0.5)*0.4, (Math.random()-0.5)*0.5, (Math.random()-0.5)*0.3
    );
    mesh.userData.floatPhase = Math.random()*Math.PI*2;
    mesh.userData.basePos = L.pos.clone();

    scene.add(group);
    pickables.push(mesh);
  });

  /* ====================== starfield ====================== */
  function makeStars(count, spread, size, color){
    const g = new THREE.BufferGeometry();
    const arr = new Float32Array(count*3);
    for (let i=0;i<count;i++){
      const r = spread * (0.35 + Math.random()*0.65);
      const th = Math.random()*Math.PI*2, ph = Math.acos(2*Math.random()-1);
      arr[i*3]   = r*Math.sin(ph)*Math.cos(th);
      arr[i*3+1] = r*Math.cos(ph);
      arr[i*3+2] = r*Math.sin(ph)*Math.sin(th);
    }
    g.setAttribute('position', new THREE.BufferAttribute(arr,3));
    const m = new THREE.PointsMaterial({ color, size, sizeAttenuation:true, transparent:true, opacity:0.9, depthWrite:false });
    return new THREE.Points(g, m);
  }
  const stars1 = makeStars(2400, 220, 0.6, 0xbcd6ff); scene.add(stars1);
  const stars2 = makeStars(1200, 160, 1.1, 0x88a8ff); scene.add(stars2);

  /* drifting particles near the core */
  const driftCount = reduceMotion ? 200 : 600;
  const driftGeo = new THREE.BufferGeometry();
  const driftPos = new Float32Array(driftCount*3);
  const driftVel = new Float32Array(driftCount*3);
  for (let i=0;i<driftCount;i++){
    driftPos[i*3]   = (Math.random()-0.5)*36;
    driftPos[i*3+1] = (Math.random()-0.5)*24;
    driftPos[i*3+2] = (Math.random()-0.5)*36;
    driftVel[i*3]   = (Math.random()-0.5)*0.01;
    driftVel[i*3+1] = (Math.random()-0.5)*0.01;
    driftVel[i*3+2] = (Math.random()-0.5)*0.01;
  }
  driftGeo.setAttribute('position', new THREE.BufferAttribute(driftPos,3));
  const drift = new THREE.Points(driftGeo, new THREE.PointsMaterial({
    map: glowTex, color:0x7cc8ff, size:0.9, transparent:true, opacity:0.4,
    blending:THREE.AdditiveBlending, depthWrite:false
  }));
  scene.add(drift);

  /* ====================== postprocessing bloom (optional) ====================== */
  if (EffectComposer && RenderPass && UnrealBloomPass) {
    composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));
    bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.85, 0.6, 0.2);
    composer.addPass(bloomPass);
    composer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
    composer.setSize(window.innerWidth, window.innerHeight);
  }

  /* ====================== interaction: raycaster pick ====================== */
  const raycaster = new THREE.Raycaster();
  const pointer = new THREE.Vector2();
  let hovered = null;
  let focusMode = false;
  let pointerInside = true;
  const hoverLabel = document.getElementById('hover-label');
  const hoverLabelText = hoverLabel.querySelector('span');
  const hoverLabelIcon = hoverLabel.querySelector('i');

  // reusable temp vectors (avoid per-frame allocation)
  const _v = new THREE.Vector3();

  function setPointerFromEvent(e){
    const x = (e.touches ? e.touches[0].clientX : e.clientX);
    const y = (e.touches ? e.touches[0].clientY : e.clientY);
    pointer.x = (x / window.innerWidth) * 2 - 1;
    pointer.y = -(y / window.innerHeight) * 2 + 1;
    return { x, y };
  }

  renderer.domElement.addEventListener('pointermove', (e) => {
    const p = setPointerFromEvent(e);
    if (hovered && !focusMode) {
      hoverLabel.style.left = p.x + 'px';
      hoverLabel.style.top  = p.y + 'px';
    }
  });
  renderer.domElement.addEventListener('pointerleave', () => { pointerInside = false; });
  renderer.domElement.addEventListener('pointerenter', () => { pointerInside = true; });

  function updateHover(){
    if (focusMode){ if (hovered) clearHover(); return; }
    raycaster.setFromCamera(pointer, camera);
    const hits = raycaster.intersectObjects(pickables, false);
    const obj = hits.length ? hits[0].object : null;
    if (obj !== hovered){
      if (hovered) hovered.userData.hovered = false;
      hovered = obj;
      if (hovered){
        hovered.userData.hovered = true;
        hoverLabelIcon.className = 'fa-solid ' + hovered.userData.icon;
        hoverLabelText.textContent = hovered.userData.label;
        hoverLabel.style.opacity = '1';
        renderer.domElement.style.cursor = 'pointer';
        window.SFX && SFX.play('hover');
      } else {
        hoverLabel.style.opacity = '0';
        renderer.domElement.style.cursor = 'grab';
      }
    }
  }
  function clearHover(){
    if (hovered) hovered.userData.hovered = false;
    hovered = null; hoverLabel.style.opacity = '0';
    renderer.domElement.style.cursor = 'grab';
  }

  /* ---- camera tween ---- */
  const tween = { active:false, t:0, dur:1.0, fromPos:new THREE.Vector3(), toPos:new THREE.Vector3(),
                  fromTarget:new THREE.Vector3(), toTarget:new THREE.Vector3() };
  function easeInOut(t){ return t<0.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2; }
  function tweenCamera(toPos, toTarget, dur, whoosh){
    tween.fromPos.copy(camera.position);
    tween.toPos.copy(toPos);
    tween.fromTarget.copy(controls.target);
    tween.toTarget.copy(toTarget);
    tween.t = 0; tween.dur = dur || 1.0; tween.active = true;
    controls.autoRotate = false;
    if (whoosh) window.SFX && SFX.play('whoosh');
  }

  function focusNode(mesh){
    focusMode = true;
    clearHover();
    const np = mesh.userData.group.position;
    // camera offset along the direction from core to node
    _v.copy(np).normalize();
    const dist = mesh.userData.key === 'stats' ? 9 : 8;
    const camPos = np.clone().add(_v.multiplyScalar(dist)).add(new THREE.Vector3(0, 2.4, 0));
    if (np.lengthSq() < 0.01){ camPos.set(0, np.y + 3, 9); }
    tweenCamera(camPos, np.clone(), 1.0, true);
    window.SFX && SFX.play('select');
    openOverlay(mesh.userData.key);
  }

  function returnHome(){
    focusMode = false;
    closeOverlay();
    tweenCamera(HOME.clone(), new THREE.Vector3(0,0,0), 0.9, true);
    window.SFX && SFX.play('back');
    setTimeout(() => { if (!focusMode && !reduceMotion) controls.autoRotate = true; }, 1100);
  }

  // click / tap to focus
  let downXY = null;
  renderer.domElement.addEventListener('pointerdown', (e) => { const p = setPointerFromEvent(e); downXY = p; });
  renderer.domElement.addEventListener('pointerup', (e) => {
    const p = setPointerFromEvent(e);
    if (!downXY) return;
    const moved = Math.hypot(p.x-downXY.x, p.y-downXY.y);
    downXY = null;
    if (moved > 6) return;            // it was a drag, not a click
    raycaster.setFromCamera(pointer, camera);
    const hits = raycaster.intersectObjects(pickables, false);
    if (hits.length){ focusNode(hits[0].object); }
    else if (focusMode){ returnHome(); }
  });

  /* ====================== overlay HTML panel ====================== */
  const overlay = document.getElementById('overlay');
  const card = document.getElementById('card');
  function openOverlay(key){
    card.innerHTML = window.buildCard(key);
    overlay.classList.add('open');
    const cl = document.getElementById('card-close');
    if (cl) cl.addEventListener('click', returnHome);
  }
  function closeOverlay(){ overlay.classList.remove('open'); }
  // click empty space (the dim background) returns
  overlay.addEventListener('pointerdown', (e) => { if (e.target === overlay) returnHome(); });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && (overlay.classList.contains('open') || focusMode)) returnHome();
  });

  /* fade out the hint after a while */
  setTimeout(() => { const h = document.getElementById('hint'); if (h) h.style.opacity = '0.35'; }, 9000);

  /* ====================== resize ====================== */
  function onResize(){
    const w = window.innerWidth, h = window.innerHeight;
    camera.aspect = w/h; camera.updateProjectionMatrix();
    renderer.setSize(w, h);
    if (composer){ composer.setSize(w, h); }
    if (bloomPass){ bloomPass.setSize(w, h); }
  }
  window.addEventListener('resize', onResize);

  /* ====================== render loop ====================== */
  const clock = new THREE.Clock();
  RUNNING = true;
  let rafId = 0;

  function frame(){
    rafId = requestAnimationFrame(frame);
    const dt = Math.min(clock.getDelta(), 0.05);
    const t = clock.elapsedTime;

    // core pulse
    const pulse = 1 + Math.sin(t*1.6)*0.04;
    core.scale.setScalar(pulse);
    coreMat.emissiveIntensity = 1.4 + Math.sin(t*2.0)*0.3;
    coreHalo.scale.setScalar(10 + Math.sin(t*1.3)*0.6);
    if (!reduceMotion){ coreGroup.rotation.y += dt*0.12; coreWire.rotation.x -= dt*0.06; }

    // node animation
    for (let i=0;i<pickables.length;i++){
      const m = pickables[i], u = m.userData;
      if (!reduceMotion){
        m.rotation.x += u.spin.x * dt;
        m.rotation.y += u.spin.y * dt;
        m.rotation.z += u.spin.z * dt;
        u.group.position.y = u.basePos.y + Math.sin(t*0.6 + u.floatPhase) * 0.4;
      }
      // hover/focus highlight
      const focusedThis = focusMode && hovered === null && false; // focus handled via overlay
      const targetScale = u.hovered ? 1.28 : 1.0;
      const cur = m.scale.x;
      m.scale.setScalar(cur + (targetScale - cur) * Math.min(1, dt*10));
      const targetEm = u.hovered ? 1.6 : u.baseEmissive;
      m.material.emissiveIntensity += (targetEm - m.material.emissiveIntensity) * Math.min(1, dt*10);
      const targetHalo = u.hovered ? 0.95 : 0.5;
      u.halo.material.opacity += (targetHalo - u.halo.material.opacity) * Math.min(1, dt*10);
      // label visibility: show on hover, or when focused & overlay closed-ish
      const labTargetOpacity = u.hovered ? 1 : 0;
      const lm = u.labelSprite.material;
      lm.opacity += (labTargetOpacity - lm.opacity) * Math.min(1, dt*8);
    }

    // drift particles
    if (!reduceMotion){
      const pos = driftGeo.attributes.position.array;
      for (let i=0;i<driftCount;i++){
        pos[i*3]   += driftVel[i*3];
        pos[i*3+1] += driftVel[i*3+1];
        pos[i*3+2] += driftVel[i*3+2];
        // wrap
        if (pos[i*3]   >  18) pos[i*3]   = -18; else if (pos[i*3]   < -18) pos[i*3]   =  18;
        if (pos[i*3+1] >  12) pos[i*3+1] = -12; else if (pos[i*3+1] < -12) pos[i*3+1] =  12;
        if (pos[i*3+2] >  18) pos[i*3+2] = -18; else if (pos[i*3+2] < -18) pos[i*3+2] =  18;
      }
      driftGeo.attributes.position.needsUpdate = true;
      stars1.rotation.y += dt*0.005;
      stars2.rotation.y -= dt*0.003;
    }

    // camera tween
    if (tween.active){
      tween.t += dt / tween.dur;
      const k = Math.min(1, tween.t);
      const e = easeInOut(k);
      camera.position.lerpVectors(tween.fromPos, tween.toPos, e);
      controls.target.lerpVectors(tween.fromTarget, tween.toTarget, e);
      if (k >= 1){ tween.active = false; }
    }

    // hover detection only when not tweening/focused, pointer inside
    if (!tween.active && !focusMode && pointerInside){ updateHover(); }

    controls.update();

    if (composer) composer.render();
    else renderer.render(scene, camera);
  }
  frame();

  /* pause when tab hidden (saves GPU; resumes cleanly) */
  document.addEventListener('visibilitychange', () => {
    if (document.hidden){ if (rafId) cancelAnimationFrame(rafId); rafId = 0; }
    else if (!rafId){ clock.getDelta(); frame(); }
  });

} catch (err) {
  // WebGL missing or Three.js failed to import → graceful HTML fallback
  let reason = 'WebGL unavailable';
  if (err && /import|fetch|network|Failed/i.test(String(err.message))) reason = 'library could not load';
  if (err && String(err.message) === 'no-webgl') reason = 'WebGL not supported';
  window.showFallback(reason);
  if (!RUNNING) window.__SPACE_OK__ = true; // we handled it; suppress the safety-net double fallback
}
</script>
</body>
</html>
