<style>
  :root{
    --accent:#7cc8ff; --ink:#e8f2fd; --dim:#8aa0bd;
    --line:rgba(124,200,255,.22);

    --sans:'Inter',system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden;background:#02040c;color:var(--ink);
    font-family:var(--sans);-webkit-font-smoothing:antialiased}
  #stage{position:fixed;inset:0;display:block;touch-action:none}
  #vig{position:fixed;inset:0;z-index:2;pointer-events:none;
    background:radial-gradient(ellipse 78% 72% at 50% 48%, transparent 46%, rgba(0,2,8,.7) 100%)}

  #titleBlock{position:fixed;left:50%;top:8%;transform:translateX(-50%);z-index:5;text-align:center;
    pointer-events:none;transition:opacity .9s}
  #titleBlock .k{font-family:var(--mono);font-size:10px;letter-spacing:.5em;text-transform:uppercase;
    color:rgba(124,200,255,.8);margin-bottom:10px}

  #titleBlock .s{margin-top:8px;font-family:var(--mono);font-size:10.5px;letter-spacing:.26em;
    text-transform:uppercase;color:var(--dim)}
  #titleBlock.gone{opacity:0}
  #hint{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);z-index:5;
    font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;color:var(--dim);
    pointer-events:none;transition:opacity .8s;white-space:nowrap;
    background:rgba(3,8,18,.5);border:1px solid var(--line);border-radius:999px;padding:7px 16px;
    backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
  #hint b{color:var(--accent);font-weight:500}
  #hint.gone{opacity:0}

  /* hover label */
  #label{position:fixed;z-index:6;pointer-events:none;opacity:0;transform:translate(-50%,-160%);
    font-family:var(--mono);font-size:12px;letter-spacing:.08em;color:#fff;
    background:rgba(4,10,22,.9);border:1px solid var(--line);border-radius:8px;

  #label i{color:var(--accent);margin-right:7px}

  #pClose{position:absolute;top:14px;right:16px;width:33px;height:33px;border-radius:10px;

/* ---------- panel + fallback plumbing (non-module) ---------- */
window.openSection = function(i){
  var s=window.SECTIONS[i];
  var panel=document.getElementById('panel');
  panel.style.setProperty('--pc',s.css);
  document.getElementById('pKick').innerHTML='<i class="fa-solid '+s.icon+'"></i> '+s.kick;
  document.getElementById('pTitle').textContent=s.title;
  document.getElementById('pBody').innerHTML=s.body;
  panel.scrollTop=0;
  document.getElementById('pWrap').classList.add('open');
  document.getElementById('titleBlock').classList.add('gone');
  try{ window.SFX && SFX.play('select'); }catch(e){}
};
window.closeSection = function(){
  var w=document.getElementById('pWrap');
  if(!w.classList.contains('open')) return;
  w.classList.remove('open');
  document.getElementById('titleBlock').classList.remove('gone');
  try{ window.SFX && SFX.play('back'); }catch(e){}
};
document.getElementById('pClose').addEventListener('click',window.closeSection);
document.getElementById('pWrap').addEventListener('click',function(e){ if(e.target===document.getElementById('pWrap')) window.closeSection(); });
addEventListener('keydown',function(e){ if(e.key==='Escape') window.closeSection(); });

window.showFallback = function(){

  document.getElementById('titleBlock').style.display='none';
  document.getElementById('hint').style.display='none';

<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"

</script>
<script type="module">
try{
  /* WebGL probe before importing anything heavy */
  var probe=document.createElement('canvas');
  if(!(probe.getContext('webgl2')||probe.getContext('webgl'))) throw new Error('no webgl');

  const THREE = await import('three');
  const { OrbitControls } = await import('three/addons/controls/OrbitControls.js');

  const REDUCED = matchMedia('(prefers-reduced-motion: reduce)').matches;
  const S = window.SECTIONS;
  const canvas = document.getElementById('stage');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias:true, alpha:false });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setSize(innerWidth, innerHeight);
  renderer.setClearColor(0x02040c, 1);

  const scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x02040c, 0.016);
  const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 400);
  camera.position.set(0, 6, 34);

  const controls = new OrbitControls(camera, canvas);
  controls.enableDamping = true;
  controls.dampingFactor = 0.06;
  controls.minDistance = 10;
  controls.maxDistance = 70;
  controls.autoRotate = !REDUCED;
  controls.autoRotateSpeed = 0.55;
  controls.enablePan = false;

  /* lighting */
  scene.add(new THREE.AmbientLight(0x223344, 1.6));
  const key = new THREE.PointLight(0x88bbff, 320, 200); key.position.set(18, 24, 18); scene.add(key);
  const rim = new THREE.PointLight(0xff9ad5, 140, 160); rim.position.set(-22, -10, -14); scene.add(rim);

  /* ---------- starfield ---------- */
  {
    const N = 2600, pos = new Float32Array(N*3), col = new Float32Array(N*3);
    const tints = [[0.72,0.82,1],[1,0.92,0.8],[0.85,0.8,1],[1,1,1]];
    for(let i=0;i<N;i++){
      const r = 90 + Math.random()*160;
      const th = Math.random()*Math.PI*2, ph = Math.acos(2*Math.random()-1);
      pos[i*3]   = r*Math.sin(ph)*Math.cos(th);
      pos[i*3+1] = r*Math.cos(ph)*0.7;
      pos[i*3+2] = r*Math.sin(ph)*Math.sin(th);
      const t = tints[(Math.random()*tints.length)|0], b = 0.4+Math.random()*0.6;
      col[i*3]=t[0]*b; col[i*3+1]=t[1]*b; col[i*3+2]=t[2]*b;
    }
    const g = new THREE.BufferGeometry();
    g.setAttribute('position', new THREE.BufferAttribute(pos,3));
    g.setAttribute('color', new THREE.BufferAttribute(col,3));
    const m = new THREE.PointsMaterial({ size:0.9, vertexColors:true, transparent:true, opacity:0.9, sizeAttenuation:true, depthWrite:false });
    scene.add(new THREE.Points(g,m));
  }

  /* ---------- soft glow texture (shared) ---------- */
  function glowTexture(){
    const c=document.createElement('canvas'); c.width=c.height=128;
    const x=c.getContext('2d');
    const g=x.createRadialGradient(64,64,0,64,64,64);
    g.addColorStop(0,'rgba(255,255,255,1)');
    g.addColorStop(0.35,'rgba(255,255,255,0.45)');
    g.addColorStop(1,'rgba(255,255,255,0)');
    x.fillStyle=g; x.fillRect(0,0,128,128);
    return new THREE.CanvasTexture(c);
  }
  const glowTex = glowTexture();

  /* ---------- nebula sprites ---------- */
  [[0x35508a,-30,10,-40,60],[0x6a2f74,26,-14,-52,72],[0x1e5a66,4,22,-64,80]].forEach(a=>{
    const sm = new THREE.SpriteMaterial({ map:glowTex, color:a[0], transparent:true, opacity:0.16, blending:THREE.AdditiveBlending, depthWrite:false });
    const sp = new THREE.Sprite(sm);
    sp.position.set(a[1],a[2],a[3]); sp.scale.setScalar(a[4]);
    scene.add(sp);
  });

  /* ---------- the eight crystals ---------- */
  const crystals = [];
  const ringR = 13;
  const crystalGroup = new THREE.Group();
  scene.add(crystalGroup);
  S.forEach((s,i)=>{
    const a = (i/S.length)*Math.PI*2;
    const y = Math.sin(a*2)*3.4;
    const pos = new THREE.Vector3(Math.cos(a)*ringR, y, Math.sin(a)*ringR);
    const geo = new THREE.OctahedronGeometry(1.55, 0);
    const mat = new THREE.MeshStandardMaterial({
      color:s.hex, emissive:s.hex, emissiveIntensity:0.55,
      metalness:0.25, roughness:0.18, flatShading:true, transparent:true, opacity:0.96
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.copy(pos);
    mesh.userData.i = i;
    crystalGroup.add(mesh);
    /* halo sprite */
    const halo = new THREE.Sprite(new THREE.SpriteMaterial({
      map:glowTex, color:s.hex, transparent:true, opacity:0.5,
      blending:THREE.AdditiveBlending, depthWrite:false }));
    halo.scale.setScalar(6.4);
    mesh.add(halo);
    crystals.push({ mesh, halo, base:pos.clone(), spin:0.24+Math.random()*0.3, ph:Math.random()*7 });
  });

  /* constellation lines connecting the story in order */
  {
    const pts=[];
    for(let i=0;i<S.length;i++){
      const a=crystals[i].base, b=crystals[(i+1)%S.length].base;
      const mid=a.clone().add(b).multiplyScalar(0.5); mid.y+=2.2;
      const curve=new THREE.QuadraticBezierCurve3(a,mid,b);
      curve.getPoints(22).forEach((p,k,arr)=>{ if(k<arr.length-1){ pts.push(p, arr[k+1]); } });
    }
    const g=new THREE.BufferGeometry().setFromPoints(pts);
    const m=new THREE.LineBasicMaterial({ color:0x7cc8ff, transparent:true, opacity:0.16, blending:THREE.AdditiveBlending, depthWrite:false });
    crystalGroup.add(new THREE.LineSegments(g,m));
  }

  /* ---------- raycast hover / click ---------- */
  const ray = new THREE.Raycaster();
  const mouse = new THREE.Vector2(-2,-2);
  let hover = -1;
  const labelEl = document.getElementById('label');
  const hintEl = document.getElementById('hint');
  addEventListener('pointermove', e=>{
    mouse.x = (e.clientX/innerWidth)*2-1;
    mouse.y = -(e.clientY/innerHeight)*2+1;
    labelEl.style.left = e.clientX+'px';
    labelEl.style.top = e.clientY+'px';
  });
  let downAt=null;
  addEventListener('pointerdown', e=>{ downAt=[e.clientX,e.clientY]; hintEl.classList.add('gone'); });
  addEventListener('pointerup', e=>{
    if(!downAt) return;
    const moved = Math.hypot(e.clientX-downAt[0], e.clientY-downAt[1]);
    downAt=null;
    if(moved<6 && hover>=0) window.openSection(hover);
  });

  /* ---------- resize / visibility ---------- */
  addEventListener('resize', ()=>{
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });

  /* ---------- loop ---------- */
  const clock = new THREE.Clock();
  function tick(){
    requestAnimationFrame(tick);
    if(document.hidden) return;
    const t = clock.getElapsedTime();
    crystals.forEach((c,i)=>{
      if(!REDUCED){
        c.mesh.rotation.x += 0.004*c.spin*3;
        c.mesh.rotation.y += 0.006*c.spin*3;
        c.mesh.position.y = c.base.y + Math.sin(t*0.7+c.ph)*0.7;
      }
      const target = (hover===i)?1.45:1.0;
      c.mesh.scale.lerp(new THREE.Vector3(target,target,target), 0.12);
      c.halo.material.opacity += (((hover===i)?0.85:0.5) - c.halo.material.opacity)*0.1;
    });
    /* hover pick */
    ray.setFromCamera(mouse, camera);
    const hits = ray.intersectObjects(crystalGroup.children.filter(o=>o.isMesh), false);
    const h = hits.length ? hits[0].object.userData.i : -1;
    if(h!==hover){
      hover=h;
      canvas.style.cursor = h>=0?'pointer':'grab';
      if(h>=0){
        labelEl.innerHTML='<i class="fa-solid '+S[h].icon+'"></i>'+S[h].label;
        labelEl.style.opacity=1;
        try{ window.SFX && SFX.play('hover'); }catch(e){}
      } else labelEl.style.opacity=0;
    }
    controls.update();
    renderer.render(scene, camera);
  }
  tick();
  window.__SPACE_OK__ = true;
}catch(err){
  window.showFallback();
}
</script>
</body>
</html>
