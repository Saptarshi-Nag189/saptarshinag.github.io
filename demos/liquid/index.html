function sh(type,src){ var s=gl.createShader(type); gl.shaderSource(s,src); gl.compileShader(s);

' vT=vUv+vec2(0.,texel.y); vB=vUv-vec2(0.,texel.y); gl_Position=vec4(aP,0.,1.); }');
function prog(fsrc){ var p=gl.createProgram();

  var u={}, n=gl.getProgramParameter(p,gl.ACTIVE_UNIFORMS);
  for(var i=0;i<n;i++){ var inf=gl.getActiveUniform(p,i); u[inf.name]=gl.getUniformLocation(p,inf.name); }
  return {p:p,u:u};
}

'in vec2 vUv; out vec4 o; uniform sampler2D uVel; uniform sampler2D uSrc; uniform vec2 texel; uniform float dt; uniform float diss;\n'+
'void main(){ vec2 coord=vUv-dt*texture(uVel,vUv).xy*texel;'+
' o=texture(uSrc,coord)*diss; }');
var pDiv=prog(
'in vec2 vUv,vL,vR,vT,vB; out vec4 o; uniform sampler2D uVel;\n'+
'void main(){ float L=texture(uVel,vL).x,R=texture(uVel,vR).x,T=texture(uVel,vT).y,B=texture(uVel,vB).y;'+
' o=vec4(0.5*(R-L+T-B),0.,0.,1.); }');
var pCurl=prog(
'in vec2 vUv,vL,vR,vT,vB; out vec4 o; uniform sampler2D uVel;\n'+
'void main(){ float L=texture(uVel,vL).y,R=texture(uVel,vR).y,T=texture(uVel,vT).x,B=texture(uVel,vB).x;'+
' o=vec4(R-L-(T-B),0.,0.,1.); }');
var pVort=prog(
'in vec2 vUv,vL,vR,vT,vB; out vec4 o; uniform sampler2D uVel; uniform sampler2D uCurl; uniform float curlK; uniform float dt;\n'+
'void main(){ float L=texture(uCurl,vL).x,R=texture(uCurl,vR).x,T=texture(uCurl,vT).x,B=texture(uCurl,vB).x,C=texture(uCurl,vUv).x;'+
' vec2 f=0.5*vec2(abs(T)-abs(B),abs(R)-abs(L)); f/=(length(f)+1e-4); f*=curlK*C; f.y*=-1.;'+
' vec2 v=texture(uVel,vUv).xy + f*dt; o=vec4(clamp(v,-1000.,1000.),0.,1.); }');
var pPress=prog(
'in vec2 vUv,vL,vR,vT,vB; out vec4 o; uniform sampler2D uP; uniform sampler2D uDiv;\n'+
'void main(){ float L=texture(uP,vL).x,R=texture(uP,vR).x,T=texture(uP,vT).x,B=texture(uP,vB).x;'+
' float div=texture(uDiv,vUv).x; o=vec4((L+R+T+B-div)*0.25,0.,0.,1.); }');
var pGrad=prog(
'in vec2 vUv,vL,vR,vT,vB; out vec4 o; uniform sampler2D uP; uniform sampler2D uVel;\n'+
'void main(){ float L=texture(uP,vL).x,R=texture(uP,vR).x,T=texture(uP,vT).x,B=texture(uP,vB).x;'+
' vec2 v=texture(uVel,vUv).xy - vec2(R-L,T-B)*0.5; o=vec4(v,0.,1.); }');
var pShow=prog(
'in vec2 vUv; out vec4 o; uniform sampler2D uDye;\n'+
'void main(){ vec3 c=texture(uDye,vUv).rgb;\n'+
'  vec3 bg1=vec3(0.012,0.028,0.066), bg2=vec3(0.004,0.010,0.026);\n'+
'  vec3 bg=mix(bg1,bg2,distance(vUv,vec2(0.5,0.42))*1.3);\n'+
'  c=c/(1.0+c*0.8);\n'+                       /* soft tonemap */
'  vec3 col=bg + c;\n'+
'  float vg=smoothstep(1.15,0.35,distance(vUv,vec2(0.5,0.45)));\n'+
'  o=vec4(col*mix(0.55,1.0,vg),1.); }');

/* --- double-buffered targets --- */
function makeFBO(w,h,internal,format,type,filter){
  var t=gl.createTexture(); gl.bindTexture(gl.TEXTURE_2D,t);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,filter);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,filter);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
  gl.texImage2D(gl.TEXTURE_2D,0,internal,w,h,0,format,type,null);
  var f=gl.createFramebuffer(); gl.bindFramebuffer(gl.FRAMEBUFFER,f);
  gl.framebufferTexture2D(gl.FRAMEBUFFER,gl.COLOR_ATTACHMENT0,gl.TEXTURE_2D,t,0);
  gl.clearColor(0,0,0,1); gl.clear(gl.COLOR_BUFFER_BIT);
  return {t:t,f:f,w:w,h:h,texX:1/w,texY:1/h};
}
function dbl(w,h,internal,format,type,filter){
  var a=makeFBO(w,h,internal,format,type,filter), b2=makeFBO(w,h,internal,format,type,filter);
  return { get read(){return a;}, get write(){return b2;}, swap:function(){var t=a;a=b2;b2=t;},
           texX:a.texX, texY:a.texY, w:w, h:h };
}
var SIMW=(innerWidth<820)?96:144, SIMH, DYEW=(innerWidth<820)?384:640, DYEH;
(function(){ var ar=innerWidth/innerHeight;
  SIMH=Math.round(SIMW/ar); DYEH=Math.round(DYEW/ar); })();
var velocity=dbl(SIMW,SIMH,gl.RG16F,gl.RG,gl.HALF_FLOAT,gl.LINEAR);
var dye=dbl(DYEW,DYEH,gl.RGBA16F,gl.RGBA,gl.HALF_FLOAT,gl.LINEAR);
var divTex=makeFBO(SIMW,SIMH,gl.R16F,gl.RED,gl.HALF_FLOAT,gl.NEAREST);
var curlTex=makeFBO(SIMW,SIMH,gl.R16F,gl.RED,gl.HALF_FLOAT,gl.NEAREST);
var pressure=dbl(SIMW,SIMH,gl.R16F,gl.RED,gl.HALF_FLOAT,gl.NEAREST);

function bindTex(unit,tex){ gl.activeTexture(gl.TEXTURE0+unit); gl.bindTexture(gl.TEXTURE_2D,tex); return unit; }

/* --- splat --- */
function splat(x,y,dx,dy,color,radius){
  gl.viewport(0,0,SIMW,SIMH);
  gl.useProgram(pSplat.p);
  gl.uniform1i(pSplat.u.uT,bindTex(0,velocity.read.t));
  gl.uniform1f(pSplat.u.aspect,innerWidth/innerHeight);
  gl.uniform2f(pSplat.u.point,x,y);
  gl.uniform3f(pSplat.u.color,dx,dy,0);
  gl.uniform1f(pSplat.u.radius,(radius||0.0016));
  blit(velocity.write.f); velocity.swap();
  gl.viewport(0,0,DYEW,DYEH);
  gl.uniform1i(pSplat.u.uT,bindTex(0,dye.read.t));
  gl.uniform2f(pSplat.u.point,x,y);
  gl.uniform3f(pSplat.u.color,color[0],color[1],color[2]);
  gl.uniform1f(pSplat.u.radius,(radius||0.0016)*1.4);
  blit(dye.write.f); dye.swap();
}

/* --- frame --- */
var lastT=0, paused=false;
function step(dt){
  gl.disable(gl.BLEND);
  gl.viewport(0,0,SIMW,SIMH);
  /* curl + vorticity */
  gl.useProgram(pCurl.p);
  gl.uniform2f(pCurl.u.texel,velocity.texX,velocity.texY);
  gl.uniform1i(pCurl.u.uVel,bindTex(0,velocity.read.t));
  blit(curlTex.f);
  gl.useProgram(pVort.p);
  gl.uniform2f(pVort.u.texel,velocity.texX,velocity.texY);
  gl.uniform1i(pVort.u.uVel,bindTex(0,velocity.read.t));
  gl.uniform1i(pVort.u.uCurl,bindTex(1,curlTex.t));
  gl.uniform1f(pVort.u.curlK,26);
  gl.uniform1f(pVort.u.dt,dt);
  blit(velocity.write.f); velocity.swap();
  /* divergence + pressure */
  gl.useProgram(pDiv.p);
  gl.uniform2f(pDiv.u.texel,velocity.texX,velocity.texY);
  gl.uniform1i(pDiv.u.uVel,bindTex(0,velocity.read.t));
  blit(divTex.f);
  gl.useProgram(pPress.p);
  gl.uniform2f(pPress.u.texel,velocity.texX,velocity.texY);
  gl.uniform1i(pPress.u.uDiv,bindTex(1,divTex.t));
  for(var i=0;i<28;i++){
    gl.uniform1i(pPress.u.uP,bindTex(0,pressure.read.t));
    blit(pressure.write.f); pressure.swap();
  }
  gl.useProgram(pGrad.p);
  gl.uniform2f(pGrad.u.texel,velocity.texX,velocity.texY);
  gl.uniform1i(pGrad.u.uP,bindTex(0,pressure.read.t));
  gl.uniform1i(pGrad.u.uVel,bindTex(1,velocity.read.t));
  blit(velocity.write.f); velocity.swap();
  /* advect */
  gl.useProgram(pAdvect.p);
  gl.uniform2f(pAdvect.u.texel,velocity.texX,velocity.texY);
  gl.uniform1f(pAdvect.u.dt,dt);
  /* framerate-independent decay: diss^(dt*60) so physics doesn't change with fps */
  gl.uniform1f(pAdvect.u.diss,Math.pow(0.9985,dt*60));
  gl.uniform1i(pAdvect.u.uVel,bindTex(0,velocity.read.t));
  gl.uniform1i(pAdvect.u.uSrc,bindTex(0,velocity.read.t));
  blit(velocity.write.f); velocity.swap();
  gl.viewport(0,0,DYEW,DYEH);
  gl.uniform2f(pAdvect.u.texel,velocity.texX,velocity.texY);
  gl.uniform1f(pAdvect.u.diss,Math.pow(0.992,dt*60));
  gl.uniform1i(pAdvect.u.uVel,bindTex(0,velocity.read.t));
  gl.uniform1i(pAdvect.u.uSrc,bindTex(1,dye.read.t));
  blit(dye.write.f); dye.swap();
}
function render(){
  gl.viewport(0,0,canvas.width,canvas.height);
  gl.useProgram(pShow.p);
  gl.uniform2f(pShow.u.texel,1/canvas.width,1/canvas.height);
  gl.uniform1i(pShow.u.uDye,bindTex(0,dye.read.t));
  blit(null);
}

/* --- pointer stirring --- */
var px=0.5,py=0.5,pdown=false,lastMove=0,hintEl=document.getElementById('hint');
function pointerMove(e){
  var nx=e.clientX/innerWidth, ny=1-e.clientY/innerHeight;
  var dx=(nx-px)*SIMW*11, dy=(ny-py)*SIMH*11;
  var sp=Math.abs(dx)+Math.abs(dy);
  if(sp>0.4){
    var hue=(performance.now()*0.00006)%1;
    splat(nx,ny,dx,dy,hsv(hue,0.72,0.5),0.0024);
    var now=performance.now();
    if(sp>26 && now-lastMove>420){ lastMove=now; sfx('drip'); }
    if(now>6000) hintEl.classList.add('gone');
  }
  px=nx; py=ny;
}
addEventListener('pointermove',pointerMove);
addEventListener('pointerdown',function(e){
  pdown=true;
  var nx=e.clientX/innerWidth, ny=1-e.clientY/innerHeight;
  splat(nx,ny,0,0,hsv(Math.random(),0.8,0.5),0.004);
});
addEventListener('pointerup',function(){ pdown=false; });
function hsv(h,s,v){
  var i=Math.floor(h*6),f=h*6-i,p=v*(1-s),q=v*(1-f*s),t=v*(1-(1-f)*s);
  var r,g,b;
  switch(i%6){case 0:r=v;g=t;b=p;break;case 1:r=q;g=v;b=p;break;case 2:r=p;g=v;b=t;break;
    case 3:r=p;g=q;b=v;break;case 4:r=t;g=p;b=v;break;default:r=v;g=p;b=q;}
  return [r,g,b];
}

/* --- orb bursts --- */
[].forEach.call(orbsEl.children,function(orb){
  orb.addEventListener('mouseenter',function(){
    sfx('hover');
    var r=orb.getBoundingClientRect();
    var nx=(r.left+r.width/2)/innerWidth, ny=1-(r.top+r.height/2)/innerHeight;
    var c=SECTIONS[+orb.dataset.i].color;
    splat(nx,ny,0,3,[c[0]*0.25,c[1]*0.25,c[2]*0.25],0.002);
  });
  orb.addEventListener('click',function(){
    var i=+orb.dataset.i, c=SECTIONS[i].color;
    var r=orb.getBoundingClientRect();
    var nx=(r.left+r.width/2)/innerWidth, ny=1-(r.top+r.height/2)/innerHeight;
    for(var k=0;k<8;k++){
      var a=(k/8)*Math.PI*2;
      splat(nx,ny,Math.cos(a)*28,Math.sin(a)*28,[c[0]*0.55,c[1]*0.55,c[2]*0.55],0.0035);
    }
    openPanel(i);
  });
});

/* --- idle life: wandering auto-splats --- */
var wander={x:0.3,y:0.55,a:0.6};
function idleSplat(t){
  wander.a+=(Math.random()-0.5)*0.7;
  wander.x=Math.min(0.92,Math.max(0.08,wander.x+Math.cos(wander.a)*0.015));
  wander.y=Math.min(0.9,Math.max(0.25,wander.y+Math.sin(wander.a)*0.015));
  var hue=(t*0.00002)%1;
  splat(wander.x,wander.y,Math.cos(wander.a)*7,Math.sin(wander.a)*7,hsv(hue,0.65,0.17),0.0022);
}

/* --- initial art: seed splats spelling presence --- */
function seed(){
  for(var i=0;i<10;i++){
    var x=0.2+Math.random()*0.6, y=0.3+Math.random()*0.45;
    var c=SECTIONS[i%SECTIONS.length].color;
    splat(x,y,(Math.random()-0.5)*60,(Math.random()-0.5)*60,[c[0]*0.4,c[1]*0.4,c[2]*0.4],0.005);
  }
}

/* --- main loop --- */
var raf=null;
function loop(t){
  raf=requestAnimationFrame(loop);
  if(document.hidden) return;
  var dt=Math.min(0.033,(t-lastT)/1000||0.016); lastT=t;
  if(!REDUCED){
    if(Math.random()<0.09) idleSplat(t);
    step(dt);
  }
  render();
}
addEventListener('resize',function(){ sizeCanvas(); render(); });
seed();
if(REDUCED){
  /* a few gentle steps to settle the seed art, then hold still */
  for(var i=0;i<40;i++) step(0.016);
  render();
  hintEl.innerHTML='<i class="fa-solid fa-hand-pointer"></i>&nbsp; click an orb to open a chapter';
  raf=requestAnimationFrame(function r(t){ raf=requestAnimationFrame(r); if(!document.hidden) render(); });
} else {
  raf=requestAnimationFrame(loop);
}
window.__liquid=function(){ return { webgl:true, simW:SIMW, dyeW:DYEW }; };
})();
</script>
