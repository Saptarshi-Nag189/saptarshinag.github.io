<style>
  :root{
    --violet:#a78bfa;
    --indigo:#7c5cff;
    --bg:#07060d;
    --bg2:#0d0a18;
    --ink:#e8e6f2;
    --muted:#9a96b3;
    --line:rgba(167,139,250,.18);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;width:100%;overflow:hidden;background:var(--bg);}
  body{
    font-family:'Inter',system-ui,sans-serif;
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    position:relative;
    touch-action:none;
  }
  #graph{
    position:fixed;inset:0;display:block;
    cursor:grab;
  }
  #graph.grabbing{cursor:grabbing;}
  #graph.hovering{cursor:pointer;}

  /* vignette overlay */
  .vignette{
    position:fixed;inset:0;pointer-events:none;z-index:2;
    background:radial-gradient(ellipse 120% 120% at 50% 45%, transparent 38%, rgba(3,2,8,.55) 78%, rgba(2,1,6,.92) 100%);
    mix-blend-mode:normal;
  }

  /* top-left back link */
  .topbar{
    position:fixed;top:0;left:0;z-index:6;
    padding:18px 22px;display:flex;align-items:center;gap:14px;
    pointer-events:none;
  }
  .back{
    pointer-events:auto;
    font-family:'JetBrains Mono',monospace;
    font-size:12.5px;letter-spacing:.04em;
    color:var(--muted);text-decoration:none;
    padding:7px 13px;border:1px solid var(--line);border-radius:999px;
    background:rgba(13,10,24,.55);backdrop-filter:blur(8px);
    transition:color .25s,border-color .25s,background .25s;
  }
  .back:hover{color:var(--violet);border-color:rgba(167,139,250,.5);background:rgba(124,92,255,.12);}
  .back i{margin-right:5px;font-size:11px;}
  .tag{
    font-family:'JetBrains Mono',monospace;
    font-size:10px;letter-spacing:.22em;text-transform:uppercase;
    color:rgba(154,150,179,.6);
    border:1px solid rgba(167,139,250,.12);
    padding:4px 9px;border-radius:4px;
  }

  /* title block top-center-ish */
  .brand{
    position:fixed;top:14px;left:50%;transform:translateX(-50%);
    z-index:5;text-align:center;pointer-events:none;
    background:rgba(13,10,24,.55);backdrop-filter:blur(7px);-webkit-backdrop-filter:blur(7px);
    padding:9px 22px 10px;border-radius:16px;border:1px solid var(--line);
  }
  .brand h1{
    font-size:13px;font-weight:600;letter-spacing:.34em;text-transform:uppercase;
    color:var(--violet);opacity:.85;
    text-shadow:0 0 22px rgba(124,92,255,.6);
  }
  .brand p{
    margin-top:5px;font-family:'JetBrains Mono',monospace;
    font-size:10.5px;color:var(--muted);letter-spacing:.08em;opacity:.7;
  }

  /* hint bottom-center */
  .hint{
    position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
    z-index:5;pointer-events:none;
    font-family:'JetBrains Mono',monospace;
    font-size:11px;letter-spacing:.06em;color:var(--muted);
    background:rgba(13,10,24,.45);backdrop-filter:blur(6px);
    padding:7px 16px;border-radius:999px;border:1px solid var(--line);
    white-space:nowrap;opacity:.85;
  }
  .hint b{color:var(--violet);font-weight:500;}

  /* legend bottom-left */
  .legend{
    position:fixed;bottom:18px;left:18px;z-index:5;
    background:rgba(11,8,20,.6);backdrop-filter:blur(10px);
    border:1px solid var(--line);border-radius:12px;
    padding:12px 14px;
    font-family:'JetBrains Mono',monospace;font-size:11px;
    pointer-events:auto;
    transition:opacity .3s;
  }
  .legend h2{
    font-size:9px;letter-spacing:.2em;text-transform:uppercase;
    color:var(--muted);margin-bottom:9px;font-weight:600;
  }
  .legend .row{display:flex;align-items:center;gap:9px;margin:5px 0;color:#cfcbe2;cursor:default;}
  .legend .dot{width:10px;height:10px;border-radius:50%;flex:none;box-shadow:0 0 8px currentColor;}
  .legend .row i.fa-solid{width:13px;text-align:center;font-size:11px;flex:none;}

  /* detail panel right */
  .panel{
    position:fixed;top:0;right:0;height:100%;width:380px;max-width:88vw;
    z-index:7;
    background:linear-gradient(180deg, rgba(16,12,28,.94), rgba(9,7,17,.96));
    backdrop-filter:blur(18px);
    border-left:1px solid rgba(167,139,250,.22);
    box-shadow:-30px 0 80px rgba(0,0,0,.5), inset 1px 0 0 rgba(167,139,250,.06);
    transform:translateX(105%);
    transition:transform .55s cubic-bezier(.16,.84,.3,1);
    display:flex;flex-direction:column;
    overflow:hidden;
  }
  .panel.open{transform:translateX(0);}
  .panel .scroll{overflow-y:auto;padding:30px 28px 36px;height:100%;}
  .panel .scroll::-webkit-scrollbar{width:8px;}
  .panel .scroll::-webkit-scrollbar-thumb{background:rgba(124,92,255,.3);border-radius:8px;}
  .panel .kicker{
    font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.22em;
    text-transform:uppercase;color:var(--violet);opacity:.9;margin-bottom:8px;
    display:flex;align-items:center;gap:8px;
  }
  .panel .kicker .pdot{width:8px;height:8px;border-radius:50%;box-shadow:0 0 10px currentColor;}
  .panel h3{font-size:25px;font-weight:600;line-height:1.15;letter-spacing:-.01em;margin-bottom:6px;}
  .panel .sub{font-size:13px;color:var(--muted);margin-bottom:18px;font-weight:400;}
  .panel .body{font-size:14px;line-height:1.62;color:#d6d3e6;}
  .panel .body p{margin-bottom:13px;}
  .panel .body ul{list-style:none;margin:6px 0 14px;padding:0;}
  .panel .body ul li{
    position:relative;padding:7px 0 7px 22px;font-size:13.5px;line-height:1.5;
    color:#d6d3e6;border-bottom:1px solid rgba(167,139,250,.07);
  }
  .panel .body ul li:last-child{border-bottom:none;}
  .panel .body ul li > i.fa-solid{
    position:absolute;left:0;top:9px;font-size:11px;color:var(--violet);opacity:.85;
  }
  .panel .body b{color:#f0ecff;font-weight:600;}
  .panel .seclabel{
    font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:.2em;
    text-transform:uppercase;color:var(--muted);margin:18px 0 8px;
    display:flex;align-items:center;gap:7px;
  }
  .panel .seclabel i{color:var(--violet);opacity:.8;font-size:10px;}
  .panel .meta{
    display:flex;flex-wrap:wrap;gap:7px;margin:4px 0 20px;
  }
  .panel .chip{
    font-family:'JetBrains Mono',monospace;font-size:11px;
    padding:5px 10px;border-radius:6px;
    background:rgba(124,92,255,.1);border:1px solid rgba(167,139,250,.22);
    color:#cbbff4;
  }
  .panel .stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:6px 0 20px;}
  .panel .stat{
    background:rgba(124,92,255,.07);border:1px solid var(--line);
    border-radius:10px;padding:12px 13px;
  }
  .panel .stat .num{font-size:19px;font-weight:700;color:#fff;letter-spacing:-.01em;}
  .panel .stat .lbl{font-size:10.5px;color:var(--muted);margin-top:3px;line-height:1.3;}
  .panel .conns{margin-top:6px;}
  .panel .conns .ch2{
    font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:.2em;
    text-transform:uppercase;color:var(--muted);margin-bottom:10px;
  }
  .panel .conn{
    display:flex;align-items:center;gap:10px;
    padding:8px 10px;margin-bottom:6px;border-radius:8px;cursor:pointer;
    border:1px solid transparent;transition:background .2s,border-color .2s;
    font-size:13px;color:#cfcbe2;
  }
  .panel .conn:hover{background:rgba(124,92,255,.12);border-color:rgba(167,139,250,.3);}
  .panel .conn .cdot{width:9px;height:9px;border-radius:50%;flex:none;box-shadow:0 0 8px currentColor;}
  .panel .conn i.fa-solid{width:14px;text-align:center;font-size:11px;flex:none;opacity:.85;}
  .panel .kicker i.fa-solid{font-size:11px;}
  .panel a.lk i{width:18px;text-align:center;font-size:14px;opacity:.85;flex:none;}
  .panel .links{display:flex;flex-direction:column;gap:9px;margin-top:6px;}
  .panel a.lk{
    color:#c9bdf6;text-decoration:none;font-size:13.5px;
    display:flex;align-items:center;gap:9px;
    padding:9px 12px;border-radius:9px;border:1px solid var(--line);
    background:rgba(124,92,255,.06);transition:all .2s;
  }
  .panel a.lk:hover{border-color:rgba(167,139,250,.5);background:rgba(124,92,255,.14);color:#fff;}
  .panel .close{
    position:absolute;top:18px;right:18px;z-index:2;
    width:34px;height:34px;border-radius:50%;
    border:1px solid var(--line);background:rgba(124,92,255,.08);
    color:var(--muted);font-size:18px;cursor:pointer;line-height:1;
    display:flex;align-items:center;justify-content:center;
    transition:all .2s;
  }
  .panel .close:hover{color:#fff;border-color:rgba(167,139,250,.5);background:rgba(124,92,255,.2);transform:rotate(90deg);}

  @media (max-width:600px){
    .brand{display:none;}
    .legend{font-size:10px;padding:9px 11px;bottom:14px;left:12px;}
    .hint{font-size:9.5px;padding:6px 11px;bottom:auto;top:54px;}
    .topbar{padding:12px 14px;}
    .panel{width:100%;}
  }
  @media (prefers-reduced-motion:reduce){
    .panel{transition:transform .01s;}
    .close:hover{transform:none;}
  }
</style>
</head>

  var REPULSION = 9000;

  function step(){
    var cx = W/2, cy = H/2;
    var i,j,n,m,dx,dy,d2,d,f;

    for(i=0;i<NODES.length;i++){

      if(n.fixed) continue;
      // centering
      n.vx += (cx - n.x) * CENTER;
      n.vy += (cy - n.y) * CENTER;
    }

    // repulsion (all pairs — small graph)
    for(i=0;i<NODES.length;i++){
      n = NODES[i];
      for(j=i+1;j<NODES.length;j++){
        m = NODES[j];
        dx = n.x - m.x; dy = n.y - m.y;
        d2 = dx*dx + dy*dy;
        if(d2 < 0.01) d2 = 0.01;
        d = Math.sqrt(d2);
        f = REPULSION / d2;
        var fx = (dx/d)*f, fy = (dy/d)*f;
        if(!n.fixed){ n.vx += fx; n.vy += fy; }
        if(!m.fixed){ m.vx -= fx; m.vy -= fy; }

    for(i=0;i<EDGES.length;i++){
      var e = EDGES[i];

      d = Math.sqrt(dx*dx+dy*dy) || 0.01;
      var targ = SPRING_LEN + n.r + m.r;
      f = (d - targ) * SPRING;
      var sx = (dx/d)*f, sy = (dy/d)*f;
      if(!n.fixed){ n.vx += sx; n.vy += sy; }
      if(!m.fixed){ m.vx -= sx; m.vy -= sy; }
    }

    // integrate
    var maxV = 0;
    for(i=0;i<NODES.length;i++){
      n = NODES[i];
      if(n.fixed){ n.vx=0; n.vy=0; continue; }
      n.vx *= DAMP; n.vy *= DAMP;
      if(n === hovered || n === selected){ n.vx *= 0.25; n.vy *= 0.25; } // hold still under the cursor so it's easy to click
      n.x += n.vx; n.y += n.vy;
      var v = Math.abs(n.vx)+Math.abs(n.vy);
      if(v>maxV) maxV = v;
    }
    return maxV;
  }

  // convert screen -> world
  function toWorld(sx, sy){

  function toScreen(wx, wy){

  // Hit-test in SCREEN space so the clickable area always matches what the
  // user sees, independent of the current pan offset and zoom scale.
  // The mouse coords (sx,sy) are canvas-relative screen pixels; each node's
  // world position is projected to screen via toScreen(), and we compare
  // against a screen-pixel radius (node radius * scale) plus a constant
  // padding so even tiny zoomed-out nodes stay easy to click.
  function nodeAt(sx, sy){
    var best=null, bestD=Infinity;
    for(var i=NODES.length-1;i>=0;i--){
      var n = NODES[i];
      var s = toScreen(n.x, n.y);
      var dx = s.x - sx, dy = s.y - sy;
      // node radius in screen px (generous padding + min target for easy clicks)
      var rr = Math.max(n.r * view.scale + 18, 22);
      var d2 = dx*dx + dy*dy;
      if(d2 <= rr*rr && d2 < bestD){ bestD = d2; best = n; }
    }
    return best;
  }

  function isRelated(n){

  function edgeActive(e){

    }

  // Cached background gradient (rebuilt only on resize) to avoid allocating a
  // fresh radial gradient every single frame.
  var bgGrad = null;
  function buildBgGrad(){
    bgGrad = ctx.createRadialGradient(W*0.5,H*0.42,0, W*0.5,H*0.42, Math.max(W,H)*0.8);

  function draw(dtMs){

  // ---------- color helpers ----------
  function hexA(hex, a){
    if(hex[0]!=='#') return hex;
    var h = hex.slice(1);
    if(h.length===3) h = h[0]+h[0]+h[1]+h[1]+h[2]+h[2];
    var r=parseInt(h.slice(0,2),16), g=parseInt(h.slice(2,4),16), b=parseInt(h.slice(4,6),16);
    return 'rgba('+r+','+g+','+b+','+a+')';
  }
  function lighten(hex){
    var h = hex.slice(1);
    if(h.length===3) h = h[0]+h[0]+h[1]+h[1]+h[2]+h[2];
    var r=parseInt(h.slice(0,2),16), g=parseInt(h.slice(2,4),16), b=parseInt(h.slice(4,6),16);
    r=Math.min(255,r+80); g=Math.min(255,g+80); b=Math.min(255,b+80);

  // ---------- main loop ----------
  var running = true;
  var settled = false;

  // Fixed-timestep accumulator so physics is frame-rate independent and can
  // never "explode" after a long stall (e.g. tab regains focus). We cap the
  // number of catch-up steps per frame so a huge dt is dropped, not simulated.
  var lastT = 0;
  var STEP_MS = 1000/60;       // one physics tick = ~16.67ms of sim time
  var MAX_STEPS = 5;           // at most 5 catch-up ticks per rendered frame
  var accumulator = 0;

  function loop(now){
    if(!running){ return; }
    if(typeof now !== 'number') now = performance.now();
    var dt = now - lastT;
    lastT = now;
    // Clamp dt: anything above ~100ms (stall/tab-switch) is treated as one
    // capped chunk so the accumulator never balloons.
    if(dt > 100) dt = STEP_MS;
    accumulator += dt;

    var active = (!settled || dragNode || focusAnim);
    if(active){
      var steps = 0;
      var mv = 0;
      while(accumulator >= STEP_MS && steps < MAX_STEPS){
        mv = step();
        accumulator -= STEP_MS;
        steps++;
        settleFrames++;
        if(mv < 0.12 && !dragNode && settleFrames > 40){ settled = true; break; }
        if(settleFrames > 1400){ settled = true; break; }
      }
      // Drop any leftover backlog so we don't spiral after a slow frame.
      if(accumulator > STEP_MS) accumulator = 0;

    }

    rafId = requestAnimationFrame(loop);

  // ---------- focus / center animation ----------
  var focusAnim = null;
  function focusOn(node){

    var sp = { x:W*0.42, y:H*0.5 }; // shift left to leave room for panel

      fromX:view.x, fromY:view.y, fromS:view.scale,
      node:node, sp:sp, ts:targetScale,
      t0: performance.now(), dur: prefersReduced?1:650
    };
  }
  function applyFocusAnim(){
    var fa = focusAnim;
    var p = (performance.now() - fa.t0)/fa.dur;
    if(p>=1) p=1;
    var e = 1 - Math.pow(1-p, 3);
    var ns = fa.fromS + (fa.ts - fa.fromS)*e;
    // we want toScreen(node) ~ sp at scale ns
    var targX = fa.sp.x - fa.node.x*fa.ts;
    var targY = fa.sp.y - fa.node.y*fa.ts;
    view.scale = ns;
    view.x = fa.fromX + (targX - fa.fromX)*e;
    view.y = fa.fromY + (targY - fa.fromY)*e;
    if(p>=1) focusAnim = null;
  }

  function esc(s){ return String(s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }

  // ---------- pointer events ----------
  function getXY(ev){
    var r = canvas.getBoundingClientRect();
    // On touchend the `touches` list is empty — fall back to changedTouches
    // so taps still resolve to a coordinate.
    var src = ev;
    if(ev.touches && ev.touches.length){ src = ev.touches[0]; }
    else if(ev.changedTouches && ev.changedTouches.length){ src = ev.changedTouches[0]; }
    return { x: src.clientX - r.left, y: src.clientY - r.top };
  }

  function onDown(ev){
    var p = getXY(ev);
    pointerDownPos = p;
    dragMoved = false;
    var n = nodeAt(p.x, p.y);
    if(n){
      dragNode = n;
      n.fixed = true;
      settled = false;
      canvas.classList.add('grabbing');

      lastPanX = p.x; lastPanY = p.y;

  // Movement under this many screen px counts as a click, not a drag — gives
  // a forgiving tap target so minor jitter never swallows a node click.
  var CLICK_SLOP = 6;
  function onMove(ev){
    var p = getXY(ev);

      // a tiny jitter on press still resolves as a click on release.
      if(pointerDownPos && dist(p, pointerDownPos) > CLICK_SLOP) dragMoved = true;
      if(dragMoved){
        if(ev.cancelable) ev.preventDefault();
        var w = toWorld(p.x, p.y);
        dragNode.x = w.x; dragNode.y = w.y;
        dragNode.vx = 0; dragNode.vy = 0;
        settled = false; settleFrames = 0;
      }
    } else if(panning){
      if(ev.cancelable) ev.preventDefault();
      view.x += (p.x - lastPanX);
      view.y += (p.y - lastPanY);
      lastPanX = p.x; lastPanY = p.y;
      if(pointerDownPos && dist(p, pointerDownPos) > CLICK_SLOP) dragMoved = true;
      // panning cancels any focus animation
      focusAnim = null;
    } else {
      // hover
      var n = nodeAt(p.x, p.y);
      if(n !== hovered){
        hovered = n;
        canvas.classList.toggle('hovering', !!n);
        // throttle: only when the hovered node actually changes (and is a node)
        if(n) sfx('hover');
      }
    }
  }
  function onUp(ev){
    canvas.classList.remove('grabbing');
    var wasDragNode = dragNode;
    if(dragNode){
      dragNode.fixed = false;
      dragNode = null;
    }
    if(panning){ panning = false; }

    if(!dragMoved && pointerDownPos){
      // it's a click/tap
      var n = wasDragNode || nodeAt(pointerDownPos.x, pointerDownPos.y);
      if(n){
        sfx('pulse');          // node opened — synaptic blip
        selectNode(n);
      } else if(selected){
        sfx('back');           // tap empty space dismisses the card
        selectNode(null);
      }
    }
    pointerDownPos = null;
  }
  function dist(a,b){ var dx=a.x-b.x, dy=a.y-b.y; return Math.sqrt(dx*dx+dy*dy); }

  canvas.addEventListener('mousedown', onDown);
  window.addEventListener('mousemove', onMove);
  window.addEventListener('mouseup', onUp);

  canvas.addEventListener('touchstart', function(ev){ onDown(ev); }, {passive:true});
  canvas.addEventListener('touchmove', function(ev){ onMove(ev); }, {passive:false});
  canvas.addEventListener('touchend', function(ev){ onUp(ev); });

  // wheel zoom (toward cursor)
  var zoomAccum = 0;          // accumulated |log-scale| change since last whoosh
  var lastWhoosh = 0;         // timestamp throttle
  canvas.addEventListener('wheel', function(ev){
    ev.preventDefault();
    var p = getXY(ev);
    var before = toWorld(p.x, p.y);
    var factor = ev.deltaY < 0 ? 1.12 : 1/1.12;
    var prevScale = view.scale;
    view.scale = Math.max(0.4, Math.min(3.2, view.scale*factor));
    var after = toWorld(p.x, p.y);
    view.x += (after.x - before.x)*view.scale;
    view.y += (after.y - before.y)*view.scale;
    focusAnim = null;

    // Soft whoosh on a big, throttled zoom change: accumulate the relative
    // scale change and fire once it crosses a threshold (and >450ms apart).
    if(view.scale !== prevScale){
      zoomAccum += Math.abs(Math.log(view.scale / prevScale));
      var nowTs = performance.now();
      if(zoomAccum > 0.45 && nowTs - lastWhoosh > 450){
        sfx('whoosh');
        lastWhoosh = nowTs;
        zoomAccum = 0;
      }
    }
  }, {passive:false});

  window.addEventListener('keydown', function(ev){
    if(ev.key==='Escape' && selected) selectNode(null);
  });

  // ---------- legend ----------
  (function buildLegend(){
    var order = ['you','role','project','skill','education','publication','contact'];
    var html = '<h2>Node Map</h2>';
    order.forEach(function(c){
      html += '<div class="row"><span class="dot" style="background:'+CATS[c].color+';color:'+CATS[c].color+'"></span><i class="fa-solid '+CATS[c].icon+'" style="color:'+CATS[c].color+'"></i>'+CATS[c].label+'</div>';
    });
    legendEl.innerHTML = html;
  })();

  // ---------- resize ----------
  var resizeT;
  window.addEventListener('resize', function(){
    var oldW=W, oldH=H;
    resize();
    // keep graph roughly centered: shift positions by half delta if first time not seeded
    settled = false; settleFrames = Math.min(settleFrames, 30);
  });

  // ---------- visibility pause ----------
  document.addEventListener('visibilitychange', function(){
    if(document.hidden){
      running = false;
      if(rafId) cancelAnimationFrame(rafId);
      rafId = null;
    } else {
      if(!running){
        running = true;
        lastT = performance.now(); // reset clock so resume dt isn't a huge jump
        accumulator = 0;
        rafId = requestAnimationFrame(loop);
      }
    }
  });

  // ---------- init ----------
  resize();
  seedPositions();
  lastT = performance.now();

  if(prefersReduced){
    // pre-settle: run many physics steps without rendering
    for(var s=0;s<700;s++){ step(); }
    settled = true;
    draw(16);
    // still render (one frame loop kept for interaction redraws)
    running = true;
    rafId = requestAnimationFrame(loop);
  } else {
    rafId = requestAnimationFrame(loop);
  }

})();
</script>
</body>
</html>
