<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>terminal-os — Saptarshi Nag</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="../_shared/chrome.css">
<script src="../_shared/chrome.js" data-accent="#4aff8f" data-tag="terminal os"></script>
<script src="../_shared/sfx.js"></script>
<style>
  :root{
    --bg:#04060a;
    --bg2:#07110c;
    --green:#4aff8f;
    --green-dim:#1f9456;
    --green-faint:#0f3b25;
    --amber:#ffb347;
    --amber-dim:#9c6a25;
    --text:#bdf6d8;
    --text-dim:#6fae8c;
    --red:#ff6b6b;
    --mono:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;width:100%;background:var(--bg);color:var(--text);font-family:var(--mono);}
  body{position:fixed;inset:0;overflow:hidden;-webkit-font-smoothing:antialiased;
    font-size:15px;line-height:1.5;cursor:text;
    background:
      radial-gradient(ellipse 130% 110% at 50% 45%, #08130d 0%, var(--bg) 70%);
  }

  /* ---------- CRT overlays ---------- */
  .crt-vignette{position:fixed;inset:0;z-index:30;pointer-events:none;
    background:radial-gradient(ellipse 120% 100% at 50% 50%,transparent 38%,rgba(0,0,0,.7) 100%);}
  .crt-scanlines{position:fixed;inset:0;z-index:31;pointer-events:none;opacity:.45;
    background:repeating-linear-gradient(0deg,rgba(0,0,0,0) 0px,rgba(0,0,0,0) 2px,rgba(0,0,0,.32) 3px,rgba(0,0,0,0) 4px);
    mix-blend-mode:multiply;}
  .crt-glow{position:fixed;inset:0;z-index:29;pointer-events:none;
    box-shadow:inset 0 0 160px rgba(74,255,143,.06);}
  .crt-flicker{position:fixed;inset:0;z-index:32;pointer-events:none;background:#0c2418;opacity:0;
    mix-blend-mode:screen;animation:flicker 6s infinite steps(1);}
  @keyframes flicker{
    0%,100%{opacity:.012}
    3%{opacity:.05}  5%{opacity:.01}
    33%{opacity:.02} 33.5%{opacity:.07} 34%{opacity:.02}
    70%{opacity:.01} 72%{opacity:.06} 74%{opacity:.015}
  }

  /* ---------- Chrome ---------- */
  .topbar{position:fixed;top:0;left:0;right:0;z-index:20;
    display:flex;align-items:center;gap:14px;
    padding:10px 16px;font-size:12px;color:var(--text-dim);
    background:linear-gradient(180deg, rgba(4,8,6,.85), rgba(4,8,6,0));
    pointer-events:none;}
  .topbar a{pointer-events:auto;color:var(--green);text-decoration:none;
    border:1px solid var(--green-faint);padding:4px 10px;border-radius:4px;
    transition:.18s;letter-spacing:.04em;}
  .topbar a:hover{background:var(--green-faint);color:#dfffe9;border-color:var(--green-dim);}
  .topbar .spacer{flex:1}
  .tag{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--amber-dim);
    border:1px dashed var(--amber-dim);padding:3px 8px;border-radius:4px;opacity:.8;}

  /* ---------- Screen / terminal ---------- */
  #screen{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;
    padding:54px 4vw 18px;overflow:hidden;}
  #scrollback{flex:1;overflow-y:auto;overflow-x:hidden;padding-right:8px;
    scrollbar-width:thin;scrollbar-color:var(--green-dim) transparent;
    text-shadow:0 0 7px rgba(74,255,143,.25);}
  #scrollback::-webkit-scrollbar{width:8px}
  #scrollback::-webkit-scrollbar-thumb{background:var(--green-faint);border-radius:8px}

  .line{white-space:pre-wrap;word-break:break-word;margin:1px 0;}
  .g{color:var(--green)}
  .a{color:var(--amber)}
  .dim{color:var(--text-dim)}
  .red{color:var(--red)}
  .hl{color:#dfffe9;font-weight:600}
  .bar{color:var(--green);letter-spacing:-1px}
  .ascii{color:var(--green);line-height:1.15;font-size:13px;text-shadow:0 0 10px rgba(74,255,143,.4)}
  a.link{color:var(--amber);text-decoration:none;border-bottom:1px dotted var(--amber-dim)}
  a.link:hover{color:#ffd699}

  /* command-echo prompt */
  .ps{color:var(--green-dim)}
  .ps b{color:var(--amber);font-weight:500}

  /* ---------- Input row ---------- */
  .inputrow{display:flex;align-items:baseline;gap:8px;padding-top:6px;flex-shrink:0;}
  .prompt{color:var(--green);white-space:nowrap;text-shadow:0 0 7px rgba(74,255,143,.4)}
  .prompt .at{color:var(--amber)}
  .field{position:relative;flex:1;min-width:0;}
  #cmd{width:100%;background:transparent;border:0;outline:0;color:#dfffe9;
    font:inherit;caret-color:transparent;text-shadow:0 0 7px rgba(74,255,143,.3);}
  /* fake caret */
  .caret{display:inline-block;width:9px;height:1.05em;background:var(--green);
    box-shadow:0 0 8px var(--green);transform:translateY(2px);
    animation:blink 1.05s steps(1) infinite;}
  @keyframes blink{50%{opacity:0}}
  .mirror{position:absolute;top:0;left:0;color:transparent;white-space:pre;pointer-events:none;}
  .caret{vertical-align:baseline;transform:translateY(2px);will-change:opacity;}

  /* ---------- Chips ---------- */
  .chips{display:flex;flex-wrap:wrap;gap:7px;padding:10px 0 4px;flex-shrink:0;z-index:11;}
  .chip{font:inherit;font-size:12px;color:var(--green);cursor:pointer;
    background:rgba(74,255,143,.05);border:1px solid var(--green-faint);
    padding:4px 11px;border-radius:14px;transition:.16s;letter-spacing:.02em;}
  .chip:hover{background:rgba(74,255,143,.16);border-color:var(--green-dim);color:#eafff1;
    box-shadow:0 0 12px rgba(74,255,143,.18);transform:translateY(-1px);}
  .chip .k{color:var(--amber)}

  .hint{font-size:11px;color:var(--text-dim);padding-top:2px;opacity:.7}

  /* ---------- Font Awesome icon styling ---------- */
  .line i.fa-solid, .line i.fa-brands{
    display:inline-block;width:1.35em;text-align:center;
    color:var(--green);text-shadow:0 0 8px rgba(74,255,143,.5);
  }
  .line i.ic-a{color:var(--amber);text-shadow:0 0 8px rgba(255,179,71,.5)}
  .line i.ic-dim{color:var(--text-dim);text-shadow:none}
  .line i.ic-red{color:var(--red);text-shadow:0 0 8px rgba(255,107,107,.5)}
  .prompt i, .ps i{color:inherit;text-shadow:inherit;width:auto;margin-right:2px}
  .chip i{margin-right:5px;color:var(--amber);width:auto}
  .topbar a i{margin-right:5px}
  .tag i{margin-right:4px}

  @media (max-width:640px){
    body{font-size:13px}
    #screen{padding:50px 4vw 12px}
    .ascii{font-size:9px}
    .topbar .tag{display:none}
  }

  @media (prefers-reduced-motion: reduce){
    .crt-flicker{animation:none;opacity:.015}
    .caret{animation:none}
  }
</style>
</head>
<body>
  <div class="crt-glow"></div>
  <div class="crt-vignette"></div>
  <div class="crt-scanlines"></div>
  <div class="crt-flicker"></div>


  <div id="screen">
    <div id="scrollback" aria-live="polite"></div>

    <div class="chips" id="chips" style="display:none">
      <button class="chip" data-cmd="help"><i class="fa-solid fa-circle-question"></i>help</button>

      <span class="prompt"><i class="fa-solid fa-terminal"></i><span class="g">saptarshi</span><span class="at">@</span><span class="g">os</span>:<span class="a">~</span>$</span>
      <div class="field">
        <input id="cmd" type="text" autocomplete="off" autocapitalize="off"
               autocorrect="off" spellcheck="false" aria-label="terminal input">

  </div>

<script>
"use strict";
(function(){
  const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const sb     = document.getElementById('scrollback');
  const input  = document.getElementById('cmd');
  const mirror = document.getElementById('mirror');
  const mtext  = document.getElementById('mtext');
  const inputrow = document.getElementById('inputrow');
  const chips  = document.getElementById('chips');

  /* ---------- Sound (shared engine; guarded if script absent) ---------- */
  const hasSFX = (typeof window.SFX !== 'undefined' && window.SFX);
  function sfx(name){ if(hasSFX){ try{ window.SFX.play(name); }catch(_){} } }
  if(hasSFX){ try{ window.SFX.init({ accent:'#4aff8f', ambient:true, ambientFreq:62 }); }catch(_){} }

  /* ---------- DOM helpers ---------- */
  function el(html, cls){
    const d = document.createElement('div');
    d.className = 'line' + (cls ? ' ' + cls : '');
    d.innerHTML = html;
    sb.appendChild(d);
    scroll();
    return d;
  }
  function blank(){ el('&nbsp;'); }
  let scrollRAF = 0;
  let pinned = true; // stick to bottom unless the user scrolls up to read
  sb.addEventListener('scroll', ()=>{
    // distance from the bottom; treat "within 24px" as pinned
    pinned = (sb.scrollHeight - sb.scrollTop - sb.clientHeight) < 24;
  }, {passive:true});
  function scroll(){
    if(scrollRAF || !pinned) return;
    scrollRAF = requestAnimationFrame(()=>{
      scrollRAF = 0;
      if(pinned) sb.scrollTop = sb.scrollHeight;
    });
  }
  function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  /* advance index past any open tag (<...>) or entity (&...;) so a partial
     slice never renders broken markup */
  function safeCut(html, i){
    if(i >= html.length) return html.length;
    // walk back to find an unfinished '<' or '&' to the left of i
    const lt = html.lastIndexOf('<', i - 1);
    const gt = html.lastIndexOf('>', i - 1);
    if(lt > gt){ const close = html.indexOf('>', i); return close === -1 ? html.length : close + 1; }
    const amp = html.lastIndexOf('&', i - 1);
    const semi = html.lastIndexOf(';', i - 1);
    if(amp > semi && i - amp <= 8){ const close = html.indexOf(';', i); return close === -1 ? html.length : close + 1; }
    return i;
  }
  /* type a single line out character-by-character, returns a Promise */
  function typeLine(html, cls, cps){
    return new Promise(res=>{
      const node = el('', cls);
      if(REDUCED){ node.innerHTML = html; scroll(); return res(); }
      let i = 0;
      const speed = cps || 1; // chars per tick
      const tick = ()=>{
        i += speed;
        const cut = safeCut(html, i);
        node.innerHTML = html.slice(0, cut);
        scroll();
        if(cut < html.length){ setTimeout(tick, 12); }
        else { node.innerHTML = html; scroll(); res(); }
      };
      tick();
    });
  }
  function wait(ms){ return new Promise(r=>setTimeout(r, REDUCED?0:ms)); }

  /* ---------- Content data ---------- */
  const NAME = "Saptarshi Nag";
  const TAGLINE = "AI/ML engineer at the intersection of security and systems research.";
  const projects = {
    "f1-tyre-strategy": {
      icon:"fa-flag-checkered",
      title:"GPU-Accelerated F1 Tyre Degradation & Race Strategy",
      stack:"Python · PyTorch · CUDA · CuPy · XGBoost",
      lines:[
        "Hybrid LSTM-XGBoost architecture for tyre wear modelling and pit-stop",
        "window prediction from 10 Hz telemetry.",
        "Physics-Informed Loss Functions (PINNs) separating thermal and mechanical",
        "degradation.",
        "Custom CUDA/CuPy kernels.",
        "→ 4.1x training speedup."
      ]
    },
    "omniscience-pro": {
      icon:"fa-database",
      title:"Omniscience Pro — Privacy-First Local RAG System",
      stack:"Python · LangChain · ChromaDB · Docker",
      lines:[
        "Local, privacy-first RAG supporting multi-modal document ingestion.",
        "<50 ms vector search (HNSW); <500 ms first-token latency on consumer",
        "hardware.",
        "GPU-aware Docker with full CI/CD; POSIX file locking."
      ]
    },
    "aro": {
      icon:"fa-diagram-project",
      title:"ARO — Autonomous Research Operator (Multi-Agent LLM Platform)",
      stack:"Python · Flask · SQLAlchemy · NetworkX · React",
      lines:[
        "Multi-agent LLM workflows as directed graphs (NetworkX); Flask backend",
        "streaming via SSE; React frontend.",
        "Full adversarial audit: found and fixed 16 vulnerabilities across auth,",
        "SSRF, input validation, CORS."
      ]
    },
    "llama32-opt": {
      icon:"fa-feather-pointed",
      title:"Llama 3.2 Optimisation for Efficient Inference",
      stack:"Python · Unsloth · Hugging Face · PyTorch",
      lines:[
        "Fine-tuned Llama 3.2 (1B and 3B) on 21.5k domain-specific interactions.",
        "4-bit quantisation via Unsloth for consumer GPU deployment; no meaningful",
        "quality drop."
      ]
    }
  };

  const banner = [
" ███████╗ █████╗ ██████╗     ██████╗ ███████╗",
" ██╔════╝██╔══██╗██╔══██╗   ██╔═══██╗██╔════╝",
" ███████╗███████║██████╔╝   ██║   ██║███████╗",
" ╚════██║██╔══██║██╔═══╝     ██║   ██║╚════██║",
" ███████║██║  ██║██║         ╚██████╔╝███████║",
" ╚══════╝╚═╝  ╚═╝╚═╝          ╚═════╝ ╚══════╝"
  ];

  /* ---------- Command implementations ---------- */
  const commands = {
    help(){
      out([

        ['  <i class="fa-solid fa-user ic-dim"></i> <span class="g">whoami</span>         who am I',''],
        ['  <i class="fa-solid fa-folder ic-dim"></i> <span class="g">ls</span>             list the filesystem',''],
        ['  <i class="fa-solid fa-briefcase ic-dim"></i> <span class="g">experience</span>     <span class="dim">(cat experience.log)</span> career history',''],
        ['  <i class="fa-solid fa-folder-open ic-dim"></i> <span class="g">ls projects/</span>   list projects · <span class="g">cat projects/&lt;name&gt;</span>',''],

        ['  <i class="fa-solid fa-book ic-dim"></i> <span class="g">publications</span>   published papers',''],
        ['  <i class="fa-solid fa-graduation-cap ic-dim"></i> <span class="g">education</span>      degrees &amp; results',''],
        ['  <i class="fa-solid fa-envelope ic-dim"></i> <span class="g">contact</span>        reach me / download CV',''],
        ['  <i class="fa-solid fa-satellite-dish ic-a"></i> <span class="a">run pulsar-detect</span>  &lt;run the detection routine&gt;',''],

    },
    whoami(){
      out([
        ['<span class="hl"><i class="fa-solid fa-user"></i> '+NAME+'</span> — <span class="a">AI/ML Engineer</span>',''],
        ['<span class="dim">'+TAGLINE+'</span>',''],
        ['',''],
        ['AI/ML engineer with an M.Tech in Artificial Intelligence (DIAT, DRDO) and',''],
        ['research experience at NCRA-TIFR and GMRT. Works across the full stack of',''],
        ['an ML project: feature engineering from raw data, model development and',''],
        ['optimisation, and production deployment under tight performance constraints.',''],
        ['',''],
        ['Current work at <span class="g">C-DAC</span> focuses on real-time IoT security using a Zero',''],
        ['Trust framework with ML-based threat detection across multiple wireless',''],

        ['GPU-accelerated scientific computing, LLM fine-tuning, and RAG systems.',''],
        ['',''],

        ['  <i class="fa-solid fa-shield-halved ic-a"></i> <span class="a">97.93%</span>  IoT attack-detection accuracy',''],

        ['  <i class="fa-solid fa-database ic-a"></i> <span class="a">70M+</span>    samples processed',''],

    ls(arg){
      if(arg && /^projects\/?$/.test(arg.trim())){

        ['<span class="dim">drwxr-xr-x</span>  <i class="fa-solid fa-folder"></i> <span class="g">projects/</span>',''],
        ['<span class="dim">-rw-r--r--</span>  <i class="fa-solid fa-file-lines ic-dim"></i> <span class="hl">experience.log</span>',''],
        ['<span class="dim">-rw-r--r--</span>  <i class="fa-solid fa-file-lines ic-dim"></i> skills.txt',''],
        ['<span class="dim">-rw-r--r--</span>  <i class="fa-solid fa-file-lines ic-dim"></i> publications.bib',''],
        ['<span class="dim">-rw-r--r--</span>  <i class="fa-solid fa-file-lines ic-dim"></i> education.yml',''],
        ['<span class="dim">-rw-r--r--</span>  <i class="fa-solid fa-address-card ic-dim"></i> contact.vcf',''],
        ['<span class="dim">-rwx------</span>  <i class="fa-solid fa-user-shield ic-a"></i> <span class="a">hire-me.sh</span>',''],
      ]);
    },
    experience(){
      out([
        ['<span class="hl"><i class="fa-solid fa-briefcase"></i> experience.log</span>',''],
        ['',''],
        ['<span class="g"><i class="fa-solid fa-shield-halved"></i> C-DAC</span> <span class="dim">(Centre for Development of Advanced Computing)</span>',''],
        ['  Project Engineer, AI Research &amp; IoT Security',''],
        ['  <span class="dim"><i class="fa-solid fa-calendar"></i> Jul 2025 – Present · <i class="fa-solid fa-location-dot"></i> Chennai, India</span>',''],
        ['  <span class="a">·</span> Built a real-time Zero Trust security framework for IoT networks',''],
        ['    covering WiFi (802.11), BLE, Zigbee, and LoRa; ML-based attack',''],

        ['  <span class="a">·</span> Two-stage hybrid detection pipeline: window model (1-second sliding',''],
        ['    windows, 7 attack classes) + flow model for longer-duration patterns.',''],
        ['    Compared RF, XGBoost, SVM, MLP, and Voting Ensemble across 6',''],
        ['    preprocessing iterations with SMOTE and Optuna (TPE) hyperparameter',''],
        ['    search.',''],
        ['  <span class="a">·</span> Best results: <span class="a">97.93%</span> accuracy (flow/RF); <span class="a">90.86%</span> accuracy /',''],
        ['    <span class="a">86.78%</span> macro F1 (window/Voting Ensemble).',''],
        ['  <span class="a">·</span> Engineered 63 statistical and behavioural features from raw PCAPs',''],

        ['    Co-authored two papers published at IoTaIS 2025.',''],
        ['',''],
        ['<span class="g"><i class="fa-solid fa-satellite-dish"></i> NCRA-TIFR</span> <span class="dim">(National Centre for Radio Astrophysics)</span>',''],
        ['  Research Intern (M.Tech Project)',''],
        ['  <span class="dim"><i class="fa-solid fa-calendar"></i> Aug 2024 – Apr 2025 · <i class="fa-solid fa-location-dot"></i> Pune, India</span>',''],
        ['  <span class="a">·</span> Designed a ResNet1D architecture with Squeeze-and-Excitation',''],
        ['    attention for weak pulsar signal detection in noisy astrophysical',''],
        ['    data at low SNR.',''],
        ['  <span class="a">·</span> Achieved <span class="a">99.8%</span> F1-score across 70M+ samples; built adaptive',''],
        ['    thresholding for non-stationary noise floors across observation',''],
        ['    sessions.',''],
        ['  <span class="a">·</span> Ran the project end-to-end independently: scoping through deployment',''],
        ['    and write-up.',''],
        ['',''],
        ['<span class="g"><i class="fa-solid fa-tower-broadcast"></i> GMRT</span> <span class="dim">(Giant Metrewave Radio Telescope, NCRA-TIFR)</span>',''],

  /* alias mapping for "cat ..." style */
  function catFile(arg){
    const f = (arg||'').trim().replace(/^\.\//,'');
    if(f === 'experience.log' || f === 'experience') return commands.experience();
    if(f === 'skills.txt' || f === 'skills') return commands.skills();
    if(f === 'publications.bib') return commands.publications();
    if(f === 'education.yml') return commands.education();
    if(f === 'contact.vcf') return commands.contact();
    const pm = f.match(/^projects\/(.+)$/);
    if(pm){
      const key = pm[1].replace(/\/$/,'');
      const p = projects[key];
      if(p){
        out([['<span class="hl">'+esc(p.title)+'</span>',''],
             ['<span class="dim">'+esc(p.stack)+'</span>',''],
             ['','']].concat(p.lines.map(l=>['  '+esc(l).replace('→','<span class="a">→</span>'),''])));
        return;
      }
      out([['<span class="red">cat: projects/'+esc(key)+': No such file</span>',''],
           ['<span class="dim">try: ls projects/</span>','']]);
      return;
    }
    out([['<span class="red">cat: '+esc(f||'(missing operand)')+': No such file or directory</span>','']]);
  }

  function out(rows){ rows.forEach(r=>el(r[0], r[1])); }

  /* ---------- Fun routines ---------- */
  async function progress(label, ticks, ms){
    const node = el('', '');
    const width = 28;
    for(let i=0;i<=ticks;i++){
      const pct = i/ticks;
      const filled = Math.round(pct*width);
      const bar = '█'.repeat(filled) + '░'.repeat(width-filled);
      node.innerHTML = '<span class="dim">'+label+'</span> <span class="bar">['+bar+']</span> '
                     + '<span class="a">'+String(Math.round(pct*100)).padStart(3)+'%</span>';
      scroll();
      await wait(ms);
    }
  }

  /* ---------- Parser ---------- */
  async function execute(raw){
    const line = raw.trim();
    // echo the command into scrollback
    el('<span class="ps"><b>saptarshi</b>@os:~$</span> ' + esc(raw), '');
    if(!line) return 'empty';

    history.push(line); histIdx = history.length;

    const cmd = line.split(/\s+/)[0];
    const arg = line.slice(cmd.length).trim();
    const c = cmd.toLowerCase();

    if(c === 'cat'){ catFile(arg); return 'ok'; }
    if(c === 'about'){ commands.whoami(); return 'ok'; }
    if(c === 'clear'){ commands.clear(); return 'clear'; }
    if(c === 'projects'){ commands.ls('projects/'); return 'ok'; }
    if(commands[c]){
      let r = commands[c](arg);
      if(r && typeof r.then === 'function') r = await r;
      // routines (run/sudo) ring their own 'success'; suppress the generic beep
      return (r === 'routine' || r === 'error') ? r : 'ok';
    }
    // unknown
    out([
      ['<span class="red">command not found: '+esc(cmd)+'</span>',''],
      ['<span class="dim">type</span> <span class="g">help</span> <span class="dim">for the list of commands.</span>','']
    ]);
    return 'error';
  }

  /* ---------- History + autocomplete ---------- */
  const history = [];
  let histIdx = 0;
  const VOCAB = ['help','whoami','about','ls','ls projects/','cat experience.log','cat projects/',
    'experience','projects','skills','publications','education','contact','run pulsar-detect',
    'clear','sudo hire-me'];

  function syncMirror(){ mtext.textContent = input.value; }

  let busy = false;
  async function submit(value){
    if(busy) return;
    busy = true;
    input.value = '';
    syncMirror();
    const status = await execute(value);
    if(status === 'error') sfx('error');
    else if(status === 'ok') sfx('beep');        // subtle: normal commands that printed output
    else if(status === 'clear') sfx('whoosh');   // screen wiped
    // 'routine' -> the routine already rang 'success'; 'empty' -> silent
    busy = false;
    focusInput();
  }

  input.addEventListener('input', syncMirror);
  let lastType = 0;
  input.addEventListener('keydown', (e)=>{
    // throttled typewriter click on printable characters (and backspace edits)
    if(!e.ctrlKey && !e.metaKey && !e.altKey &&
       (e.key.length === 1 || e.key === 'Backspace')){
      const now = (window.performance ? performance.now() : Date.now());
      if(now - lastType >= 25){ lastType = now; sfx('type'); }
    }
    if(e.key === 'Enter'){ e.preventDefault(); submit(input.value); }
    else if(e.key === 'ArrowUp'){
      e.preventDefault();
      if(history.length){ histIdx = Math.max(0, histIdx-1); input.value = history[histIdx]||''; syncMirror(); moveCaretEnd(); }
    }
    else if(e.key === 'ArrowDown'){
      e.preventDefault();
      if(history.length){ histIdx = Math.min(history.length, histIdx+1);
        input.value = history[histIdx] || ''; syncMirror(); moveCaretEnd(); }
    }
    else if(e.key === 'Tab'){
      e.preventDefault();
      const v = input.value.toLowerCase();
      if(!v) return;
      const matches = VOCAB.filter(x=>x.startsWith(v));
      if(matches.length === 1){ input.value = matches[0]; syncMirror(); }
      else if(matches.length > 1){
        // common prefix
        let pre = matches[0];
        matches.forEach(m=>{ while(!m.startsWith(pre)) pre = pre.slice(0,-1); });
        input.value = pre; syncMirror();
        el('<span class="dim">' + matches.join('   ') + '</span>','');
      }
    }
    else if(e.key === 'l' && e.ctrlKey){ e.preventDefault(); commands.clear(); }
  });
  function moveCaretEnd(){ const v=input.value; input.value=''; input.value=v; }

  /* ---------- Chips ---------- */
  chips.addEventListener('click', (e)=>{
    const b = e.target.closest('.chip');

    sfx('click');
    submit(b.dataset.cmd);
  });
  let lastHover = 0;
  chips.addEventListener('mouseover', (e)=>{
    if(!e.target.closest('.chip')) return;
    const now = (window.performance ? performance.now() : Date.now());
    if(now - lastHover >= 60){ lastHover = now; sfx('hover'); }
  });

  /* ---------- Back link ---------- */
  const backlink = document.getElementById('backlink');
  if(backlink){
    backlink.addEventListener('mouseover', ()=> sfx('hover'));
    backlink.addEventListener('click', ()=>{ sfx('back'); });
  }

  /* ---------- Focus management ---------- */
  function focusInput(){
    if(inputrow.style.display === 'none') return;
    try{ input.focus({preventScroll:true}); }catch(_){ input.focus(); }
  }
  document.addEventListener('mousedown', (e)=>{
    // don't steal selection from links / chips / topbar
    if(e.target.closest('a, .chip, .topbar')) return;
    // allow text selection
    if(window.getSelection && String(window.getSelection())) return;
    focusInput();
  });

    for(const [html, cps] of seq){

    sb.innerHTML='';

    blank();

    chips.style.display = 'flex';
    inputrow.style.display = 'flex';
    syncMirror();
    focusInput();
  }

  // kick off
  window.addEventListener('error', function(){ /* swallow to keep console clean if anything odd */ });
  boot();
