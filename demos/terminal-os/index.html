<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#04060a;
    --bg2:#07110c;
    --green:#4aff8f;
    --green-dim:#1f9456;
    --green-faint:#0f3b25;
    --amber:#ffb347;
    --amber-dim:#9c6a25;
    --text:#bdf6d8;
    --text-dim:#6fae8c;
    --red:#ff6b6b;
    --mono:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;width:100%;background:var(--bg);color:var(--text);font-family:var(--mono);}
  body{position:fixed;inset:0;overflow:hidden;-webkit-font-smoothing:antialiased;
    font-size:15px;line-height:1.5;cursor:text;
    background:
      radial-gradient(ellipse 130% 110% at 50% 45%, #08130d 0%, var(--bg) 70%);
  }

  /* ---------- CRT overlays ---------- */
  .crt-vignette{position:fixed;inset:0;z-index:30;pointer-events:none;
    background:radial-gradient(ellipse 120% 100% at 50% 50%,transparent 38%,rgba(0,0,0,.7) 100%);}
  .crt-scanlines{position:fixed;inset:0;z-index:31;pointer-events:none;opacity:.45;
    background:repeating-linear-gradient(0deg,rgba(0,0,0,0) 0px,rgba(0,0,0,0) 2px,rgba(0,0,0,.32) 3px,rgba(0,0,0,0) 4px);
    mix-blend-mode:multiply;}
  .crt-glow{position:fixed;inset:0;z-index:29;pointer-events:none;
    box-shadow:inset 0 0 160px rgba(74,255,143,.06);}
  .crt-flicker{position:fixed;inset:0;z-index:32;pointer-events:none;background:#0c2418;opacity:0;
    mix-blend-mode:screen;animation:flicker 6s infinite steps(1);}
  @keyframes flicker{
    0%,100%{opacity:.012}
    3%{opacity:.05}  5%{opacity:.01}
    33%{opacity:.02} 33.5%{opacity:.07} 34%{opacity:.02}
    70%{opacity:.01} 72%{opacity:.06} 74%{opacity:.015}
  }

  /* ---------- Chrome ---------- */
  .topbar{position:fixed;top:0;left:0;right:0;z-index:20;
    display:flex;align-items:center;gap:14px;
    padding:10px 16px;font-size:12px;color:var(--text-dim);
    background:linear-gradient(180deg, rgba(4,8,6,.85), rgba(4,8,6,0));
    pointer-events:none;}
  .topbar a{pointer-events:auto;color:var(--green);text-decoration:none;
    border:1px solid var(--green-faint);padding:4px 10px;border-radius:4px;
    transition:.18s;letter-spacing:.04em;}
  .topbar a:hover{background:var(--green-faint);color:#dfffe9;border-color:var(--green-dim);}
  .topbar .spacer{flex:1}
  .tag{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--amber-dim);
    border:1px dashed var(--amber-dim);padding:3px 8px;border-radius:4px;opacity:.8;}

  /* ---------- Screen / terminal ---------- */
  #screen{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;
    padding:54px 4vw 18px;overflow:hidden;}
  #scrollback{flex:1;overflow-y:auto;overflow-x:hidden;padding-right:8px;
    scrollbar-width:thin;scrollbar-color:var(--green-dim) transparent;
    text-shadow:0 0 7px rgba(74,255,143,.25);}
  #scrollback::-webkit-scrollbar{width:8px}
  #scrollback::-webkit-scrollbar-thumb{background:var(--green-faint);border-radius:8px}

  .line{white-space:pre-wrap;word-break:break-word;margin:1px 0;}
  .g{color:var(--green)}
  .a{color:var(--amber)}
  .dim{color:var(--text-dim)}
  .red{color:var(--red)}
  .hl{color:#dfffe9;font-weight:600}
  .bar{color:var(--green);letter-spacing:-1px}
  .ascii{color:var(--green);line-height:1.15;font-size:13px;text-shadow:0 0 10px rgba(74,255,143,.4)}
  a.link{color:var(--amber);text-decoration:none;border-bottom:1px dotted var(--amber-dim)}
  a.link:hover{color:#ffd699}

  /* command-echo prompt */
  .ps{color:var(--green-dim)}
  .ps b{color:var(--amber);font-weight:500}

  /* ---------- Input row ---------- */
  .inputrow{display:flex;align-items:baseline;gap:8px;padding-top:6px;flex-shrink:0;}
  .prompt{color:var(--green);white-space:nowrap;text-shadow:0 0 7px rgba(74,255,143,.4)}
  .prompt .at{color:var(--amber)}
  .field{position:relative;flex:1;min-width:0;}
  #cmd{width:100%;background:transparent;border:0;outline:0;color:#dfffe9;
    font:inherit;caret-color:transparent;text-shadow:0 0 7px rgba(74,255,143,.3);}
  /* fake caret */
  .caret{display:inline-block;width:9px;height:1.05em;background:var(--green);
    box-shadow:0 0 8px var(--green);transform:translateY(2px);
    animation:blink 1.05s steps(1) infinite;}
  @keyframes blink{50%{opacity:0}}
  .mirror{position:absolute;top:0;left:0;color:transparent;white-space:pre;pointer-events:none;}

  /* ---------- Chips ---------- */
  .chips{display:flex;flex-wrap:wrap;gap:7px;padding:10px 0 4px;flex-shrink:0;z-index:11;}
  .chip{font:inherit;font-size:12px;color:var(--green);cursor:pointer;
    background:rgba(74,255,143,.05);border:1px solid var(--green-faint);
    padding:4px 11px;border-radius:14px;transition:.16s;letter-spacing:.02em;}
  .chip:hover{background:rgba(74,255,143,.16);border-color:var(--green-dim);color:#eafff1;
    box-shadow:0 0 12px rgba(74,255,143,.18);transform:translateY(-1px);}
  .chip .k{color:var(--amber)}

  .hint{font-size:11px;color:var(--text-dim);padding-top:2px;opacity:.7}

  @media (max-width:640px){
    body{font-size:13px}
    #screen{padding:50px 4vw 12px}
    .ascii{font-size:9px}
    .topbar .tag{display:none}
  }

  @media (prefers-reduced-motion: reduce){
    .crt-flicker{animation:none;opacity:.015}
    .caret{animation:none}
  }
</style>
</head>

  function el(html, cls){
    const d = document.createElement('div');
    d.className = 'line' + (cls ? ' ' + cls : '');
    d.innerHTML = html;
    sb.appendChild(d);
    scroll();
    return d;
  }
  function blank(){ el('&nbsp;'); }
  function scroll(){ sb.scrollTop = sb.scrollHeight; }
  function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  /* type a single line out character-by-character, returns a Promise */
  function typeLine(html, cls, cps){
    return new Promise(res=>{
      const node = el('', cls);
      if(REDUCED){ node.innerHTML = html; scroll(); return res(); }
      let i = 0;
      const speed = cps || 1; // chars per tick
      const tick = ()=>{
        i += speed;
        node.innerHTML = html.slice(0, i);
        // avoid leaving a broken html entity mid-render вҖ” only flush full text on done
        scroll();
        if(i < html.length){ setTimeout(tick, 12); }
        else { node.innerHTML = html; scroll(); res(); }
      };
      tick();
    });
  }
  function wait(ms){ return new Promise(r=>setTimeout(r, REDUCED?0:ms)); }

  /* alias mapping for "cat ..." style */
  function catFile(arg){
    const f = (arg||'').trim().replace(/^\.\//,'');

  function out(rows){ rows.forEach(r=>el(r[0], r[1])); }

  /* ---------- Fun routines ---------- */
  async function progress(label, ticks, ms){
    const node = el('', '');
    const width = 28;
    for(let i=0;i<=ticks;i++){
      const pct = i/ticks;
      const filled = Math.round(pct*width);
      const bar = 'в–Ҳ'.repeat(filled) + 'в–‘'.repeat(width-filled);
      node.innerHTML = '<span class="dim">'+label+'</span> <span class="bar">['+bar+']</span> '
                     + '<span class="a">'+String(Math.round(pct*100)).padStart(3)+'%</span>';
      scroll();
      await wait(ms);
    }
  }
  async function pulsarDetect(){

  /* ---------- Parser ---------- */
  async function execute(raw){
    const line = raw.trim();
    // echo the command into scrollback
    el('<span class="ps"><b>saptarshi</b>@os:~$</span> ' + esc(raw), '');
    if(!line) return;

    history.push(line); histIdx = history.length;

    const [cmd, ...rest] = line.split(/\s+/);
    const arg = line.slice(cmd.length).trim();
    const c = cmd.toLowerCase();

    if(c === 'cat'){ catFile(arg); return; }
    if(c === 'clear'){ commands.clear(); return; }
    if(commands[c]){
      const r = commands[c](arg);
      if(r && typeof r.then === 'function') await r;
      return;
    }
    // unknown
    out([
      ['<span class="red">command not found: '+esc(cmd)+'</span>',''],
      ['<span class="dim">type</span> <span class="g">help</span> <span class="dim">for the list of commands.</span>','']
    ]);
  }

  /* ---------- History + autocomplete ---------- */
  const history = [];
  let histIdx = 0;
  const VOCAB = ['help','whoami','ls','ls projects/','cat experience.log','cat projects/',
    'experience','skills','publications','education','contact','run pulsar-detect',
    'clear','sudo hire-me'];

  function syncMirror(){ mirror.textContent = input.value; }

  let busy = false;
  async function submit(value){
    if(busy) return;
    busy = true;
    input.value = '';
    syncMirror();
    await execute(value);
    busy = false;
    focusInput();
  }

  input.addEventListener('input', syncMirror);
  input.addEventListener('keydown', (e)=>{
    if(e.key === 'Enter'){ e.preventDefault(); submit(input.value); }
    else if(e.key === 'ArrowUp'){
      e.preventDefault();
      if(history.length){ histIdx = Math.max(0, histIdx-1); input.value = history[histIdx]||''; syncMirror(); moveCaretEnd(); }
    }
    else if(e.key === 'ArrowDown'){
      e.preventDefault();
      if(history.length){ histIdx = Math.min(history.length, histIdx+1);
        input.value = history[histIdx] || ''; syncMirror(); moveCaretEnd(); }
    }
    else if(e.key === 'Tab'){
      e.preventDefault();
      const v = input.value.toLowerCase();
      if(!v) return;
      const matches = VOCAB.filter(x=>x.startsWith(v));
      if(matches.length === 1){ input.value = matches[0]; syncMirror(); }
      else if(matches.length > 1){
        // common prefix
        let pre = matches[0];
        matches.forEach(m=>{ while(!m.startsWith(pre)) pre = pre.slice(0,-1); });
        input.value = pre; syncMirror();
        el('<span class="dim">' + matches.join('   ') + '</span>','');
      }
    }
    else if(e.key === 'l' && e.ctrlKey){ e.preventDefault(); commands.clear(); }
  });
  function moveCaretEnd(){ const v=input.value; input.value=''; input.value=v; }

  /* ---------- Chips ---------- */
  chips.addEventListener('click', (e)=>{
    const b = e.target.closest('.chip');
    if(!b) return;
    submit(b.dataset.cmd);
  });

  /* ---------- Focus management ---------- */
  function focusInput(){
    if(inputrow.style.display === 'none') return;
    try{ input.focus({preventScroll:true}); }catch(_){ input.focus(); }
  }
  document.addEventListener('mousedown', (e)=>{
    // don't steal selection from links / chips / topbar
    if(e.target.closest('a, .chip, .topbar')) return;
    // allow text selection
    if(window.getSelection && String(window.getSelection())) return;
    focusInput();
  });

    blank();

    chips.style.display = 'flex';
    inputrow.style.display = 'flex';
    syncMirror();
    focusInput();
  }

  boot();
