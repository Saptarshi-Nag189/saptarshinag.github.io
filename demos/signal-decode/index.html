<html lang="en">

<head>

  <style>
    :root {
      --bg: #04070a;
      --green: #3dff9a;
      --green-dim: #1c8f57;
      --amber: #ffb84d;
      --amber-dim: #a8702a;
      --text: #bdf6d8;
      --mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--mono); }
    body { position: fixed; inset: 0; -webkit-font-smoothing: antialiased; }

    #scope { position: absolute; inset: 0; width: 100%; height: 100%; display: block; z-index: 1; }

    /* CRT overlays */
    .vignette { position: absolute; inset: 0; z-index: 6; pointer-events: none;
      background: radial-gradient(ellipse 120% 100% at 50% 50%, transparent 38%, rgba(0, 0, 0, 0.6) 100%); }
    .scanlines { position: absolute; inset: 0; z-index: 7; pointer-events: none; opacity: 0.5;
      background: repeating-linear-gradient(0deg, rgba(0,0,0,0) 0 2px, rgba(0,0,0,0.28) 3px, rgba(0,0,0,0) 4px);
      mix-blend-mode: multiply; }

    /* chrome */
    .top-left { position: fixed; top: 16px; left: 18px; z-index: 30; font-size: 12px; letter-spacing: 0.08em;
      color: var(--green); text-decoration: none; opacity: 0.8; transition: 0.2s; }
    .top-left:hover { opacity: 1; text-shadow: 0 0 8px var(--green); }
    .concept-tag { position: fixed; top: 14px; right: 18px; z-index: 30; font-size: 10px; letter-spacing: 0.22em;
      text-transform: uppercase; color: var(--amber-dim); opacity: 0.75; border: 1px solid rgba(168, 112, 42, 0.4);
      padding: 4px 8px; border-radius: 3px; }

    /* HUD corner readouts */
    .hud { position: absolute; z-index: 20; pointer-events: none; font-size: 11px; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--green-dim); text-shadow: 0 0 6px rgba(61, 255, 154, 0.35); line-height: 1.9; }
    .hud-tl { top: 52px; left: 20px; }
    .hud-tr { top: 52px; right: 20px; text-align: right; }
    .hud .val { color: var(--green); }

    /* lock meter */
    .lockwrap { position: absolute; top: 60px; left: 50%; transform: translateX(-50%); z-index: 20;
      width: min(440px, 74vw); text-align: center; pointer-events: none; transition: opacity 0.45s; }
    .lockwrap.hidden { opacity: 0; }
    .lock-label { font-size: 11px; letter-spacing: 0.34em; color: var(--amber); text-transform: uppercase;

    .lock-bar { height: 8px; border: 1px solid rgba(61, 255, 154, 0.35); border-radius: 6px; overflow: hidden;

    .lock-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--green-dim), var(--green));
      box-shadow: 0 0 12px var(--green); transition: width 0.12s linear; }
    .lock-pct { margin-top: 6px; font-size: 13px; font-weight: 700; letter-spacing: 0.18em; color: var(--green); }

    /* decoded content panel */
    .panel { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); z-index: 15;
      width: min(760px, 88vw); text-align: center; pointer-events: none; opacity: 0; transition: opacity 0.5s; }
    .panel.show { opacity: 1; pointer-events: auto; }
    .panel .eyebrow { font-size: 12px; letter-spacing: 0.4em; color: var(--amber); text-transform: uppercase; margin-bottom: 14px; }
    .panel h1 { font-size: clamp(2.2rem, 7vw, 4.6rem); font-weight: 800; letter-spacing: 0.02em; color: #eafff2;

    .panel .role { font-size: clamp(1rem, 2.4vw, 1.5rem); color: var(--green); letter-spacing: 0.26em;
      text-transform: uppercase; margin-top: 12px; }
    .panel .tagline { font-size: 12.5px; color: var(--text); opacity: 0.82; margin-top: 12px;
      max-width: 620px; margin-left: auto; margin-right: auto; line-height: 1.55; letter-spacing: 0.02em; }
    .panel .tagline i { color: var(--amber); margin-right: 7px; }
    .panel .bio { font-size: 11px; color: var(--text); opacity: 0.62; margin-top: 9px;
      max-width: 620px; margin-left: auto; margin-right: auto; line-height: 1.55; letter-spacing: 0.01em; }
    .panel .bio i { color: var(--green-dim); margin-right: 6px; }
    .metrics { display: flex; justify-content: center; flex-wrap: wrap; gap: 12px 26px; margin-top: 28px; }
    .metric { min-width: 120px; }
    .metric .v { font-size: clamp(1.4rem, 3.4vw, 2.2rem); font-weight: 800; color: var(--green);
      text-shadow: 0 0 14px rgba(61, 255, 154, 0.45); }
    .metric .l { font-size: 9.5px; letter-spacing: 0.1em; color: var(--green-dim); text-transform: uppercase; margin-top: 4px; }

    /* channel (transmission) view */
    .channel { margin-top: 22px; border: 1px solid rgba(61, 255, 154, 0.3); border-radius: 6px;
      background: rgba(6, 18, 12, 0.78); padding: 20px 24px 18px; text-align: left; min-height: 168px;
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.6), inset 0 0 20px rgba(61, 255, 154, 0.04); }
    .channel .chan-head { font-size: 11px; letter-spacing: 0.22em; color: var(--amber); text-transform: uppercase;

    .channel .chan-head i { color: var(--amber); filter: drop-shadow(0 0 6px rgba(255,184,77,0.5)); }
    .channel .chan-body { font-size: 13px; line-height: 1.65; color: var(--text);

    .channel .chan-body::-webkit-scrollbar { width: 7px; }
    .channel .chan-body::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); border-radius: 4px; }
    .channel .chan-body::-webkit-scrollbar-thumb { background: rgba(61,255,154,0.35); border-radius: 4px; }
    .channel .chan-body::-webkit-scrollbar-thumb:hover { background: rgba(61,255,154,0.6); }
    .channel .chan-body b { color: var(--green); font-weight: 700; }
    .channel .chan-body .row { padding: 3px 0; }
    .channel a { color: var(--amber); text-decoration: none; border-bottom: 1px dotted var(--amber-dim); }
    .channel a:hover { text-shadow: 0 0 8px rgba(255,184,77,0.5); }

    /* rich content blocks inside a channel */
    .entry { margin-bottom: 16px; padding-bottom: 14px; border-bottom: 1px dashed rgba(61,255,154,0.16); }
    .entry:last-child { border-bottom: none; margin-bottom: 4px; padding-bottom: 0; }
    .entry-title { color: #eafff2; font-weight: 700; font-size: 13.5px; display: flex; align-items: baseline;
      gap: 9px; flex-wrap: wrap; }
    .entry-title i { color: var(--green); font-size: 12px; filter: drop-shadow(0 0 5px rgba(61,255,154,0.5)); }
    .entry-title .org { color: var(--green); }
    .entry-meta { color: var(--amber-dim); font-size: 10.5px; letter-spacing: 0.06em; text-transform: uppercase;
      margin: 2px 0 8px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .entry-meta .sep { opacity: 0.5; }
    .entry-meta i { font-size: 9px; }
    ul.bullets { list-style: none; margin: 4px 0 0; padding: 0; }
    ul.bullets li { position: relative; padding: 2px 0 2px 18px; line-height: 1.55; }
    ul.bullets li::before { content: "\f105"; font-family: "Font Awesome 6 Free"; font-weight: 900;

    .stack { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
    .stack .tag { font-size: 9.5px; letter-spacing: 0.05em; text-transform: uppercase; color: var(--green);

    .grp { margin-bottom: 12px; }
    .grp:last-child { margin-bottom: 2px; }
    .grp-label { color: var(--amber); font-size: 10.5px; letter-spacing: 0.14em; text-transform: uppercase;
      margin-bottom: 5px; display: flex; align-items: center; gap: 8px; }
    .grp-label i { color: var(--amber); font-size: 11px; }
    .grp-items { color: var(--text); line-height: 1.6; }
    .comm-row { display: flex; align-items: center; gap: 11px; padding: 6px 0; }
    .comm-row i { color: var(--green); width: 18px; text-align: center; font-size: 14px;
      filter: drop-shadow(0 0 6px rgba(61,255,154,0.5)); }
    .comm-row .lbl { color: var(--amber-dim); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
      width: 78px; flex-shrink: 0; }

    .nav-row { display: flex; gap: 10px; align-items: center; justify-content: space-between; margin-top: 14px; flex-wrap: wrap; }
    .chips { display: flex; gap: 7px; flex-wrap: wrap; }
    .chip { font-family: var(--mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--green-dim); background: rgba(8, 28, 18, 0.6); border: 1px solid rgba(61, 255, 154, 0.28);

      align-items: center; gap: 6px; }
    .chip i { font-size: 10px; }
    .chip:hover, .chip.active { color: #04110a; background: var(--green); border-color: var(--green); box-shadow: 0 0 12px rgba(61, 255, 154, 0.4); }

    /* tuner */
    .tuner { position: absolute; bottom: 0; left: 0; right: 0; z-index: 22; padding: 16px 0 30px;
      display: flex; flex-direction: column; align-items: center; gap: 12px;
      background: linear-gradient(180deg, transparent, rgba(2, 6, 4, 0.85) 45%); transition: opacity 0.5s; }
    .tune-hint { font-size: 12px; letter-spacing: 0.2em; color: var(--amber); text-transform: uppercase;
      text-shadow: 0 0 10px rgba(255, 184, 77, 0.4); animation: hintpulse 1.8s ease-in-out infinite; }
    @keyframes hintpulse { 0%, 100% { opacity: 0.55; } 50% { opacity: 1; } }
    .dial-area { position: relative; width: min(720px, 88vw); user-select: none; touch-action: none; cursor: ew-resize; }
    .dial-track { position: relative; height: 46px; border: 1px solid rgba(61, 255, 154, 0.32); border-radius: 5px;
      background: repeating-linear-gradient(90deg, rgba(61,255,154,0.06) 0 1px, transparent 1px 20px),
        linear-gradient(180deg, rgba(10, 28, 20, 0.7), rgba(4, 10, 7, 0.7)); overflow: hidden;
      box-shadow: inset 0 0 18px rgba(0, 0, 0, 0.7); }
    .target-zone { position: absolute; top: 0; bottom: 0; background: rgba(255, 184, 77, 0.14);
      border-left: 1px dashed rgba(255, 184, 77, 0.6); border-right: 1px dashed rgba(255, 184, 77, 0.6); }
    .needle { position: absolute; top: -6px; bottom: -6px; width: 2px; background: var(--amber);
      box-shadow: 0 0 12px var(--amber), 0 0 24px rgba(255, 184, 77, 0.5); }
    .freq-read { display: flex; justify-content: space-between; width: min(720px, 88vw); font-size: 10px;
      letter-spacing: 0.14em; color: var(--green-dim); text-transform: uppercase; }
    .freq-now { color: var(--amber); font-weight: 700; }
    .btn { font-family: var(--mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--green); background: rgba(8, 28, 18, 0.6); border: 1px solid rgba(61, 255, 154, 0.34);
      padding: 8px 14px; border-radius: 4px; cursor: pointer; transition: 0.16s; }
    .btn:hover { background: rgba(61, 255, 154, 0.14); box-shadow: 0 0 12px rgba(61, 255, 154, 0.3); }
    .tuner.hidden { opacity: 0; pointer-events: none; }
  </style>
</head>

      { v: '99.8%', l: 'pulsar F1-score' },

            icon: 'fa-satellite-dish',

            icon: 'fa-graduation-cap',
            title: 'M.Tech, CSE (Artificial Intelligence)',
            org: 'DIAT (DRDO), Pune',
            meta: ['2023–2025', 'CGPA 8.64/10.0'],
          }) +
          entry({
            icon: 'fa-graduation-cap',
            title: 'B.Tech, CSE',
            org: 'Academy of Technology, Kolkata',
            meta: ['2019–2023', 'CGPA 9.44/10.0'],
          }) +
          entry({
            icon: 'fa-award',
            title: 'GATE 2024',
            meta: ['Data Science & AI'],
            bullets: ['Rank <b>1790</b> in Data Science &amp; AI (<b>Top 5%</b>).'],
          }),
      },
      contact: {
        head: 'CH.06 — COMMS', icon: 'fa-envelope',
        html:
          comm({ icon: 'fa-envelope', lbl: 'Email', body: '<a href="mailto:saptarshinag18@gmail.com">saptarshinag18@gmail.com</a>' }) +
          comm({ icon: 'fa-linkedin-in', brand: true, lbl: 'LinkedIn', body: '<a href="https://www.linkedin.com/in/saptarshi18" target="_blank" rel="noopener">/in/saptarshi18</a>' }) +
          comm({ icon: 'fa-github', brand: true, lbl: 'GitHub', body: '<a href="https://github.com/Saptarshi-Nag189" target="_blank" rel="noopener">Saptarshi-Nag189</a>' }) +
          comm({ icon: 'fa-download', lbl: 'CV', body: '<a href="../../saptarshi_resume_linkedin_2026.pdf" target="_blank" rel="noopener">saptarshi_resume_linkedin_2026.pdf</a>' }),
      },
    };
    const CH_ICONS = {
      experience: 'fa-briefcase', projects: 'fa-diagram-project', skills: 'fa-microchip',
      publications: 'fa-book', education: 'fa-graduation-cap', contact: 'fa-envelope',
    };
    const CH_ORDER = ['experience', 'projects', 'skills', 'publications', 'education', 'contact'];

    // ---- canvas oscilloscope ----
    const canvas = document.getElementById('scope');
    const ctx = canvas.getContext('2d');
    let W = 0, H = 0, DPR = Math.min(devicePixelRatio || 1, 2);
    function resize() {
      W = innerWidth; H = innerHeight;
      canvas.width = W * DPR; canvas.height = H * DPR;
      canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    }
    resize();
    addEventListener('resize', resize);

    // tuning state: 0..1, target at 0.5
    let tune = 0.0;            // visitor's position
    const TARGET = 0.5;
    let lock = 0;             // 0..1 smoothed lock
    let phase = 0;

    // target zone spans 44%..56% (half-width 0.06). Reaching the visible amber
    // zone yields full lock; outside it the lock ramps smoothly down over 0.18.
    const ZONE_HALF = 0.06;   // matches target-zone width (12% => ±0.06)
    const RAMP = 0.18;        // falloff distance outside the zone
    function lockFromTune(t) {
      const d = Math.max(0, Math.abs(t - TARGET) - ZONE_HALF);
      return Math.max(0, 1 - d / RAMP);
    }

    let lastTs = 0;
    function draw(ts) {
      raf = requestAnimationFrame(draw);
      // frame-rate independent advance (caps catch-up after a pause)
      const dt = lastTs ? Math.min((ts - lastTs) / 16.67, 3) : 1;
      lastTs = ts;
      phase += 0.05 * dt;

      const targetLock = lockFromTune(tune);
      lock += (targetLock - lock) * Math.min(1, 0.12 * dt);
      if (Math.abs(targetLock - lock) < 0.0008) lock = targetLock;

      // HUD is driven from the smoothed lock so meter, readouts and waveform
      // move together; this also defers onLock() until the scope is clean.
      syncHUD();

      ctx.clearRect(0, 0, W, H);
      // faint grid
      ctx.strokeStyle = 'rgba(61,255,154,0.05)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      for (let x = 0; x < W; x += 48) { ctx.moveTo(x, 0); ctx.lineTo(x, H); }
      for (let y = 0; y < H; y += 48) { ctx.moveTo(0, y); ctx.lineTo(W, y); }
      ctx.stroke();

      const midY = H * 0.52;
      const noise = (1 - lock);
      // waveform: blend of clean pulsar pulse + noise
      ctx.beginPath();
      for (let x = 0; x <= W; x += 3) {
        const tx = x / W;
        // clean signal: periodic sharp pulsar spike
        const pulsar = Math.exp(-Math.pow(((tx * 6 % 1) - 0.5) * 7, 2)) * 90;
        const carrier = Math.sin(tx * 60 + phase) * 10;
        const clean = -(pulsar) + carrier;
        const rand = noise > 0.001 ? (Math.random() - 0.5) * 160 * noise : 0;
        const y = midY + clean * lock + rand;
        if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.strokeStyle = `rgba(61,255,154,${0.35 + lock * 0.55})`;
      ctx.lineWidth = 1.6;
      ctx.shadowColor = 'rgba(61,255,154,0.7)';
      ctx.shadowBlur = 6 + lock * 10;
      ctx.stroke();
      ctx.shadowBlur = 0;

      // snow overlay when unlocked
      if (noise > 0.02 && !reduce) {
        const count = Math.floor(noise * 220);
        ctx.fillStyle = `rgba(189,246,216,${0.05 + noise * 0.12})`;
        for (let i = 0; i < count; i++) {
          ctx.fillRect(Math.random() * W, Math.random() * H, 2, 2);
        }
      }
    }

    let raf = null;
    function start() { if (raf == null) { lastTs = 0; raf = requestAnimationFrame(draw); } }
    function stop() { if (raf != null) { cancelAnimationFrame(raf); raf = null; } }
    start();
    document.addEventListener('visibilitychange', () => document.hidden ? stop() : start());

    // ---- UI refs ----
    const needle = document.getElementById('needle');
    const targetZone = document.getElementById('targetZone');
    const lockfill = document.getElementById('lockfill');
    const lockpct = document.getElementById('lockpct');
    const freqNow = document.getElementById('freqNow');
    const snrEl = document.getElementById('snr');
    const noiseEl = document.getElementById('noise');
    const statusEl = document.getElementById('status');
    const panel = document.getElementById('panel');
    const tuner = document.getElementById('tuner');

    // place target zone (45%..55%)
    targetZone.style.left = '44%';
    targetZone.style.width = '12%';

    let locked = false;
    let lastPct = -1, lastNoise = '', lastStatus = '', lastSnr = '';

    // Needle + frequency track raw input instantly so dragging feels direct.
    function updateNeedle() {
      needle.style.left = (tune * 100) + '%';
      freqNow.textContent = (1.410 + tune * 0.02).toFixed(3) + ' GHz';
    }

    // HUD (lock bar, %, SNR, noise, status) follows the smoothed lock value.
    // Called every frame from draw(); DOM writes are guarded to avoid churn.
    function syncHUD() {
      const lk = Math.max(0, Math.min(1, lock));
      const pct = Math.round(lk * 100);
      if (pct !== lastPct) {
        lockfill.style.width = pct + '%';
        lockpct.textContent = pct + '%';
        lastPct = pct;
      }
      const snr = (lk * 28 + 2).toFixed(1) + ' dB';
      if (snr !== lastSnr) { snrEl.textContent = snr; lastSnr = snr; }
      const noise = lk > 0.6 ? 'LOW' : lk > 0.3 ? 'MED' : 'HIGH';
      if (noise !== lastNoise) { noiseEl.textContent = noise; lastNoise = noise; }
      const status = lk >= 0.98 ? 'LOCKED' : 'SCANNING';
      if (status !== lastStatus) { statusEl.textContent = status; lastStatus = status; }
      if (lk >= 0.985 && !locked) onLock();
    }

    // ---- scramble/decode text effect ----
    const GLYPHS = '!<>-_\\/[]{}=+*^?#01';
    function scrambleTo(el, finalText, dur) {
      if (reduce) { el.textContent = finalText; return Promise.resolve(); }
      return new Promise(resolve => {
        const len = finalText.length;
        let frame = 0;
        const total = Math.max(14, Math.round(dur / 16));
        const id = setInterval(() => {
          frame++;
          let out = '';
          for (let i = 0; i < len; i++) {
            if (i < (frame / total) * len) out += finalText[i];
            else if (finalText[i] === ' ') out += ' ';
            else out += GLYPHS[(Math.random() * GLYPHS.length) | 0];
          }
          el.textContent = out;
          if (frame >= total) { clearInterval(id); el.textContent = finalText; resolve(); }
        }, 16);
      });
    }

    function buildMetrics() {
      const box = document.getElementById('metrics');
      box.innerHTML = METRICS.map(m => `<div class="metric"><div class="v">${m.v}</div><div class="l">${m.l}</div></div>`).join('');
    }

    let currentCh = 'experience';
    let lastChipHover = 0;
    function renderChips() {
      const chips = document.getElementById('chips');
      chips.innerHTML = CH_ORDER.map(k =>
        `<span class="chip${k === currentCh ? ' active' : ''}" data-ch="${k}"><i class="fa-solid ${CH_ICONS[k]}"></i>${k}</span>`).join('');
      chips.querySelectorAll('.chip').forEach(c => {
        c.addEventListener('click', () => {
          if (c.dataset.ch === currentCh) { sfx('beep'); return; }
          sfx('select');
          showChannel(c.dataset.ch);
        });
        c.addEventListener('mouseenter', () => {
          const now = performance.now();
          if (now - lastChipHover > 90) { lastChipHover = now; sfx('hover'); }
        });
      });
    }
    function showChannel(key) {
      currentCh = key;
      renderChips();
      const ch = CHANNELS[key];
      document.getElementById('chanHead').innerHTML = `<i class="fa-solid ${ch.icon}"></i>${ch.head}`;
      const body = document.getElementById('chanBody');
      body.scrollTop = 0;
      body.innerHTML = ch.html;
      if (reduce) return;
      // glitch-in entries
      const items = [...body.querySelectorAll('.entry, .grp, .comm-row')];
      items.forEach((row, i) => {
        row.style.opacity = '0';
        setTimeout(() => {
          row.style.transition = 'opacity .35s, transform .35s';
          row.style.opacity = '1';
          row.style.transform = 'none';
        }, 80 * i);
        row.style.transform = 'translateY(6px)';
      });
    }

    let onLockDone = false;
    function onLock() {
      locked = true;
      if (onLockDone) return;
      onLockDone = true;
      sfx('lock');
      sfx('whoosh');
      tuner.classList.add('hidden');
      var lw = document.querySelector('.lockwrap'); if (lw) lw.classList.add('hidden'); // avoid overlapping the decoded name
      panel.classList.add('show');
      buildMetrics();
      renderChips();
      const title = document.getElementById('title');
      const role = document.getElementById('role');
      document.getElementById('tagline').innerHTML =
        `<i class="fa-solid fa-satellite-dish"></i>${TAGLINE}`;
      document.getElementById('bio').innerHTML =
        `<i class="fa-solid fa-circle-info"></i>${BIO}`;
      scrambleTo(title, NAME, 700).then(() => scrambleTo(role, ROLE, 500));
      // decode metrics values
      if (!reduce) {
        document.querySelectorAll('#metrics .v').forEach((el, i) => {
          const fin = METRICS[i].v;
          el.textContent = '';
          setTimeout(() => scrambleTo(el, fin, 500), 300 + i * 120);
        });
      }
      setTimeout(() => showChannel('experience'), reduce ? 0 : 900);
    }

    // ---- input: drag to tune ----
    const dial = document.getElementById('dial');
    let dragging = false;

    // throttled "tuning tick" — rises in pitch as lock increases (sfx self-throttles
    // pitch via repeated 'type'); we throttle the call rate to ~50ms.
    let lastTick = 0;
    function tuningTick() {
      if (locked) return;
      const now = performance.now();
      if (now - lastTick >= 50) { lastTick = now; sfx(Math.random() < 0.5 ? 'static' : 'tick'); }
    }

    function setTuneFromX(clientX) {
      const rect = dial.getBoundingClientRect();
      if (rect.width <= 0) return;
      tune = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
      updateNeedle();
    }
    dial.addEventListener('pointerdown', e => {
      if (locked) return;
      dragging = true;
      try { dial.setPointerCapture(e.pointerId); } catch (err) {}
      setTuneFromX(e.clientX);
      tuningTick();
      document.getElementById('hint').style.display = 'none';
    });
    dial.addEventListener('pointermove', e => { if (dragging && !locked) { setTuneFromX(e.clientX); tuningTick(); } });
    dial.addEventListener('pointerup', () => { dragging = false; });
    dial.addEventListener('pointercancel', () => { dragging = false; });
    // wheel to fine-tune
    addEventListener('wheel', e => {
      if (locked) return;
      tune = Math.max(0, Math.min(1, tune + (e.deltaY > 0 ? 0.012 : -0.012)));
      updateNeedle();
      tuningTick();
      document.getElementById('hint').style.display = 'none';
    }, { passive: true });
    // keyboard
    addEventListener('keydown', e => {
      if (locked) return;
      if (e.key === 'ArrowRight' || e.key === 'ArrowUp') {
        tune = Math.min(1, tune + 0.02); updateNeedle(); tuningTick();
        document.getElementById('hint').style.display = 'none';
        e.preventDefault();
      } else if (e.key === 'ArrowLeft' || e.key === 'ArrowDown') {
        tune = Math.max(0, tune - 0.02); updateNeedle(); tuningTick();
        document.getElementById('hint').style.display = 'none';
        e.preventDefault();
      }
    });

    // auto-tune button
    const autoBtn = document.getElementById('autoBtn');
    let autoId = null;
    autoBtn.addEventListener('click', () => {
      if (locked || autoId != null) return;
      sfx('click');
      document.getElementById('hint').style.display = 'none';
      if (reduce) { tune = TARGET; lock = 1; updateNeedle(); onLock(); return; }
      autoId = setInterval(() => {
        tune += (TARGET - tune) * 0.18;
        tuningTick();
        if (Math.abs(tune - TARGET) < 0.0015) {
          tune = TARGET;        // exact center -> lockFromTune()===1, smoothed
          updateNeedle();       // lock eases to 1 in draw() and fires onLock()
          clearInterval(autoId);
          autoId = null;
        } else {
          updateNeedle();
        }
      }, 24);
    });

    // back-link sound
    const backLink = document.querySelector('.top-left');
    if (backLink) backLink.addEventListener('click', () => sfx('back'));

    // init
    if (reduce) {
      // reduced motion: skip the tuning game, reveal immediately
      tune = TARGET; lock = 1;
      updateNeedle(); syncHUD();
      onLock();
    } else {
      tune = 0.06; lock = lockFromTune(tune);
      updateNeedle(); syncHUD();
    }
  </script>
</body>
